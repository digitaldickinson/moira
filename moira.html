                        <button data-action="add-story" ${isRundownLocked ? 'disabled title="Rundown is locked"' : ''} class="${isRundownLocked ? 'bg-slate-300 text-slate-500 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700 text-white'} px-5 py-2.5 rounded-lg font-medium transition-colors shadow-sm"><i class="fa-solid fa-plus mr-2"></i>Add Story</button>
                        <button data-action="add-segment" ${isRundownLocked ? 'disabled title="Rundown is locked"' : ''} class="${isRundownLocked ? 'bg-slate-300 text-slate-500 cursor-not-allowed' : 'bg-slate-700 hover:bg-slate-600 text-white'} px-5 py-2.5 rounded-lg font-medium transition-colors shadow-sm" title="Add a segment break or theme divider"><i class="fa-solid fa-scissors mr-2"></i>Add Segment</button>
                        <button data-action="print-scripts" class="bg-slate-600 hover:bg-slate-700 text-white px-5 py-2.5 rounded-lg font-medium transition-colors shadow-sm">
                            <i class="fa-solid fa-print mr-2"></i>Print Scripts
                        </button>
                    </div>
                </div>
                ${txRxBar}
                ${state.ui.trash.length > 0 ? `
                <div class="flex items-center gap-3 bg-amber-50 border border-amber-200 text-amber-800 px-4 py-2.5 rounded-xl mb-4 text-sm">
                    <i class="fa-solid fa-trash-arrow-up text-amber-500"></i>

                <div class="hidden md:block">
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">

       /**
         * Renders the Presenter view. Switches between two sub-modes:
         * - 'autocue': full-screen scrolling script view (renderAutocue)
         * - 'presenter': side-by-side reference cards (renderPresenterCards)
         * The Presenter tab button toggles between the two sub-modes when already
         * active, rather than switching away from presenter view.
         * @returns {string} HTML string.
         */
       function renderPresenter() {
            const rawOrder = state.meta.order || [];
            const markerIdx = rawOrder.indexOf('marker-line');
            const storyIds = (markerIdx > -1 ? rawOrder.slice(0, markerIdx) : rawOrder)
                .filter(id => !state.storiesMap[id]?.isFloated);

            if (storyIds.length === 0) {
                return `<div class="flex h-full items-center justify-center bg-black text-slate-600 text-3xl font-light">Standing By...</div>`;
            }

            const pm = state.ui.presenter;
            const isLive = state.meta.isTXMode;
            const isRehearsal = state.meta.isRehearsalMode;

            if (pm.presenterMode === 'autocue') {
                return renderAutocue(storyIds);
            } else {
                return renderPresenterCards(storyIds);
            }
        }

        /**
         * Renders the full-screen autocue view. Stories scroll continuously —
         * the view never jumps unless Take Next is explicitly pressed (controlled
         * via pendingScrollToActive flag). Active story is fully opaque; others
         * are dimmed. Mirror and font scale applied via CSS transform. A fixed
         * controls bar at the bottom handles scroll speed and navigation.
         * @param {string[]} storyIds - Ordered non-floated story IDs.
         * @returns {string} HTML string.
         */
        function renderAutocue(storyIds) {
            const pm = state.ui.presenter;
            const fontSize = Math.round(48 * pm.fontScale);
            const scaleX = pm.mirrorX ? -1 : 1;
            const scaleY = pm.mirrorY ? -1 : 1;
            const transformStyle = `transform: scale(${scaleX}, ${scaleY}); transform-origin: center top;`;
            const isLive = state.meta.isTXMode;
            const isRehearsal = state.meta.isRehearsalMode;
            const activeColour = isLive ? '#ef4444' : isRehearsal ? '#f59e0b' : '#3b82f6';

            const storiesHtml = storyIds.map(id => {
                const story = state.storiesMap[id];
                if (!story) return '';
                const isActive = state.meta.activeStoryId === id;

                // Segment break — show as a horizontal holding card
                if (story.type === 'segment') {
                    const durLabel = story.duration > 0 ? ` · ${formatDuration(story.duration)}` : '';
                    return `
                        <div id="presenter-story-${id}" class="mb-16">
                            <div style="border: 2px dashed #6366f1; border-radius: 0.75rem; padding: 1.25rem 1.5rem; display: flex; align-items: center; gap: 1rem; opacity: 0.6;">
                                <i class="fa-solid fa-scissors" style="color:#6366f1; font-size:1.25rem;"></i>
                                <span style="color:#6366f1; font-weight:900; font-size:1.1rem; letter-spacing:0.12em; text-transform:uppercase;">${escapeHTML(story.slug)}${durLabel}</span>
                                <div style="flex:1; height:1px; background:#6366f1; opacity:0.3;"></div>
                            </div>
                        </div>`;
                }

                const clipSecs = parseClipTags(story.script);

                return `
                    <div id="presenter-story-${id}" class="mb-16">
                        <div style="background:${isActive ? activeColour : '#1e293b'}; transition: background 0.4s;"
                            class="w-full px-6 py-3 flex items-center gap-4 rounded-lg mb-6">
                            <span class="text-white font-black text-lg tracking-widest uppercase opacity-60">${escapeHTML(story.format)}</span>
                            <span class="text-white font-black text-2xl tracking-widest uppercase">${escapeHTML(story.slug)}</span>
                            <span class="ml-auto text-white opacity-60 text-sm font-mono">${formatDuration(story.duration)}${clipSecs > 0 ? ' +' + formatDuration(clipSecs) + ' clip' : ''}</span>
                        </div>
                        <div style="font-size:${fontSize}px; line-height:1.7; opacity:${isActive ? 1 : 0.25}; transition: opacity 0.4s;"
                            class="text-white font-medium tracking-wide">
                            ${formatPresenterScript(story.script)}
                        </div>
                    </div>`;
            }).join('');

            const speed = pm.scrollSpeed;
            const activeIdx = storyIds.indexOf(state.meta.activeStoryId);
            const atFirst = activeIdx <= 0;
            const atLast = activeIdx === storyIds.length - 1;
            const btnNav = 'px-4 py-3 min-h-[48px] rounded font-black text-sm tracking-widest transition-colors';
            const btnNavOn = `${btnNav} bg-slate-700 hover:bg-slate-600 text-white`;
            const btnNavOff = `${btnNav} bg-slate-900 text-slate-700 cursor-not-allowed`;

            const controlsBar = `
                <div class="fixed bottom-0 left-0 right-0 z-50 flex items-center justify-between px-6 pt-3 pb-[calc(0.75rem+env(safe-area-inset-bottom))] bg-black/80 backdrop-blur-sm border-t border-slate-800">
                    <div class="flex items-center gap-3">
                        <span class="text-slate-500 text-xs font-bold uppercase tracking-widest">Size</span>
                        <button data-action="presenter-font-down" class="w-11 h-11 rounded bg-slate-800 hover:bg-slate-700 text-white font-black text-lg flex items-center justify-center">−</button>
                        <span class="text-white text-xs font-mono w-8 text-center">${fontSize}</span>
                        <button data-action="presenter-font-up" class="w-11 h-11 rounded bg-slate-800 hover:bg-slate-700 text-white font-black text-lg flex items-center justify-center">+</button>
                    </div>
                    <div class="flex items-center gap-3">
                        <button data-action="presenter-story-prev" ${atFirst ? 'disabled' : ''} class="${atFirst ? btnNavOff : btnNavOn}">◀ Prev</button>
                        <button data-action="presenter-scroll-toggle"
                            class="px-6 py-3 min-h-[48px] rounded font-black text-sm tracking-widest transition-colors ${pm.autoScroll ? 'bg-white text-black hover:bg-slate-200' : 'bg-slate-700 text-white hover:bg-slate-600'}">
                            ${pm.autoScroll ? '⏸ PAUSE' : '▶ SCROLL'}
                        </button>
                        <button data-action="presenter-story-next" ${atLast ? 'disabled' : ''} class="${atLast ? btnNavOff : btnNavOn}">Next ▶</button>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-slate-500 text-xs font-bold uppercase tracking-widest">Speed</span>
                        <button data-action="presenter-speed-down" class="w-11 h-11 rounded bg-slate-800 hover:bg-slate-700 text-white font-black text-lg flex items-center justify-center">−</button>
                        <span class="text-white text-xs font-mono w-8 text-center">${speed}</span>
                        <button data-action="presenter-speed-up" class="w-11 h-11 rounded bg-slate-800 hover:bg-slate-700 text-white font-black text-lg flex items-center justify-center">+</button>
                    </div>
                </div>`;

            return `
                <div class="bg-black min-h-full overflow-hidden">
                    ${pm.zenMode ? `<div class="fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-black/70 text-white text-xs font-bold uppercase tracking-widest px-5 py-2 rounded-full pointer-events-none select-none">Press F or ESC to exit fullscreen</div>` : ''}
                    <div id="presenter-transform-wrapper" style="${transformStyle}"
                        class="transition-transform duration-300 pb-32">
                        <div class="px-4 max-w-[85%] sm:max-w-[75%] md:max-w-[65%] mx-auto">
                            <div class="py-[40vh]">
                                ${storiesHtml}
                            </div>
                        </div>
                    </div>
                    ${controlsBar}
                </div>`;
        }

        /**
         * Renders the presenter reference card view: a grid of story cards
         * showing slug, format, script excerpt, and staff names. The active
         * story is highlighted. Cards can be expanded to show full script.
         * @param {string[]} storyIds - Ordered non-floated story IDs.
         * @returns {string} HTML string.
         */

        /**
         * Renders a presenter script with [CLIP] tags replaced by large tap-to-fire
         * buttons. Only used in presenter cards view when self-fire is enabled.
         * Non-CLIP instruction blocks render as normal visual cues.
         * @param {string} script
         * @param {string} storyId
         * @returns {string} HTML string
         */
        function renderPresenterScriptWithFire(script, storyId) {
            if (!script) return '<p class="text-base text-slate-500 italic">No script.</p>';
            // Prefer local state; fall back to Firestore state so non-master UIs reflect
            // what the master is playing without needing a local Audio element.
            const playingId = state.ui.presenter.playingClipStoryId || state.meta.presenterClipStoryId;
            const isPlaying = playingId === storyId;

            // Split on CLIP tags to interleave text and buttons
            const parts = script.split(/(\[CLIP:\d+:\d{2}\])/gi);
            return parts.map(part => {
                const clipMatch = part.match(/^\[CLIP:(\d+):(\d{2})\]$/i);
                if (clipMatch) {
                    const mins = parseInt(clipMatch[1], 10);
                    const secs = parseInt(clipMatch[2], 10);
                    const dur  = formatDuration(mins * 60 + secs);
                    if (isPlaying) {
                        // Countdown timer — initial value is full duration; interval updates it live
                        return `<button id="presenter-clip-btn-${storyId}" data-action="presenter-fire-clip" data-id="${storyId}"
                            style="display:block; width:100%; margin:1rem 0; padding:1.1rem 1.5rem; border-radius:0.75rem;
                                   background:#dc2626; color:#fff; border:none; cursor:pointer;
                                   font-size:1.1rem; font-weight:900; letter-spacing:0.08em; text-transform:uppercase;
                                   box-shadow:0 4px 24px rgba(220,38,38,0.4);">
                            <span style="display:flex;align-items:center;justify-content:center;gap:1rem;">
                                <span style="font-size:1.4rem;">⏹</span>
                                <span>STOP CLIP</span>
                                <span id="presenter-clip-timer-${storyId}" style="opacity:0.85;font-size:1.2rem;font-weight:900;font-family:monospace;">${dur}</span>
                            </span>
                        </button>`;
                    } else {
                        return `<button id="presenter-clip-btn-${storyId}" data-action="presenter-fire-clip" data-id="${storyId}"
                            style="display:block; width:100%; margin:1rem 0; padding:1.1rem 1.5rem; border-radius:0.75rem;
                                   background:#16a34a; color:#fff; border:none; cursor:pointer;
                                   font-size:1.1rem; font-weight:900; letter-spacing:0.08em; text-transform:uppercase;
                                   box-shadow:0 4px 16px rgba(22,163,74,0.3);">
                            <span style="display:flex;align-items:center;justify-content:center;gap:1rem;">
                                <span style="font-size:1.4rem;">▶</span>
                                <span>PLAY CLIP</span>
                                <span id="presenter-clip-timer-${storyId}" style="opacity:0.7;font-size:1.1rem;font-weight:700;font-family:monospace;">${dur}</span>
                            </span>
                        </button>`;
                    }
                } else if (part.trim()) {
                    // Regular script text — preserve line breaks
                    const escaped = escapeHTML(part).replace(/\n/g, '<br>');
                    // Render [INSTRUCTION] blocks
                    const formatted = escaped.replace(/\[([^\]]+)\]/g,
                        '<span style="display:inline-block;background:#e2e8f0;color:#1e293b;padding:0.15rem 0.6rem;border-radius:0.375rem;font-size:0.75em;font-weight:900;text-transform:uppercase;letter-spacing:0.05em;margin:0 0.2rem;">[$1]</span>');
                    return `<span style="font-size:${state.ui.presenter.cardsFontLarge ? '1.25rem' : '1.05rem'};line-height:1.8;color:#1e293b;">${formatted}</span>`;
                }
                return '';
            }).join('');
        }
        function renderPresenterCards(storyIds) {
            const isLive = state.meta.isTXMode;
            const isRehearsal = state.meta.isRehearsalMode;
            const selfFire = state.ui.presenter.selfFireEnabled && state.ui.playoutBackend === 'radio' &&
                            (!state.localMode || !!state.radio.directoryHandle);
            const playingId = state.ui.presenter.playingClipStoryId || null;

            const activeIdx = storyIds.indexOf(state.meta.activeStoryId);
            const remaining = storyIds.slice(activeIdx > -1 ? activeIdx : 0)
                .reduce((s, id) => s + (state.storiesMap[id]?.duration || 0), 0);

            const expandedId = state.ui.presenter.expandedStoryId;

            const cards = storyIds.map((id, idx) => {
                const story = state.storiesMap[id];
                if (!story) return '';
                const isActive = state.meta.activeStoryId === id;
                const isPast = activeIdx > -1 && idx < activeIdx;
                const isNext = activeIdx > -1 && idx === activeIdx + 1;
                const isExpanded = expandedId === id;
                const clipSecs = parseClipTags(story.script);

                let cardStyle = 'bg-white border border-slate-200';
                let headerStyle = 'bg-slate-100 text-slate-600';
                if (isActive) {
                    cardStyle = `bg-white border-2 shadow-lg ${isLive ? 'border-red-500' : isRehearsal ? 'border-amber-500' : 'border-blue-500'}`;
                    headerStyle = isLive ? 'bg-red-600 text-white' : isRehearsal ? 'bg-amber-500 text-white' : 'bg-blue-600 text-white';
                } else if (isNext) {
                    cardStyle = 'bg-white border-2 border-blue-200 shadow-sm';
                    headerStyle = 'bg-blue-50 text-blue-800';
                } else if (isPast) {
                    cardStyle = 'bg-slate-50 border border-slate-100 opacity-40';
                    headerStyle = 'bg-slate-100 text-slate-400';
                }
                if (isExpanded) cardStyle += ' ring-2 ring-offset-1 ring-slate-400';

                return `
                    <div id="ref-story-${id}" class="rounded-xl overflow-hidden ${cardStyle} select-none">
                        <div class="px-4 py-3 min-h-[48px] flex items-center justify-between ${headerStyle} cursor-pointer"
                            data-action="ref-toggle-expand" data-id="${id}">
                            <div class="flex items-center gap-3">
                                <span class="font-black text-xs tracking-widest uppercase">${escapeHTML(story.format)}</span>
                                <span class="font-black text-base uppercase tracking-wide">${escapeHTML(story.slug)}</span>
                                ${isActive ? `<span class="text-xs font-bold opacity-75">● ON AIR</span>` : ''}
                                ${isNext ? `<span class="text-xs font-bold text-blue-600">NEXT</span>` : ''}
                            </div>
                            <div class="flex items-center gap-3 text-xs font-mono opacity-75">
                                ${clipSecs > 0 ? `<span class="bg-amber-500 text-white px-1.5 py-0.5 rounded text-[10px] font-bold">CLIP +${formatDuration(clipSecs)}</span>` : ''}
                                <span>${formatDuration(story.duration)}</span>
                                <span class="ml-1 opacity-60">${isExpanded ? '▲' : '▼'}</span>
                            </div>
                        </div>
                        ${isExpanded ? `
                        <div class="px-5 py-4 bg-white">
                            ${selfFire && story.mediaFile
                                ? renderPresenterScriptWithFire(story.script, id)
                                : `<p class="${state.ui.presenter.cardsFontLarge ? 'text-xl' : 'text-base'} text-slate-800 leading-relaxed whitespace-pre-wrap">${escapeHTML(story.script || 'No script.')}</p>`
                            }
                        </div>` : (isActive || isNext) ? `
                        <div class="px-4 py-2">
                            <p class="text-sm text-slate-500 leading-relaxed line-clamp-2 italic">${escapeHTML(story.script?.split('\n').find(l => l.trim()) || '')}</p>
                        </div>` : ''}
                    </div>`;
            }).join('');

            return `
                <div class="bg-slate-100 min-h-full">
                    ${state.meta.presenterAlert ? `
                    <div class="sticky top-0 z-10 bg-red-600 border-b-2 border-red-700 shadow-lg">
                        <div class="max-w-2xl mx-auto px-4 py-3 flex items-center gap-4">
                            <span class="w-3 h-3 rounded-full bg-white animate-pulse shrink-0"></span>
                            <span class="font-black text-white tracking-widest text-sm uppercase shrink-0">Producer</span>
                            <span class="text-white font-bold text-base leading-snug flex-1">${escapeHTML(state.meta.presenterAlert.text)}</span>
                            <button data-action="clear-presenter-alert"
                                class="shrink-0 px-4 py-2 min-h-[44px] bg-red-800 hover:bg-red-900 text-white text-xs font-black rounded-lg tracking-widest uppercase transition-colors">
                                ✕ Dismiss
                            </button>
                        </div>
                    </div>` : ''}
                    <div class="px-4 pb-8 max-w-2xl mx-auto">
                        <div class="py-4 flex items-center justify-between">
                            <span class="text-slate-500 text-sm font-bold uppercase tracking-widest">Running Order</span>
                            <div class="flex items-center gap-3">
                                <div class="text-right">
                                    <div class="text-xs text-slate-400 uppercase tracking-widest">Remaining</div>
                                    <div class="font-mono font-black text-2xl ${remaining < 120 ? 'text-red-600' : 'text-slate-800'}">${formatDuration(remaining)}</div>
                                </div>
                                <button data-action="presenter-toggle-font" title="Toggle script size"
                                    class="px-3 py-1.5 rounded-lg ${state.ui.presenter.cardsFontLarge ? 'bg-blue-600 text-white' : 'bg-slate-200 hover:bg-slate-300 text-slate-700'} text-sm transition-colors">
                                    <i class="fa-solid fa-text-height"></i>
                                </button>
                            </div>
                        </div>
                        <div class="flex flex-col gap-3">
                            ${cards}
                        </div>
                    </div>
                </div>`;
        }


        function renderModals() {
            if (state.ui.editingStoryId && !state.ui.pendingConflict) return renderEditModal();
            if (state.ui.isSettingsModalOpen) return renderSettingsModal();
            if (state.ui.isStaffModalOpen) return renderStaffModal();
            if (state.ui.pendingConflict) return renderConflictModal();
            return '';
        }

        /**
         * Renders the story edit modal. The modal container is NOT re-rendered
         * while it is open (guarded in render()) so background Firebase snapshots
         * cannot wipe unsaved content mid-edit. Shows a conflict resolution UI
         * instead if pendingConflict is set.
         * @returns {string} HTML string.
         */
        function renderEditModal() {
            const story = state.storiesMap[state.ui.editingStoryId];
            if (!story) return '';

            // Segment edit modal — minimal form, label + duration only
            if (story.type === 'segment') {
                const isLocked = story.lockedBySession && story.lockedBySession !== state.sessionId;
                return `<div class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4 z-[60]">
                    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm flex flex-col overflow-hidden">
                        <div class="px-6 py-4 border-b border-indigo-100 flex justify-between items-center bg-indigo-50 rounded-t-2xl">
                            <h3 class="text-lg font-bold text-indigo-900"><i class="fa-solid fa-scissors mr-2 text-indigo-400"></i>Edit Segment</h3>
                            <button data-action="cancel-edit" class="text-indigo-300 hover:text-indigo-600 text-2xl"><i class="fa-solid fa-xmark"></i></button>
                        </div>
                        <div class="p-6 space-y-4">
                            <input type="hidden" id="edit-rev" value="${story.rev}">
                            <div>
                                <label class="text-sm font-semibold block mb-1">Label</label>
                                <input type="text" id="edit-slug" value="${escapeHTML(story.slug)}" class="w-full border rounded-lg px-4 py-2.5 outline-none focus:border-blue-500 font-bold uppercase tracking-widest" ${isLocked ? 'disabled' : ''} placeholder="e.g. SPORT, AD BREAK, WEATHER">
                            </div>
                            <div>
                                <label class="text-sm font-semibold block mb-1">Duration <span class="font-normal text-slate-400">(optional, counts toward TRT)</span></label>
                                <input type="text" id="edit-duration" value="${story.duration > 0 ? formatDuration(story.duration) : ''}" class="w-full border rounded-lg px-4 py-2 font-mono outline-none focus:border-blue-500" ${isLocked ? 'disabled' : ''} placeholder="e.g. 3:00">
                            </div>
                        </div>
                        <div class="px-6 py-4 border-t border-slate-200 bg-slate-50 flex justify-end gap-3">
                            <button data-action="cancel-edit" class="px-5 py-2.5 rounded-lg text-slate-600 hover:bg-slate-200 transition-colors">Cancel</button>
                            ${!isLocked ? `<button data-action="save-edit" class="btn-primary">Save</button>` : ''}
                        </div>
                    </div>
                </div>`;
            }

            const formats = state.meta.formats || DEFAULT_FORMATS;
            const formatOptions = formats.map(f => `<option value="${f}" ${story.format === f ? 'selected' : ''}>${f}</option>`).join('');
            const isLocked = story.lockedBySession && story.lockedBySession !== state.sessionId;
            const staffOptions = (selectedId, roleFilter = null) => `<option value="">-- Unassigned --</option>` + state.meta.staff.filter(s => roleFilter ? s.role === roleFilter : true).map(s => `<option value="${s.id}" ${s.id === selectedId ? 'selected' : ''}>${escapeHTML(s.name)} (${escapeHTML(s.role)})</option>`).join('');

            return `<div class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4 z-[60]">
                <div class="bg-white rounded-2xl shadow-2xl w-full max-w-3xl flex flex-col max-h-full overflow-hidden">
                    <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-slate-50"><h3 class="text-xl font-bold text-slate-800"><i class="fa-solid fa-pen-to-square mr-2 text-blue-500"></i> Edit Story</h3><button data-action="cancel-edit" class="text-slate-400 hover:text-slate-600 text-2xl"><i class="fa-solid fa-xmark"></i></button></div>
                    ${isLocked ? (() => {
                        const lockAge = story.lockedAt ? Date.now() - story.lockedAt : STALE_LOCK_MS;
                        const isStale = lockAge >= STALE_LOCK_MS;
                        const waitSecs = isStale ? 0 : Math.ceil((STALE_LOCK_MS - lockAge) / 1000);
                        return `<div class="bg-amber-100 border-b border-amber-200 px-6 py-3 flex items-center justify-between">
                            <span class="text-amber-800 text-sm">Currently being edited by <strong>${escapeHTML(story.lockedByName)}</strong>.</span>
                            <button data-action="take-over-edit" id="takeover-btn" ${!isStale ? 'disabled' : ''}
                                class="text-xs ${isStale ? 'bg-amber-600 hover:bg-amber-700 text-white border-amber-700' : 'bg-white text-slate-400 border-slate-300 cursor-not-allowed'} border px-3 py-1.5 rounded shadow-sm font-bold transition-colors">
                                ${isStale ? 'Take Over' : `Wait ${waitSecs}s…`}
                            </button>
                        </div>`;
                    })() : ''}
                    <div class="p-6 overflow-y-auto flex-1 space-y-5">
                        <input type="hidden" id="edit-rev" value="${story.rev}">
                        <div class="grid grid-cols-4 gap-4"><div class="col-span-3"><label class="text-sm font-semibold block mb-1">Slug</label><input type="text" id="edit-slug" value="${escapeHTML(story.slug)}" class="w-full border rounded-lg px-4 py-2.5 outline-none focus:border-blue-500" ${isLocked ? 'disabled' : ''}></div><div class="col-span-1"><label class="text-sm font-semibold block mb-1">Format</label><select id="edit-format" class="w-full border rounded-lg px-4 py-2.5 outline-none focus:border-blue-500" ${isLocked ? 'disabled' : ''}>${formatOptions}</select></div></div>
                        <div class="grid grid-cols-3 gap-4">
                            <div><label class="text-sm font-semibold block mb-1">Presenter</label><select id="edit-presenter" class="w-full border rounded-lg px-4 py-2 outline-none focus:border-blue-500" ${isLocked ? 'disabled' : ''}>${staffOptions(story.presenterId, 'Presenter')}</select></div>
                            <div><label class="text-sm font-semibold block mb-1">Reporter</label><select id="edit-reporter" class="w-full border rounded-lg px-4 py-2 outline-none focus:border-blue-500" ${isLocked ? 'disabled' : ''}>${staffOptions(story.reporterId, 'Reporter')}</select></div>
                            <div>
                                <label class="text-sm font-semibold block mb-1">Duration
                                    <span class="font-normal text-slate-400 text-xs ml-1">(total)</span>
                                </label>
                                <input type="text" id="edit-duration" value="${formatDuration(story.duration)}" class="w-full border rounded-lg px-4 py-2 font-mono outline-none focus:border-blue-500" ${isLocked ? 'disabled' : ''} placeholder="e.g. 02:15" title="Total duration — auto-estimated from script. Edit manually to override.">
                                <div id="edit-dur-breakdown" class="text-xs font-mono mt-1 ${parseClipTags(story.script) > 0 ? 'text-amber-600' : 'text-slate-400'}">
                                    ${(()=>{
                                        const clip = parseClipTags(story.script);
                                        const read = Math.max(0, story.duration - clip);
                                        if (clip > 0) return '~' + formatDuration(read) + ' read + ' + formatDuration(clip) + ' clip';
                                        if (story.duration > 0) return 'Estimated from script';
                                        return '';
                                    })()}
                                </div>
                            </div>
                        </div>
                        <div><label class="text-sm font-semibold block mb-1">Media File</label><div class="flex gap-2"><input type="text" id="edit-media-file" value="${escapeHTML(story.mediaFile || '')}" class="flex-1 border rounded-lg px-4 py-2 font-mono outline-none focus:border-blue-500" ${isLocked ? 'disabled' : ''}><button data-action="browse-media" class="px-4 py-2 bg-slate-100 border rounded-lg text-sm font-medium hover:bg-slate-200" ${isLocked ? 'disabled' : ''}>Browse</button><input type="file" id="media-file-picker" class="hidden"></div></div>
                        <div class="flex flex-col h-64">
                            <div class="flex items-baseline justify-between mb-1">
                                <label class="text-sm font-semibold">Presenter Script</label>
                                <span id="edit-script-stats" class="text-xs font-mono text-slate-400">
                                    ${(()=>{
                                        const stripped = (story.script||'').replace(/\[[^\]]*\]/g,' ').replace(/\s+/g,' ').trim();
                                        const w = stripped.length > 0 ? stripped.split(' ').filter(Boolean).length : 0;
                                        const s = Math.round(w / 2.8);
                                        return w > 0 ? `${w} words \u00b7 ~${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')} read` : '';
                                    })()}
                                </span>
                            </div>
                            <textarea id="edit-script" class="w-full flex-1 border rounded-lg p-4 outline-none focus:border-blue-500 resize-none text-lg" ${isLocked ? 'disabled' : ''}
                                oninput="window._moiraUpdateScriptStats(this)"
                            >${escapeHTML(story.script)}</textarea>
                        </div>
                    </div>
                    <div class="px-6 py-4 border-t border-slate-200 bg-slate-50 flex justify-between items-center gap-3"><div>${state.ui.storySnapshots[state.ui.editingStoryId] ? `<button data-action="revert-story" data-id="${state.ui.editingStoryId}" class="flex items-center gap-2 px-4 py-2.5 rounded-lg text-amber-700 bg-amber-50 hover:bg-amber-100 border border-amber-200 font-medium transition-colors text-sm"><i class="fa-solid fa-clock-rotate-left"></i>Revert to previous version</button>` : ''}</div><div class="flex gap-3"><button data-action="cancel-edit" class="px-5 py-2.5 rounded-lg text-slate-600 hover:bg-slate-200 transition-colors">${isLocked ? 'Close' : 'Cancel'}</button>${!isLocked ? `<button data-action="save-edit" class="btn-primary">Save Changes</button>` : ''}</div></div>
                </div>
            </div>`;
        }

        /**
         * Renders the settings modal with three tabs: Connection (Firebase config),
         * Playout (backend selector, OBS config, radio output device and media
         * folder), and Editorial (TX/RX clock times, story formats, staff roles,
         * rundown lock). Settings are persisted to localStorage on save.
         * @returns {string} HTML string.
         */
        function renderSettingsModal() {
            let savedConfig = {};
            try {
                const str = localStorage.getItem('moira_firebase_config');
                if (str) savedConfig = JSON.parse(str);
            } catch(e) {}
            
            const currentFormats = (state.meta.formats || DEFAULT_FORMATS).join('\n');
            const currentRoles = (state.meta.roles || DEFAULT_ROLES).join('\n');

            const tabBtn = (id, label, icon) => `
                <button data-action="set-settings-tab" data-val="${id}" class="flex-1 py-3 text-sm font-bold border-b-2 transition-colors flex items-center justify-center gap-2 ${state.ui.settingsTab === id ? 'border-blue-600 text-blue-600 bg-blue-50/50' : 'border-slate-200 text-slate-400 hover:text-slate-600'}">
                    <i class="fa-solid ${icon}"></i><span class="hidden md:inline ml-2">${label}</span>
                </button>
            `;

            return `
                <div class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4 z-[70]">
                    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl flex flex-col max-h-[85vh]">
                        <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-slate-50 rounded-t-2xl">
                            <h3 class="text-xl font-bold text-slate-800"><i class="fa-solid fa-gear mr-2 text-slate-500"></i> System Settings</h3>
                            <button data-action="close-settings-modal" class="text-slate-400 hover:text-slate-600 text-2xl"><i class="fa-solid fa-xmark"></i></button>
                        </div>
                        <div class="flex">
                            ${tabBtn('connection', 'Connection', 'fa-network-wired')}
                            ${tabBtn('editorial', 'Editorial', 'fa-pen-nib')}
                            ${tabBtn('playout', 'Playout', 'fa-film')}
                            ${tabBtn('about', 'About', 'fa-info-circle')}
                            ${tabBtn('reset', 'Reset', 'fa-triangle-exclamation')}
                        </div>
                        <div class="p-6 overflow-y-auto flex-1 min-h-0">
                            ${state.ui.settingsTab === 'connection' ? `
                                <div class="space-y-6">
                                    <div class="bg-blue-50 border border-blue-200 rounded-xl p-4">
                                        <div class="flex justify-between items-start mb-2"><h4 class="font-bold text-blue-800">Cloud Sync</h4>${state.connectionState === 'connected' ? `<span class="text-[10px] font-bold uppercase tracking-wider bg-emerald-500 text-white px-2 py-1 rounded-md shadow-sm">Connected</span>` : ''}</div>
                                        <textarea id="config-paste" rows="4" class="w-full border rounded-lg p-3 text-xs font-mono bg-white outline-none mb-4" placeholder="const firebaseConfig = { ... }"></textarea>
                                        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
                                            <div><label class="form-label-sm">apiKey</label><input type="text" id="config-apikey" value="${escapeHTML(savedConfig.apiKey || '')}" class="form-input-sm"></div>
                                            <div><label class="form-label-sm">authDomain</label><input type="text" id="config-authdomain" value="${escapeHTML(savedConfig.authDomain || '')}" class="form-input-sm"></div>
                                            <div><label class="form-label-sm">projectId</label><input type="text" id="config-projectid" value="${escapeHTML(savedConfig.projectId || '')}" class="form-input-sm"></div>
                                            <div><label class="form-label-sm">storageBucket</label><input type="text" id="config-storagebucket" value="${escapeHTML(savedConfig.storageBucket || '')}" class="form-input-sm"></div>
                                        </div>
                                    </div>
                                </div>` 
                            : state.ui.settingsTab === 'editorial' ? `
                                <div class="space-y-6">
                                    <div class="bg-slate-50 border border-slate-200 rounded-xl p-4">
                                        <h4 class="font-bold text-slate-800 mb-2">Story Formats</h4>
                                        <textarea id="settings-formats-input" rows="5" class="w-full border rounded-lg p-4 text-sm font-mono outline-none mb-6">${escapeHTML(currentFormats)}</textarea>
                                        <h4 class="font-bold text-slate-800 mb-2">Staff Roles</h4>
                                        <textarea id="settings-roles-input" rows="5" class="w-full border rounded-lg p-4 text-sm font-mono outline-none">${escapeHTML(currentRoles)}</textarea>
                                    </div>
                                </div>`
                           : state.ui.settingsTab === 'playout' ? `
                                <div class="space-y-4">

                                    <!-- Backend selector -->
                                    <div class="bg-slate-50 border border-slate-200 rounded-xl p-5">
                                        <h4 class="font-bold text-slate-800 text-sm mb-3">Playout Backend</h4>
                                        <div class="flex bg-slate-200 p-1 rounded-lg gap-1">
                                            <button data-action="set-playout-backend" data-val="none"
                                                class="flex-1 py-2 rounded-md text-sm font-bold transition-colors ${state.ui.playoutBackend === 'none' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500 hover:text-slate-700'}">
                                                <i class="fa-solid fa-newspaper mr-1.5"></i>No Playout
                                            </button>
                                            <button data-action="set-playout-backend" data-val="radio"
                                                class="flex-1 py-2 rounded-md text-sm font-bold transition-colors ${state.ui.playoutBackend === 'radio' ? 'bg-white text-blue-700 shadow-sm' : 'text-slate-500 hover:text-slate-700'}">

        /**
         * Parses a story script string into an array of typed line objects for
         * the print layout. Recognises [BRACKET] instruction blocks, [CLIP:] tags,
         * and blank-line paragraph separators.
         * @param {string} script
         * @returns {{type: string, text: string}[]}
         */
        function parseScriptLines(script) {
            const lines = (script || '').split('\n').filter(l => l.trim());
            const rows = [];
            lines.forEach(line => {
                const trimmed = line.trim();
                const tags = [];
                const tagRegex = /\[([^\]]+)\]/g;
                let m;
                while ((m = tagRegex.exec(trimmed)) !== null) tags.push(m[1].toUpperCase());
                const spokenText = trimmed.replace(/\[[^\]]*\]/g, '').trim();
                if (tags.length > 0 && spokenText) {
                    rows.push({ direction: tags.join(' / '), script: spokenText });
                } else if (tags.length > 0) {
                    rows.push({ direction: tags.join(' / '), script: '' });
                } else if (spokenText) {
                    rows.push({ direction: '', script: spokenText });
                }
            });
            return rows;
        }

        /**
         * Opens a new browser window containing a print-formatted version of all
         * above-the-line scripts. Each story gets a header block (slug, format,
         * duration, staff) followed by the formatted script body. Triggers
         * window.print() automatically after a short delay.
         */
        function printScripts() {
            const order = state.meta.order || [];
            const markerIdx = order.indexOf('marker-line');
            const storyIds = (markerIdx > -1 ? order.slice(0, markerIdx) : order)
                .filter(id => id !== 'marker-line' && state.storiesMap[id] && !state.storiesMap[id].isFloated);

            if (storyIds.length === 0) { alert('No stories in the rundown to print.'); return; }

            const txSecs   = parseClockTime(state.meta.txClockTime);
            const rxSecs   = parseClockTime(state.meta.rxClockTime);
            const totalDur = storyIds.reduce((s, id) => s + (state.storiesMap[id]?.duration || 0), 0);
            const roomName = state.roomDisplayName || 'Bulletin';
            const printDate = new Date().toLocaleString('en-GB', {
                weekday: 'long', day: 'numeric', month: 'long',
                year: 'numeric', hour: '2-digit', minute: '2-digit'
            });

            let runningOffset = 0;
            let pageNum = 1;

            const coverRows = storyIds.map((id, idx) => {
                const story = state.storiesMap[id];
                const clockTime = (txSecs !== null) ? formatClockTime(txSecs + runningOffset) : '--:--:--';

            // We restore immediately after so the running app is unaffected.
            const _header = document.getElementById('header-container');
            const _main   = document.getElementById('main-container');
            const _modal  = document.getElementById('modal-container');
            const _savedHeader = _header.innerHTML;
            const _savedMain   = _main.innerHTML;
            const _savedModal  = _modal.innerHTML;
            _header.innerHTML = '';
            _main.innerHTML   = '';
            _modal.innerHTML  = '';

            // ── Fix 2: prepend DOCTYPE (outerHTML omits it) ───────────────────
            let html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;

            // Restore live UI immediately — export works on the string from here
            _header.innerHTML = _savedHeader;
            _main.innerHTML   = _savedMain;
            _modal.innerHTML  = _savedModal;

            // Each token is assembled at runtime — the literals here are fragments
            // that won't accidentally match the target strings in the source.

            // Replace the firebaseConfig loader block with a baked-in assignment
            const _cfgToken = 'let ' + 'firebaseConfig' + ' = null;';
            const _catchToken = '} ' + 'catch(e) { console.error("Config error", e); }';
            const _cfgStart = html.indexOf(_cfgToken);
            if (_cfgStart !== -1) {
                const _cfgEnd = html.indexOf(_catchToken, _cfgStart) + _catchToken.length;
                html = html.slice(0, _cfgStart)
                    + 'let ' + 'firebaseConfig = ' + configStr + ';'
                    + html.slice(_cfgEnd);
            }

            // Replace savedRoomName localStorage read with baked value
            const _roomToken = 'const ' + "savedRoomName = localStorage.getItem('moira_room_name') || 'Main';";
            html = html.replace(_roomToken,
                'const ' + 'savedRoomName = ' + JSON.stringify(state.roomDisplayName) + ';');

            // Replace savedBulletinId localStorage read with baked value
            const _bulletinToken = 'const ' + "savedBulletinId = localStorage.getItem('moira_bulletin_id') || 'bulletin-primary';";

            const safeRoomName = state.roomDisplayName.toLowerCase().replace(/[^a-z0-9]/g, '-');

                    if (!window.showDirectoryPicker) { alert('File System Access API is not supported in this browser. Use Chrome or Edge.'); return true; }
                    try {
                        const handle = await window.showDirectoryPicker({ mode: 'read' });
                        state.radio.directoryHandle = handle;
                        state.ui.mediaFolderPendingHandle = null;
                        await idbSaveHandle(handle);
                        radioLog(`Media folder granted: "${handle.name}"`, 'success');
                        render('modal');
                    } catch(e) {
                        if (e.name === 'AbortError') return true;
                        radioLog(`Folder access error: ${e.message}`, 'error');
                        showError(`Could not access media folder — ${e.message}`);
                    }
                    return true;
                }
                if (action === 'restore-media-folder') {
                    const pending = state.ui.mediaFolderPendingHandle;
                    if (!pending) return true;
                    try {
                        const perm = await pending.requestPermission({ mode: 'read' });
                        if (perm === 'granted') {
                            state.radio.directoryHandle = pending;
                            state.ui.mediaFolderPendingHandle = null;
                            await idbSaveHandle(pending);
                            radioLog(`Media folder restored: "${pending.name}"`, 'success');
                            render('modal');
                        } else if (perm === 'denied') {
                            radioLog('Folder access denied by browser.', 'error');
                            showError('Media folder access was denied. Use "Choose Folder" in Settings → Playout to grant access again.', 'Open Settings', () => { state.ui.isSettingsModalOpen = true; state.ui.settingsTab = 'playout'; render('modal'); });
                        }
                    } catch(e) { radioLog(`Restore failed: ${e.message}`, 'error'); }
                    return true;
                }
                if (action === 'revoke-media-folder') {
                    state.radio.directoryHandle = null;
                    state.ui.mediaFolderPendingHandle = null;
                    await idbClearHandle();
                    radioLog('Media folder access revoked.', 'info');
                    render('modal');
                    return true;
                }
                if (action === 'radio-refresh-devices') { populateRadioDevices(); return true; }
                if (action === 'set-playout-backend') {
                    const newBackend = val;
                    const oldBackend = state.ui.playoutBackend;
                    if (newBackend === oldBackend) return true;
                    if (oldBackend === 'obs') {
                        await OBS.disconnect();
                    } else if (oldBackend === 'radio') {
                        for (const dk of ['deckA', 'deckB']) {
                            const d = state.radio[dk];
                            if (d.audio) { d.audio.pause(); }
                            stopRadioMeter(d);
                            for (const n of [d.sourceNode, d.splitter, d.analyserL, d.analyserR, d.gainNode]) {
                                if (n) try { n.disconnect(); } catch(e2) {}
                            }
                            if (d.objectUrl) { URL.revokeObjectURL(d.objectUrl); }
                            state.radio[dk] = makeRadioDeckState(dk === 'deckA' ? 'A' : 'B');
                        }
                        if (radioAudioCtx) { try { await radioAudioCtx.close(); } catch(e2) {} radioAudioCtx = null; }
                        if (radioRafId) { cancelAnimationFrame(radioRafId); radioRafId = null; }
                        state.radio.log = [];
                    }
                    state.ui.playoutBackend = newBackend;
                    localStorage.setItem('moira_playout_backend', newBackend);
                    if (newBackend === 'obs')   { OBS.loadConfig(); OBS.connect(); }
                    else if (newBackend === 'radio') { loadRadioConfig(); populateRadioDevices(); }
                    render('main', 'modal');
                    return true;
                }
                return false;
            };

            const _handleStaff = async ({ action, id, val }) => {
                if (action === 'open-staff-modal')  { state.ui.isStaffModalOpen = true; render('modal'); return true; }
                if (action === 'close-staff-modal') { state.ui.isStaffModalOpen = false; render('modal'); return true; }
                if (action === 'add-staff') {
                    const nameInput = document.getElementById('new-staff-name');
                    const roleInput = document.getElementById('new-staff-role');
                    if (!nameInput || !roleInput) return true;
                    const name = nameInput.value.trim();
                    const role = roleInput.value;
                    if (name) {
                        const newId = crypto.randomUUID();
                        await updateStaffInCloud(current => [...current, { id: newId, name, role, checkedIn: false }]);
                        nameInput.value = '';
                    }
                    return true;
                }
                if (action === 'bulk-add-staff') {
                    const bulkInput = document.getElementById('bulk-staff-input');
                    if (!bulkInput) return true;
                    const names = bulkInput.value.split('\n').map(n => n.trim()).filter(n => n.length > 0);
                    if (names.length > 0) {
                        await updateStaffInCloud(current => [...current, ...names.map(name => ({ id: crypto.randomUUID(), name, role: 'Reporter', checkedIn: false }))]);
                        bulkInput.value = '';
                    }
                    return true;
                }
                if (action === 'check-in') {
                    state.myStaffId = id;
                    localStorage.setItem('moira_my_staff_id', id);
                    updateStaffInCloud(staff => staff.map(s => s.id === id ? { ...s, checkedIn: true, lastSeen: Date.now() } : s));
                    render('header');
                    return true;
                }
                if (action === 'check-out') {
                    state.myStaffId = null;
                    localStorage.removeItem('moira_my_staff_id');
                    updateStaffInCloud(staff => staff.map(s => s.id === id ? { ...s, checkedIn: false, lastSeen: null } : s));
                    render('header');
                    return true;
                }
                if (action === 'set-editor') {
                    const newEditor = state.meta.editorStaffId === id ? null : id;
                    state.meta.editorStaffId = newEditor;
                    render('header', 'main');
                    if (canMutate()) {
                        try { await DB.updateBulletin({ editorStaffId: newEditor }); }
                        catch(e) { showError('Could not set editor — ' + DB.errorMessage(e)); }
                    }
                    return true;
                }
                if (action === 'toggle-rundown-lock') {
                    if (state.meta.editorStaffId !== state.myStaffId) return true;
                    const newLocked = !state.meta.rundownLocked;
                    state.meta.rundownLocked = newLocked;
                    render('main');
                    if (canMutate()) {
                        try { await DB.updateBulletin({ rundownLocked: newLocked }); }
                        catch(e) { showError('Could not toggle rundown lock — ' + DB.errorMessage(e)); }
                    }
                    return true;
                }
                if (action === 'remove-staff') {
                    if (id === state.myStaffId) { state.myStaffId = null; localStorage.removeItem('moira_my_staff_id'); }
                    if (id === state.meta.editorStaffId) {
                        state.meta.editorStaffId = null;
                        state.meta.rundownLocked = false;
                        try { await DB.updateBulletin({ editorStaffId: null, rundownLocked: false }); }
                        catch(e) { showError('Could not clear editor — ' + DB.errorMessage(e)); }
                    }
                    updateStaffInCloud(staff => staff.filter(s => s.id !== id));
                    return true;
                }
                return false;
            };

            const _handleRundown = async ({ action, id, val }) => {
                if (action === 'set-mode') {
                    if (val === 'presenter' && state.mode === 'presenter') {
                        // Toggle between presenter and autocue if already in presenter mode
                        state.ui.presenter.presenterMode = state.ui.presenter.presenterMode === 'presenter' ? 'autocue' : 'presenter';
                    } else {
                        state.mode = val;
                        state.ui.lastScrolledStoryId = null;
                        if (val === 'director') {
                            const order     = state.meta.order || [];
                            const markerIdx = order.indexOf('marker-line');
                            const storyIds  = markerIdx > -1 ? order.slice(0, markerIdx) : order;
                            const firstPlayable = storyIds.find(id => state.storiesMap[id]?.type !== 'segment');
                            if (firstPlayable) { state.meta.activeStoryId = firstPlayable; state.meta.isCued = true; }
                            const activeOrder = storyIds.filter(id => !state.storiesMap[id]?.isFloated);
                            if (state.ui.playoutBackend === 'obs')        OBS.initialLoad(activeOrder);
                            else if (state.ui.playoutBackend === 'radio') radioInitialLoad(activeOrder);
                        }
                    }
                    render('header', 'main');
                    return true;
                }
                const isRundownLocked = state.meta.rundownLocked && state.meta.editorStaffId !== state.myStaffId;
                if (action === 'add-story')       { if (!isRundownLocked) addStory(); return true; }
                if (action === 'add-segment')     { if (!isRundownLocked) addSegment(); return true; }
                if (action === 'toggle-float')    { if (!isRundownLocked) toggleFloat(id); return true; }
                if (action === 'delete-story')    { if (!isRundownLocked) deleteStory(id); return true; }
                if (action === 'rescue-story')    { rescueStory(id); return true; }
                if (action === 'revert-story')    { revertStory(id); return true; }
                if (action === 'clear-trash')     { state.ui.trash = []; render('main'); return true; }
                if (action === 'toggle-complete') { toggleStoryComplete(id); return true; }
                if (action === 'join-room')       { switchRoom(document.getElementById('header-room-input').value); return true; }
                if (action === 'print-scripts')   { printScripts(); return true; }
                if (action === 'browse-media')    { document.getElementById('media-file-picker').click(); return true; }
                if (action === 'save-tx-time') {
                    const txVal = document.getElementById('tx-clock-input')?.value.trim() || '';
                    updateClockTime('txClockTime', txVal || null);
                    return true;
                }
                if (action === 'save-rx-time') {
                    const rxVal = document.getElementById('rx-clock-input')?.value.trim() || '';
                    updateClockTime('rxClockTime', rxVal || null);
                    return true;
                }
                if (action === 'reset-runorder') {
                    const rawOrder  = state.meta.order || [];
                    const markerIdx = rawOrder.indexOf('marker-line');
                    const storyIds  = (markerIdx > -1 ? rawOrder.slice(0, markerIdx) : rawOrder)
                        .filter(sid => !state.storiesMap[sid]?.isFloated && state.storiesMap[sid]?.type !== 'segment');
                    const firstId = storyIds[0] || null;
                    const now = Date.now();
                    const updates = {
                        activeStoryId:       firstId,
                        activeStoryStartedAt: firstId ? now : null,
                        showStartTime:        state.meta.isTXMode ? now : state.meta.showStartTime,
                        txStartedAt:          state.meta.isTXMode ? now : state.meta.txStartedAt,
                    };
                    updateActivePointer(updates);
                    await syncPlayoutToActive(firstId);
                    return true;
                }
                if (action === 'move-story-up') {
                    const idx = state.meta.order.indexOf(id);
                    if (idx > 0) await reorderStory(id, state.meta.order[idx - 1]);
                    return true;
                }
                if (action === 'move-story-down') {
                    const idx = state.meta.order.indexOf(id);
                    if (idx < state.meta.order.length - 1) await reorderStory(id, state.meta.order[idx + 2]);
                    return true;
                }
                return false;
            };

            const _handleEdit = async ({ action, id, val, e }) => {
                if (action === 'edit-story') {
                    state.ui.editingStoryId = id;
                    lockStory(id);
                    startLockRefresh(id);
                    render('modal');
                    return true;
                }
                if (action === 'cancel-edit') {
                    const editingId = state.ui.editingStoryId;
                    state.ui.editingStoryId = null;
                    stopLockRefresh();
                    if (editingId) unlockStory(editingId);
                    render('main', 'modal');
                    return true;
                }
                if (action === 'take-over-edit') {
                    const storyId  = state.ui.editingStoryId;
                    if (!storyId) return true;
                    const userName = getMyName();
                    const now      = Date.now();
                    if (state.storiesMap[storyId]) {
                        state.storiesMap[storyId].lockedBySession = state.sessionId;
                        state.storiesMap[storyId].lockedByName    = userName;
                        state.storiesMap[storyId].lockedAt        = now;
                    }
                    render('modal');
                    try { await DB.takeLock(storyId, state.sessionId, userName, now); }
                    catch(e) { showError('Could not take over edit — ' + DB.errorMessage(e)); }
                    return true;
                }
                if (action === 'save-edit') {
                    stopLockRefresh();
                    let durStr = document.getElementById('edit-duration').value;
                    let parsedDuration = 0;
                    if (durStr.includes(':')) {
                        const [m, s] = durStr.split(':');
                        parsedDuration = (parseInt(m, 10) || 0) * 60 + (parseInt(s, 10) || 0);
                    } else {
                        parsedDuration = parseInt(durStr, 10) || 0;
                    }
                    const editingStory = state.storiesMap[state.ui.editingStoryId];
                    if (editingStory?.type === 'segment') {
                        saveStory(state.ui.editingStoryId, {
                            slug:     document.getElementById('edit-slug').value.toUpperCase(),
                            duration: parsedDuration,
                            rev:      parseInt(document.getElementById('edit-rev').value, 10)
                        });
                    } else {
                        saveStory(state.ui.editingStoryId, {
                            slug:        document.getElementById('edit-slug').value,
                            format:      document.getElementById('edit-format').value,
                            presenterId: document.getElementById('edit-presenter').value,
                            reporterId:  document.getElementById('edit-reporter').value,
                            mediaFile:   document.getElementById('edit-media-file').value.trim(),
                            duration:    parsedDuration,
                            script:      document.getElementById('edit-script').value,
                            rev:         parseInt(document.getElementById('edit-rev').value, 10)
                        });
                    }
                    return true;
                }
                if (action === 'resolve-conflict') {
                    const { storyId, serverData, localData } = state.ui.pendingConflict;
                    if (val === 'overwrite') {
                        stopLockRefresh();
                        localData.rev = serverData.rev;
                        state.ui.pendingConflict = null;
                        saveStory(storyId, localData);
                    } else {
                        state.ui.pendingConflict  = null;
                        state.ui.editingStoryId   = null;
                        stopLockRefresh();
                        unlockStory(storyId);
                        render('main', 'modal');
                    }
                    return true;
                }
                if (action === 'inline-edit-slug') {
                    const story = state.storiesMap[id];
                    if (!canMutate()) return true;
                    if (!story || (story.lockedBySession && story.lockedBySession !== state.sessionId)) return true;
                    state.ui.inlineEditingId = id;
                    await lockStory(id);
                    const liveSpan = document.querySelector(`[data-action="inline-edit-slug"][data-id="${id}"]`);
                    if (!liveSpan) { state.ui.inlineEditingId = null; render('main'); return true; }
                    const originalSlug = state.storiesMap[id]?.slug ?? '';
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.value = originalSlug;
                    input.className = 'w-full border-2 border-blue-500 rounded px-1 text-slate-800 font-semibold outline-none bg-white shadow-sm ring-2 ring-blue-100';
                    let committed  = false;
                    let escapedOut = false;
                    const finish = async (save) => {
                        if (committed) return;
                        committed = true;
                        state.ui.inlineEditingId = null;
                        const newSlug = input.value.trim();
                        if (save && !escapedOut && newSlug && newSlug !== originalSlug) {
                            state.storiesMap[id].slug = newSlug;
                            render('main');
                            try {
                                await DB.saveSlug(id, newSlug, state.sessionId);
                                if (state.storiesMap[id]) {
                                    state.storiesMap[id].lockedBySession = null;
                                    state.storiesMap[id].lockedByName    = null;
                                    state.storiesMap[id].lockedAt        = null;
                                }
                            } catch(e) {
                                showError('Slug not saved — ' + DB.errorMessage(e));
                                await unlockStory(id);
                                render('main');
                            }
                        } else {
                            await unlockStory(id);
                            render('main');
                        }
                    };
                    input.addEventListener('keydown', async ev => {
                        if (ev.key === 'Enter')  { ev.preventDefault(); ev.stopPropagation(); input.blur(); }
                        else if (ev.key === 'Escape') { ev.preventDefault(); ev.stopPropagation(); escapedOut = true; input.blur(); await finish(false); }
                    });
                    input.addEventListener('blur', () => { if (!escapedOut) finish(true); });
                    liveSpan.replaceWith(input);
                    input.focus();
                    input.select();
                    return true;
                }
                return false;
            };

            const _handleTX = ({ action, val }) => {
                if (action === 'studio-tx-toggle') { updateStudioMode(state.meta.isTXMode ? 'standby' : 'tx'); return true; }
                if (action === 'set-studio-state') { updateStudioMode(val); return true; }
                if (action === 'take-next')         { shiftActiveStory(1);  return true; }
                if (action === 'undo-take')         { shiftActiveStory(-1); return true; }
                return false;
            };

            const _handlePresenter = async ({ action, id, val, e }) => {
                if (action === 'presenter-font-up')       { state.ui.presenter.fontScale   = Math.min(state.ui.presenter.fontScale + 0.15, 2.5);   render('main'); return true; }
                if (action === 'presenter-font-down')     { state.ui.presenter.fontScale   = Math.max(state.ui.presenter.fontScale - 0.15, 0.4);   render('main'); return true; }
                if (action === 'presenter-speed-up')      { state.ui.presenter.scrollSpeed = Math.min(state.ui.presenter.scrollSpeed + 5, 200);     render('main'); return true; }
                if (action === 'presenter-speed-down')    { state.ui.presenter.scrollSpeed = Math.max(state.ui.presenter.scrollSpeed - 5, 0);       render('main'); return true; }
                if (action === 'presenter-scroll-toggle') { state.ui.presenter.autoScroll  = !state.ui.presenter.autoScroll;                        render('main'); return true; }
                if (action === 'presenter-toggle-font')   { state.ui.presenter.cardsFontLarge = !state.ui.presenter.cardsFontLarge;                  render('main'); return true; }
                if (action === 'presenter-find') {
                    const term = document.getElementById('presenter-search')?.value.trim();
                    if (term) { state.ui.presenter.searchTerm = term; render('main'); }
                    return true;
                }
                if (action === 'presenter-story-prev' || action === 'presenter-story-next') {
                    const dir       = action === 'presenter-story-next' ? 1 : -1;
                    const rawOrder  = state.meta.order || [];
                    const markerIdx = rawOrder.indexOf('marker-line');
                    const storyIds  = (markerIdx > -1 ? rawOrder.slice(0, markerIdx) : rawOrder)
                        .filter(sid => !state.storiesMap[sid]?.isFloated && state.storiesMap[sid]?.type !== 'segment');
                    const cur = storyIds.indexOf(state.meta.activeStoryId);
                    const nxt = cur + dir;
                    if (nxt >= 0 && nxt < storyIds.length) {
                        state.meta.activeStoryId      = storyIds[nxt];
                        state.ui.lastScrolledStoryId  = storyIds[nxt];
                        render('main');
                    }
                    return true;
                }
                if (action === 'ref-toggle-expand') {
                    state.ui.presenter.expandedStoryId = state.ui.presenter.expandedStoryId === id ? null : id;
                    render('main');
                    return true;
                }
                if (action === 'toggle-alert-panel') {
                    state.ui.alertPanelOpen = !state.ui.alertPanelOpen;
                    render('main');
                    return true;
                }
                if (action === 'send-presenter-alert') {
                    const input   = document.getElementById('presenter-alert-input');
                    const text    = input?.value.trim();
                    const me      = (state.meta.staff||[]).find(s => s.id === state.myStaffId);
                    const canAlert = !!me && (me.role === 'Producer' || state.meta.editorStaffId === state.myStaffId);
                    if (text && canAlert) {
                        const sentBy = getMyName();
                        updatePresenterAlert({ text, sentAt: Date.now(), sentBy });
                        try { await DB.sendMessage(sentBy, text); }
                        catch(e) { console.warn('Message send failed:', e); showToast(sentBy, text); }
                        if (input) input.value = '';
                        state.ui.alertPanelOpen = false;
                        render('main');
                    }
                    return true;
                }
                if (action === 'clear-presenter-alert') {
                    updatePresenterAlert(null);
                    state.ui.alertPanelOpen = false;
                    render('main');
                    return true;
                }
                if (action === 'director-stop-presenter-clip') {
                    // Write the stop command — master machine's snapshot listener will execute teardown
                    updatePresenterClip(state.meta.presenterClipStoryId, 'stop');
                    // If this is the master, also tear down locally without waiting for the echo
                    if (isPlaybackMaster() && state.ui.presenter.playingClipStoryId) {
                        _stopPresenterCountdown();
                        if (state.ui.presenter.clipAudio) {
                            state.ui.presenter.clipAudio.pause();
                            if (state.ui.presenter.clipAudio.objectUrl) URL.revokeObjectURL(state.ui.presenter.clipAudio.objectUrl);
                            state.ui.presenter.clipAudio = null;
                        }
                        state.ui.presenter.playingClipStoryId = null;
                        updatePresenterClip(null, null);
                        render('main');
                    }
                    return true;
                }
                if (action === 'presenter-fire-clip') {
                    const storyId = e.target.closest('[data-id]')?.dataset.id || id;
                    if (storyId) presenterFireClip(storyId);
                    return true;
                }
                return false;
            };

            const _handleRadio = ({ action, id, e }) => {
                const deckKey = id === 'B' ? 'deckB' : 'deckA';
                const deck    = id === 'B' ? 'B' : 'A';
                if (action === 'radio-play')  { radioPlay(deckKey);   return true; }
                if (action === 'radio-pause') { radioPause(deckKey);  return true; }
                if (action === 'radio-stop')  { radioStop(deckKey);   return true; }
                if (action === 'radio-cue')   { radioCue(deckKey);    return true; }
                if (action === 'radio-take')  { radioExecuteTake();   return true; }
                if (action === 'radio-scrub') { radioScrub(deck, e);  return true; }
                return false;
            };

            // Dispatcher — routes to the appropriate handler group in priority order
            document.body.addEventListener('click', async e => {
                const btn = e.target.closest('[data-action]');
                if (!btn) return;
                const ctx = {
                    action: btn.getAttribute('data-action'),
                    id:     btn.getAttribute('data-id'),
                    val:    btn.getAttribute('data-val'),
                    e
                };

                if (await _handleSettings(ctx))  return;
                if (await _handleStaff(ctx))     return;
                if (await _handleRundown(ctx))   return;
                if (await _handleEdit(ctx))      return;
                if (      _handleTX(ctx))        return;
                if (await _handlePresenter(ctx)) return;
                          _handleRadio(ctx);
            });


            document.body.addEventListener('click', e => {
                const btn = e.target.closest('[data-obs-action]');
                if (!btn) return;
                const obsAction = btn.getAttribute('data-obs-action');
                const deck = btn.getAttribute('data-deck');

                if (obsAction === 'reconnect') { OBS.connect(); return; }
                if (obsAction === 'take')      { OBS.executeTake(); return; }
                if (obsAction === 'l3-update') { OBS.updateL3Text(); return; }
                if (obsAction === 'l3-show')   { OBS.toggleL3(true); return; }
                if (obsAction === 'l3-hide')   { OBS.toggleL3(false); return; }
                if (obsAction === 'play')  { OBS.mediaAction(deck, 'OBS_WEBSOCKET_MEDIA_INPUT_ACTION_PLAY');  return; }
                if (obsAction === 'pause') { OBS.mediaAction(deck, 'OBS_WEBSOCKET_MEDIA_INPUT_ACTION_PAUSE'); return; }
                if (obsAction === 'stop')  { OBS.mediaAction(deck, 'OBS_WEBSOCKET_MEDIA_INPUT_ACTION_STOP');  return; }
                if (obsAction === 'cue')   { OBS.setCursor(deck, 0); return; }
            });


            // Radio file load
            document.body.addEventListener('change', e => {
                // Inline role change in staff modal
                if (e.target.dataset.action === 'change-role') {
                    const staffId = e.target.dataset.id;
                    const newRole = e.target.value;
                    if (staffId && newRole) {
                        updateStaffInCloud(staff => staff.map(s => s.id === staffId ? { ...s, role: newRole } : s));
                    }
                    return;
                }
                if (!e.target.id.startsWith('radio-file-')) return;
                const deckId  = e.target.id.replace('radio-file-', '');
                const deckKey = deckId === 'A' ? 'deckA' : 'deckB';
                const file    = e.target.files[0];
                if (file) radioLoadFile(deckKey, file);
                e.target.value = '';
            });

            document.body.addEventListener('change', e => {
                if (e.target && e.target.id === 'media-file-picker') {
                    const file = e.target.files[0];
                    if (file) { const input = document.getElementById('edit-media-file'); if (input) input.value = file.name; }
                }
            });

            document.body.addEventListener('dragstart', e => {
                const row = e.target.closest('[data-story-id]');
                const isRundownLocked = state.meta.rundownLocked && state.meta.editorStaffId !== state.myStaffId;
                if (row && !isRundownLocked) {
                    const dragStoryId = row.getAttribute('data-story-id');
                    const dragStory = state.storiesMap[dragStoryId];
                    const storyLockedByOther = dragStory?.lockedBySession && dragStory.lockedBySession !== state.sessionId &&
                        dragStory.lockedAt && (Date.now() - dragStory.lockedAt <= STALE_LOCK_MS);
                    if (!storyLockedByOther) {
                        state.ui.draggedStoryId = dragStoryId;
                        e.dataTransfer.effectAllowed = 'move';
                        setTimeout(() => row.classList.add('opacity-30'), 0);
                    } else {
                        e.preventDefault();
                    }
                }
            });
            document.body.addEventListener('dragend', e => {
                const row = e.target.closest('[data-story-id]');
                if (row) row.classList.remove('opacity-30');
                state.ui.draggedStoryId = null; render('main');
            });
            document.body.addEventListener('dragover', e => {
                e.preventDefault();
                document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
                const row = e.target.closest('[data-story-id]');
                if (row && row.getAttribute('data-story-id') !== state.ui.draggedStoryId) row.classList.add('drag-over');
            });
            document.body.addEventListener('dragleave', e => { const row = e.target.closest('[data-story-id]'); if (row) row.classList.remove('drag-over'); });
            document.body.addEventListener('drop', e => {
                e.preventDefault();
                const dropTarget = e.target.closest('[data-story-id]');
                if (dropTarget) {
                    dropTarget.classList.remove('drag-over');
                    const targetId = dropTarget.getAttribute('data-story-id');
                    if (state.ui.draggedStoryId && state.ui.draggedStoryId !== targetId) reorderStory(state.ui.draggedStoryId, targetId);
                }
            });
        }

        window.addEventListener('beforeunload', () => {
            if (txTimerInterval) clearInterval(txTimerInterval);
            // OBS telemetry cleared by OBS.disconnect() / module teardown
            if (unsubAll) { unsubAll(); unsubAll = null; }
            releaseWakeLock();
            // Release any held story lock so other users aren't blocked
            stopLockRefresh();
            if (state.ui.editingStoryId) unlockStory(state.ui.editingStoryId);
            // Clear presenter clip state so director view doesn't show a stale badge
            if (state.meta.presenterClipStoryId) {
                updateBulletinMeta({ presenterClipStoryId: null, presenterClipCommand: null });
            }
            // Clear any live presenter alert
            if (state.meta.presenterAlert) {
                updateBulletinMeta({ presenterAlert: null });
            }
        });

        boot();

    </script>
</body>
</html>
