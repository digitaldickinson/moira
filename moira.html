                            <tr class="bg-slate-50 border-b border-slate-200 text-xs uppercase tracking-wider text-slate-500">
                                <th class="px-4 py-3 w-10 text-center"><i class="fa-solid fa-arrows-up-down"></i></th>
                                <th class="px-4 py-3">Slug</th>
                                <th class="px-4 py-3">Fmt</th>
                                <th class="px-4 py-3">Staff</th>
                                <th class="px-4 py-3">Dur</th>
                                <th class="px-4 py-3">Clock</th>
                                <th class="px-4 py-3">Preview</th>
                                <th class="px-4 py-3 text-center">Done</th>
                                <th class="px-4 py-3 text-center">Float</th>
                                <th class="px-4 py-3 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="rundown-table-body">
                            ${rows}
                            <tr data-story-id="end-of-list" class="h-16 bg-transparent"><td colspan="10"></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>`;
        }




       function renderPresenter() {
            const rawOrder = state.meta.order || [];
            const markerIdx = rawOrder.indexOf('marker-line');
            const storyIds = (markerIdx > -1 ? rawOrder.slice(0, markerIdx) : rawOrder)
                .filter(id => !state.storiesMap[id]?.isFloated);

            if (storyIds.length === 0) {
                return `<div class="flex h-full items-center justify-center bg-black text-slate-600 text-3xl font-light">Standing By...</div>`;
            }

            const pm = state.ui.presenter;
            const isLive = state.meta.isTXMode;
            const isRehearsal = state.meta.isRehearsalMode;

            if (pm.presenterMode === 'autocue') {
                return renderAutocue(storyIds);
            } else {
                return renderPresenterCards(storyIds);
            }
        }

        // ── AUTOCUE MODE ─────────────────────────────────────────────────────
        function renderAutocue(storyIds) {
            const pm = state.ui.presenter;
            const fontSize = Math.round(48 * pm.fontScale);
            const scaleX = pm.mirrorX ? -1 : 1;
            const scaleY = pm.mirrorY ? -1 : 1;
            const transformStyle = `transform: scale(${scaleX}, ${scaleY}); transform-origin: center top;`;
            const isLive = state.meta.isTXMode;
            const isRehearsal = state.meta.isRehearsalMode;
            const activeColour = isLive ? '#ef4444' : isRehearsal ? '#f59e0b' : '#3b82f6';

            const storiesHtml = storyIds.map(id => {
                const story = state.storiesMap[id];
                if (!story) return '';
                const isActive = state.meta.activeStoryId === id;
                const clipSecs = parseClipTags(story.script);

                return `
                    <div id="presenter-story-${id}" class="mb-16">
                        <div style="background:${isActive ? activeColour : '#1e293b'}; transition: background 0.4s;"
                            class="w-full px-6 py-3 flex items-center gap-4 rounded-lg mb-6">
                            <span class="text-white font-black text-lg tracking-widest uppercase opacity-60">${escapeHTML(story.format)}</span>
                            <span class="text-white font-black text-2xl tracking-widest uppercase">${escapeHTML(story.slug)}</span>
                            <span class="ml-auto text-white opacity-60 text-sm font-mono">${formatDuration(story.duration)}${clipSecs > 0 ? ' +' + formatDuration(clipSecs) + ' clip' : ''}</span>
                        </div>
                        <div style="font-size:${fontSize}px; line-height:1.7; opacity:${isActive ? 1 : 0.25}; transition: opacity 0.4s;"
                            class="text-white font-medium tracking-wide">
                            ${formatPresenterScript(story.script)}
                        </div>
                    </div>`;
            }).join('');

            // Controls bar — fixed at bottom
            const speed = pm.scrollSpeed;
            const activeIdx = storyIds.indexOf(state.meta.activeStoryId);
            const atFirst = activeIdx <= 0;
            const atLast = activeIdx === storyIds.length - 1;
            const btnNav = 'px-4 py-2 rounded font-black text-sm tracking-widest transition-colors';
            const btnNavOn = `${btnNav} bg-slate-700 hover:bg-slate-600 text-white`;
            const btnNavOff = `${btnNav} bg-slate-900 text-slate-700 cursor-not-allowed`;

            const controlsBar = `
                <div class="fixed bottom-0 left-0 right-0 z-50 flex items-center justify-between px-6 py-3 bg-black/80 backdrop-blur-sm border-t border-slate-800">
                    <div class="flex items-center gap-3">
                        <span class="text-slate-500 text-xs font-bold uppercase tracking-widest">Size</span>
                        <button data-action="presenter-font-down" class="w-8 h-8 rounded bg-slate-800 hover:bg-slate-700 text-white font-black text-lg flex items-center justify-center">−</button>
                        <span class="text-white text-xs font-mono w-8 text-center">${fontSize}</span>
                        <button data-action="presenter-font-up" class="w-8 h-8 rounded bg-slate-800 hover:bg-slate-700 text-white font-black text-lg flex items-center justify-center">+</button>
                    </div>
                    <div class="flex items-center gap-3">
                        <button data-action="presenter-story-prev" ${atFirst ? 'disabled' : ''} class="${atFirst ? btnNavOff : btnNavOn}">◀ Prev</button>
                        <button data-action="presenter-scroll-toggle"
                            class="px-6 py-2 rounded font-black text-sm tracking-widest transition-colors ${pm.autoScroll ? 'bg-white text-black hover:bg-slate-200' : 'bg-slate-700 text-white hover:bg-slate-600'}">
                            ${pm.autoScroll ? '⏸ PAUSE' : '▶ SCROLL'}
                        </button>
                        <button data-action="presenter-story-next" ${atLast ? 'disabled' : ''} class="${atLast ? btnNavOff : btnNavOn}">Next ▶</button>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-slate-500 text-xs font-bold uppercase tracking-widest">Speed</span>
                        <button data-action="presenter-speed-down" class="w-8 h-8 rounded bg-slate-800 hover:bg-slate-700 text-white font-black text-lg flex items-center justify-center">−</button>
                        <span class="text-white text-xs font-mono w-8 text-center">${speed}</span>
                        <button data-action="presenter-speed-up" class="w-8 h-8 rounded bg-slate-800 hover:bg-slate-700 text-white font-black text-lg flex items-center justify-center">+</button>
                    </div>
                </div>`;

            return `
                <div class="bg-black min-h-full overflow-hidden">
                    <div id="presenter-transform-wrapper" style="${transformStyle}"
                        class="transition-transform duration-300 pb-32">
                        <div style="max-width:65%; margin:0 auto;" class="px-4">
                            <div class="py-[40vh]">
                                ${storiesHtml}
                            </div>
                        </div>
                    </div>
                    ${controlsBar}
                </div>`;
        }

        // ── REFERENCE MODE ────────────────────────────────────────────────────
        function renderPresenterCards(storyIds) {
            const isLive = state.meta.isTXMode;
            const isRehearsal = state.meta.isRehearsalMode;

            // Calculate remaining programme time from active story onwards
            const activeIdx = storyIds.indexOf(state.meta.activeStoryId);
            const remaining = storyIds.slice(activeIdx > -1 ? activeIdx : 0)
                .reduce((s, id) => s + (state.storiesMap[id]?.duration || 0), 0);

            const expandedId = state.ui.presenter.expandedStoryId;

            const cards = storyIds.map((id, idx) => {
                const story = state.storiesMap[id];
                if (!story) return '';
                const isActive = state.meta.activeStoryId === id;
                const isPast = activeIdx > -1 && idx < activeIdx;
                const isNext = activeIdx > -1 && idx === activeIdx + 1;
                const isExpanded = expandedId === id;
                const clipSecs = parseClipTags(story.script);

                let cardStyle = 'bg-white border border-slate-200';
                let headerStyle = 'bg-slate-100 text-slate-600';
                if (isActive) {
                    cardStyle = `bg-white border-2 shadow-lg ${isLive ? 'border-red-500' : isRehearsal ? 'border-amber-500' : 'border-blue-500'}`;
                    headerStyle = isLive ? 'bg-red-600 text-white' : isRehearsal ? 'bg-amber-500 text-white' : 'bg-blue-600 text-white';
                } else if (isNext) {
                    cardStyle = 'bg-white border-2 border-blue-200 shadow-sm';
                    headerStyle = 'bg-blue-50 text-blue-800';
                } else if (isPast) {
                    cardStyle = 'bg-slate-50 border border-slate-100 opacity-40';
                    headerStyle = 'bg-slate-100 text-slate-400';
                }
                if (isExpanded) cardStyle += ' ring-2 ring-offset-1 ring-slate-400';

                return `
                    <div id="ref-story-${id}" class="rounded-xl overflow-hidden ${cardStyle} cursor-pointer select-none"
                        data-action="ref-toggle-expand" data-id="${id}">
                        <div class="px-4 py-2 flex items-center justify-between ${headerStyle}">
                            <div class="flex items-center gap-3">
                                <span class="font-black text-xs tracking-widest uppercase">${escapeHTML(story.format)}</span>
                                <span class="font-black text-base uppercase tracking-wide">${escapeHTML(story.slug)}</span>
                                ${isActive ? `<span class="text-xs font-bold opacity-75">● ON AIR</span>` : ''}
                                ${isNext ? `<span class="text-xs font-bold text-blue-600">NEXT</span>` : ''}
                            </div>
                            <div class="flex items-center gap-3 text-xs font-mono opacity-75">
                                ${clipSecs > 0 ? `<span class="bg-amber-500 text-white px-1.5 py-0.5 rounded text-[10px] font-bold">CLIP +${formatDuration(clipSecs)}</span>` : ''}
                                <span>${formatDuration(story.duration)}</span>
                                <span class="ml-1 opacity-60">${isExpanded ? '▲' : '▼'}</span>
                            </div>
                        </div>
                        ${isExpanded ? `
                        <div class="px-5 py-4 bg-white">
                            <p class="text-base text-slate-800 leading-relaxed whitespace-pre-wrap">${escapeHTML(story.script || 'No script.')}</p>
                        </div>` : (isActive || isNext) ? `
                        <div class="px-4 py-2">
                            <p class="text-sm text-slate-500 leading-relaxed line-clamp-2 italic">${escapeHTML(story.script?.split('\n').find(l => l.trim()) || '')}</p>
                        </div>` : ''}
                    </div>`;
            }).join('');

            return `
                <div class="bg-slate-100 min-h-full">
                    <div class="px-4 pb-8 max-w-2xl mx-auto">
                        <div class="py-4 flex items-center justify-between">
                            <span class="text-slate-500 text-sm font-bold uppercase tracking-widest">Running Order</span>
                            <div class="text-right">
                                <div class="text-xs text-slate-400 uppercase tracking-widest">Remaining</div>
                                <div class="font-mono font-black text-2xl ${remaining < 120 ? 'text-red-600' : 'text-slate-800'}">${formatDuration(remaining)}</div>
                            </div>
                        </div>
                        <div class="flex flex-col gap-3">
                            ${cards}
                        </div>
                    </div>
                </div>`;
        }



        function renderModals() {
            if (state.ui.editingStoryId && !state.ui.pendingConflict) return renderEditModal();
            if (state.ui.isSettingsModalOpen) return renderSettingsModal();
            if (state.ui.isStaffModalOpen) return renderStaffModal();
            if (state.ui.pendingConflict) return renderConflictModal();
            return '';
        }

        function renderEditModal() {
            const story = state.storiesMap[state.ui.editingStoryId];
            if (!story) return '';
            const formats = state.meta.formats || DEFAULT_FORMATS;
            const formatOptions = formats.map(f => `<option value="${f}" ${story.format === f ? 'selected' : ''}>${f}</option>`).join('');
            const isLocked = story.lockedBySession && story.lockedBySession !== state.sessionId;
            const staffOptions = (selectedId, roleFilter = null) => `<option value="">-- Unassigned --</option>` + state.meta.staff.filter(s => roleFilter ? s.role === roleFilter : true).map(s => `<option value="${s.id}" ${s.id === selectedId ? 'selected' : ''}>${escapeHTML(s.name)} (${escapeHTML(s.role)})</option>`).join('');

            return `<div class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4 z-[60]">
                <div class="bg-white rounded-2xl shadow-2xl w-full max-w-3xl flex flex-col max-h-full overflow-hidden">
                    <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-slate-50"><h3 class="text-xl font-bold text-slate-800"><i class="fa-solid fa-pen-to-square mr-2 text-blue-500"></i> Edit Story</h3><button data-action="cancel-edit" class="text-slate-400 hover:text-slate-600 text-2xl"><i class="fa-solid fa-xmark"></i></button></div>
                    ${isLocked ? `<div class="bg-amber-100 border-b border-amber-200 px-6 py-3 flex items-center justify-between"><span class="text-amber-800 text-sm">Editing by ${escapeHTML(story.lockedByName)}.</span><button data-action="take-over-edit" class="text-xs bg-white text-amber-700 border px-3 py-1 rounded shadow-sm">Take Over</button></div>` : ''}

        function parseScriptLines(script) {
            const lines = (script || '').split('\n').filter(l => l.trim());
            const rows = [];
            lines.forEach(line => {
                const trimmed = line.trim();
                // Collect all [TAG] instances on this line
                const tags = [];
                const tagRegex = /\[([^\]]+)\]/g;
                let m;
                while ((m = tagRegex.exec(trimmed)) !== null) tags.push(m[1].toUpperCase());
                // Strip all tags to get the spoken text
                const spokenText = trimmed.replace(/\[[^\]]*\]/g, '').trim();
                if (tags.length > 0 && spokenText) {
                    // Tags alongside spoken text — direction left, script right on same row
                    rows.push({ direction: tags.join(' / '), script: spokenText });

                                    await runTransaction(db, async transaction => {
                                        const snap = await transaction.get(storyRef);
                                        if (!snap.exists()) throw new Error('Story missing');
                                        const serverData = snap.data();
                                        if (serverData.lockedBySession && serverData.lockedBySession !== state.sessionId) throw new Error('Lock mismatch');
                                        transaction.update(storyRef, {
                                            slug: newSlug,
                                            rev: serverData.rev + 1,
                                            lockedBySession: null,
                                            lockedByName: null,
                                            lockedAt: null
                                        });
                                    });
                                } catch(e) {
                                    console.error('Inline save failed', e);
                                    await unlockStory(id);
                                    render();
                                }
                            }
                        } else {
                            await unlockStory(id);
                            render();
                        }
                    };

                    input.onblur = () => finish(true);
                    input.onkeydown = async ev => {
                        if (ev.key === 'Enter') { ev.preventDefault(); finish(true); }
                        if (ev.key === 'Escape') { ev.preventDefault(); finish(false); }
                    };

                    liveSpan.replaceWith(input);
                    input.focus();
                    input.select();
                }

                if (action === 'print-scripts') {printScripts();}
                if (action === 'browse-media') document.getElementById('media-file-picker').click();
                if (action === 'take-over-edit') {
                    const storyId = state.ui.editingStoryId;
                    if (!storyId) return;
                    const userName = getMyName();
                    const now = Date.now();
                    if (state.localMode) {
                        state.storiesMap[storyId].lockedBySession = state.sessionId;
                        state.storiesMap[storyId].lockedByName = userName;
                        state.storiesMap[storyId].lockedAt = now;
                        render();
                    } else {
                        try {
                            const storyRef = doc(db, ...paths.stories, storyId);
                            await runTransaction(db, async (t) => {
                                const snap = await t.get(storyRef);
                                if (!snap.exists()) throw "Story missing";
                                const data = snap.data();
                                const isStale = data.lockedAt && (now - data.lockedAt > STALE_LOCK_MS);
                                // Fix 2: Stale check in transaction
                                if (isStale) {
                                    t.update(storyRef, { lockedBySession: state.sessionId, lockedByName: userName, lockedAt: now });
                                } else {
                                    throw "Lock is still fresh";
                                }
                            });
                        } catch(e) { console.error("Takeover failed:", e); }
                    }
                }
                if (action === 'cancel-edit') { const editingId = state.ui.editingStoryId; state.ui.editingStoryId = null; if (editingId) unlockStory(editingId); render(); }
                
                if (action === 'add-staff') {
                    const nameInput = document.getElementById('new-staff-name');
                    const roleInput = document.getElementById('new-staff-role');
                    if (!nameInput || !roleInput) return;
                    const name = nameInput.value.trim();
                    const role = roleInput.value;
                    if (name) {
                        const newId = crypto.randomUUID();
                        await updateStaffInCloud(currentStaff => [...currentStaff, { id: newId, name, role, checkedIn: false }]);
                        // Fix 3: Clearing moved inside conditional
                        nameInput.value = '';
                    }
                }
                if (action === 'bulk-add-staff') {
                    const bulkInput = document.getElementById('bulk-staff-input');
                    if (!bulkInput) return;
                    const names = bulkInput.value.split('\n').map(n => n.trim()).filter(n => n.length > 0);
                    if (names.length > 0) {
                        await updateStaffInCloud(currentStaff => [...currentStaff, ...names.map(name => ({ id: crypto.randomUUID(), name, role: 'Reporter', checkedIn: false }))]);
                        // Fix 3: Clearing moved inside conditional
                        bulkInput.value = '';
                    }
                }
                if (action === 'check-in') {
                    state.myStaffId = id;
                    localStorage.setItem('moira_my_staff_id', id);
                    updateStaffInCloud(staff => staff.map(s => s.id === id ? { ...s, checkedIn: true, lastSeen: Date.now() } : s));
                    render();
                }
                if (action === 'check-out') {
                    state.myStaffId = null;
                    localStorage.removeItem('moira_my_staff_id');
                    updateStaffInCloud(staff => staff.map(s => s.id === id ? { ...s, checkedIn: false, lastSeen: null } : s));
                    render();
                }
                if (action === 'set-editor') {
                    const currentEditor = state.meta.editorStaffId;
                    const newEditor = currentEditor === id ? null : id;
                    if (state.localMode) {
                        state.meta.editorStaffId = newEditor;
                        render();
                    } else if (canMutate()) {
                        const bullRef = doc(db, ...paths.bulletins, state.currentBulletinId);
                        await updateDoc(bullRef, { editorStaffId: newEditor });
                    }
                }
                if (action === 'toggle-rundown-lock') {
                    const isEditor = state.meta.editorStaffId === state.myStaffId;
                    if (!isEditor) return;
                    const newLocked = !state.meta.rundownLocked;
                    if (state.localMode) {
                        state.meta.rundownLocked = newLocked;
                        render();
                    } else if (canMutate()) {
                        const bullRef = doc(db, ...paths.bulletins, state.currentBulletinId);
                        await updateDoc(bullRef, { rundownLocked: newLocked });
                    }
                }
                if (action === 'remove-staff') {
                    if (id === state.myStaffId) { state.myStaffId = null; localStorage.removeItem('moira_my_staff_id'); }
                    // If removed person was editor, clear that too
                    if (id === state.meta.editorStaffId) {
                        if (state.localMode) { state.meta.editorStaffId = null; }
                        else { const bullRef = doc(db, ...paths.bulletins, state.currentBulletinId); updateDoc(bullRef, { editorStaffId: null, rundownLocked: false }); }
                    }
                    updateStaffInCloud(staff => staff.filter(s => s.id !== id));
                }
                if (action === 'save-edit') {
                    let durStr = document.getElementById('edit-duration').value;
                    let parsedDuration = 0;
                    if (durStr.includes(':')) { const [m, s] = durStr.split(':'); parsedDuration = (parseInt(m, 10) || 0) * 60 + (parseInt(s, 10) || 0); } else { parsedDuration = parseInt(durStr, 10) || 0; }
                    const scriptText = document.getElementById('edit-script').value;
                    parsedDuration += parseClipTags(scriptText);
                    saveStory(state.ui.editingStoryId, { slug: document.getElementById('edit-slug').value, format: document.getElementById('edit-format').value, presenterId: document.getElementById('edit-presenter').value, reporterId: document.getElementById('edit-reporter').value, mediaFile: document.getElementById('edit-media-file').value.trim(), duration: parsedDuration, script: scriptText, rev: parseInt(document.getElementById('edit-rev').value, 10) });
                }
                if (action === 'resolve-conflict') {
                    const { storyId, serverData, localData } = state.ui.pendingConflict;
                    if (val === 'overwrite') { localData.rev = serverData.rev; state.ui.pendingConflict = null; saveStory(storyId, localData); } else { state.ui.pendingConflict = null; state.ui.editingStoryId = null; unlockStory(storyId); render(); }
                }
                if (action === 'take-next') shiftActiveStory(1);
                if (action === 'undo-take') shiftActiveStory(-1);

                // --- Presenter mode actions ---

                if (action === 'presenter-font-up') {
                    state.ui.presenter.fontScale = Math.min(state.ui.presenter.fontScale + 0.15, 2.5);
                    render(); return;
                }
                if (action === 'presenter-font-down') {
                    state.ui.presenter.fontScale = Math.max(state.ui.presenter.fontScale - 0.15, 0.4);
                    render(); return;
                }
                if (action === 'presenter-speed-up') {
                    state.ui.presenter.scrollSpeed = Math.min(state.ui.presenter.scrollSpeed + 5, 200);
                    render(); return;
                }
                if (action === 'presenter-speed-down') {
                    state.ui.presenter.scrollSpeed = Math.max(state.ui.presenter.scrollSpeed - 5, 0);
                    render(); return;
                }
                if (action === 'presenter-scroll-toggle') {
                    state.ui.presenter.autoScroll = !state.ui.presenter.autoScroll;
                    render(); return;
                }
                if (action === 'presenter-find') {
                    const activeEl = document.getElementById(`presenter-story-${state.meta.activeStoryId}`);
                    if (activeEl) activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    return;
                }
                if (action === 'presenter-story-prev' || action === 'presenter-story-next') {
                    const rawOrder = state.meta.order || [];
                    const markerIdx = rawOrder.indexOf('marker-line');
                    const storyIds = (markerIdx > -1 ? rawOrder.slice(0, markerIdx) : rawOrder)
                        .filter(id => !state.storiesMap[id]?.isFloated);
                    const cur = storyIds.indexOf(state.meta.activeStoryId);
                    const next = action === 'presenter-story-next' ? cur + 1 : cur - 1;
                    if (next >= 0 && next < storyIds.length) {
                        state.meta.activeStoryId = storyIds[next];
                        state.ui.lastScrolledStoryId = storyIds[next]; // prevent render() scrollIntoView
                        render();
                        // After render, jump scrollTop directly to the new active story.
                        // scrollIntoView can't be used here because the rAF autoscroll loop
                        // runs every frame and would immediately overwrite any smooth scroll.
                        // Setting scrollTop directly gives the loop the correct baseline.
                        const container = document.getElementById('main-container');
                        const target = document.getElementById(`presenter-story-${storyIds[next]}`);
                        if (container && target) {
                            const containerRect = container.getBoundingClientRect();
                            const targetRect = target.getBoundingClientRect();
                            container.scrollTop += targetRect.top - containerRect.top;
                        }
                    }
                    return;
                }
                if (action === 'ref-toggle-expand') {
                    const id = e.target.closest('[data-id]')?.getAttribute('data-id');
                    if (id) {
                        state.ui.presenter.expandedStoryId =
                            state.ui.presenter.expandedStoryId === id ? null : id;
                        render();
                        // Scroll expanded card into view
                        setTimeout(() => {
                            const el = document.getElementById(`ref-story-${id}`);
                            if (el && state.ui.presenter.expandedStoryId === id)
                                el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                        }, 50);
                    }
                    return;
                }

                // --- OBS Settings actions (inside main data-action handler) ---
                if (action === 'obs-disconnect') {
                    try { await obsWs.disconnect(); } catch(e) {}
                    state.ui.isSettingsModalOpen = false;
                    render();
                    return;
                }
                if (action === 'save-obs-settings') {
                    saveObsConfig();
                    state.ui.isSettingsModalOpen = false;
                    render();
                    obsLog('OBS settings saved. Reconnecting...', 'info');
                    connectObs();
                }
            });

            // --- OBS playout actions (separate handler on data-obs-action) ---
            document.body.addEventListener('click', e => {
                const btn = e.target.closest('[data-obs-action]');
                if (!btn) return;
                const obsAction = btn.getAttribute('data-obs-action');
                const deck = btn.getAttribute('data-deck');

                if (obsAction === 'reconnect') { connectObs(); return; }
                if (obsAction === 'take')      { obsExecuteTake(); return; }
                if (obsAction === 'l3-update') { obsUpdateL3Text(); return; }
                if (obsAction === 'l3-show')   { obsToggleL3(true); return; }
                if (obsAction === 'l3-hide')   { obsToggleL3(false); return; }
                if (obsAction === 'play')  { obsMediaAction(deck, 'OBS_WEBSOCKET_MEDIA_INPUT_ACTION_PLAY');  return; }
                if (obsAction === 'pause') { obsMediaAction(deck, 'OBS_WEBSOCKET_MEDIA_INPUT_ACTION_PAUSE'); return; }
                if (obsAction === 'stop')  { obsMediaAction(deck, 'OBS_WEBSOCKET_MEDIA_INPUT_ACTION_STOP');  return; }
                if (obsAction === 'cue')   { obsSetCursor(deck, 0); return; }
            });

            document.body.addEventListener('change', e => {
                if (e.target && e.target.id === 'media-file-picker') {
                    const file = e.target.files[0];
                    if (file) { const input = document.getElementById('edit-media-file'); if (input) input.value = file.name; }
                }
            });

            document.body.addEventListener('dragstart', e => {
                const row = e.target.closest('[data-story-id]');
                const isRundownLocked = state.meta.rundownLocked && state.meta.editorStaffId !== state.myStaffId;
                if (row && !isRundownLocked) { state.ui.draggedStoryId = row.getAttribute('data-story-id'); e.dataTransfer.effectAllowed = 'move'; setTimeout(() => row.classList.add('opacity-30'), 0); }
            });
            document.body.addEventListener('dragend', e => {
                const row = e.target.closest('[data-story-id]');
                if (row) row.classList.remove('opacity-30');
                state.ui.draggedStoryId = null; render();
            });
            document.body.addEventListener('dragover', e => {
                e.preventDefault(); 
                document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
                const row = e.target.closest('[data-story-id]');
                if (row && row.getAttribute('data-story-id') !== state.ui.draggedStoryId) row.classList.add('drag-over');
            });
            document.body.addEventListener('dragleave', e => { const row = e.target.closest('[data-story-id]'); if (row) row.classList.remove('drag-over'); });
            document.body.addEventListener('drop', e => {
                e.preventDefault();
                const dropTarget = e.target.closest('[data-story-id]');
                if (dropTarget) {
                    dropTarget.classList.remove('drag-over');
                    const targetId = dropTarget.getAttribute('data-story-id');
                    if (state.ui.draggedStoryId && state.ui.draggedStoryId !== targetId) reorderStory(state.ui.draggedStoryId, targetId);
                }
            });
        }

        window.addEventListener('beforeunload', () => { 
            if (txTimerInterval) clearInterval(txTimerInterval); 
            if (obsTelemetryInterval) clearInterval(obsTelemetryInterval);
        });

        boot();

    </script>
</body>
</html>
