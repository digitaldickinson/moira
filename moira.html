<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moira Newsroom System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .drag-over { border-top: 4px solid #3b82f6 !important; }
        /* Presenter Script formatting */
        .script-text { white-space: pre-wrap; line-height: 1.6; }
        /* OBS Playout tally indicators */
        .obs-tally-program { box-shadow: 0 0 14px 2px rgba(220, 38, 38, 0.5); border-color: #dc2626 !important; }
        .obs-tally-preview { box-shadow: 0 0 14px 2px rgba(37, 99, 235, 0.5); border-color: #2563eb !important; }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col overflow-hidden text-slate-800">

    <!-- Discrete UI Containers -->
    <div id="header-container" class="shrink-0"></div>
    <div id="main-container" class="flex-1 overflow-auto"></div>
    <div id="modal-container" class="relative z-50"></div>

    <!-- OBS WebSocket v5.x (loaded as classic script so global is available inside the module) -->
    <script src="https://cdn.jsdelivr.net/npm/obs-websocket-js@5.0.4/dist/obs-ws.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, collection, query, where, onSnapshot, updateDoc, runTransaction } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // 1. CONSTANTS & CONFIGURATION
        // ==========================================
        const DEFAULT_FORMATS = ["READ", "WRAP", "VOICER", "CLIP", "OOV", "ULAY", "OOV/CLIP", "ULAY/CLIP", "OVO", "FLOAT", "LIVE"];
        const DEFAULT_ROLES = ["Producer", "Reporter", "Presenter"];
        const STALE_LOCK_MS = 1000 * 10; // 10 Seconds

        const INITIAL_META = {
            order: [], staff: [], formats: DEFAULT_FORMATS, roles: DEFAULT_ROLES,
            showStartTime: null, activeStoryId: null,
            isTXMode: false, isRehearsalMode: false,
            rundownLocked: false, editorStaffId: null,
            txStartedAt: null, txTargetDuration: null,
            activeStoryStartedAt: null,
            isCued: false,
            txClockTime: '', 
            rxClockTime: '',

            // --- POSSIBLE AUTOMATION/PLAYOUT META FOR FUTURE MESSING AROUND  ---
            stagedStoryId: null,    // The ID of the next story that automation should prepare
            cuedChannel: null,      // Tracks if the media is loaded in 'A' or 'B' playout
            automationStatus: 'off', // 'off', 'ready', 'playing', or 'error'
            lastMediaFiredAt: null,  // Timestamp of the last hardware 'Play' command
            mediaRootOverride: ''    // Optional path for local studio media folders
        };

        const TAB_ACTIVE = "bg-blue-600 text-white shadow-sm";
        const TAB_INACTIVE = "text-slate-600 hover:bg-slate-200 hover:text-slate-900";

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'moira-default';
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
        
        let firebaseConfig = null;
        try {
            const savedConfigStr = localStorage.getItem('moira_firebase_config');
            if (savedConfigStr) firebaseConfig = JSON.parse(savedConfigStr);
            else if (typeof window.MOIRA_CONFIG !== 'undefined') firebaseConfig = window.MOIRA_CONFIG;
            else if (typeof __firebase_config !== 'undefined') firebaseConfig = JSON.parse(__firebase_config);
        } catch(e) { console.error("Config error", e); }
        
        let app, auth, db;
        let txTimerInterval = null;

        // --- OBS WebSocket instance & config ---
        const obsWs = new OBSWebSocket();
        let obsConfig = { ip: '127.0.0.1', port: '4455', pass: '', base: '' };
        let obsTelemetryInterval = null;

        function loadObsConfig() {
            obsConfig.ip   = localStorage.getItem('OBS_IP')           || '127.0.0.1';
            obsConfig.port = localStorage.getItem('OBS_PORT')          || '4455';
            obsConfig.pass = localStorage.getItem('OBS_PASSWORD')      || '';
            obsConfig.base = localStorage.getItem('OBS_BASE_FOLDER')   || '';
        }

        function saveObsConfig() {
            localStorage.setItem('OBS_IP',          document.getElementById('obs-set-ip')?.value   || obsConfig.ip);
            localStorage.setItem('OBS_PORT',        document.getElementById('obs-set-port')?.value || obsConfig.port);
            localStorage.setItem('OBS_PASSWORD',    document.getElementById('obs-set-pass')?.value || obsConfig.pass);
            localStorage.setItem('OBS_BASE_FOLDER', document.getElementById('obs-set-base')?.value || obsConfig.base);
            loadObsConfig();
        }

        const getPaths = (id) => ({
            bulletins: ['artifacts', id, 'public', 'data', 'bulletins'],
            stories: ['artifacts', id, 'public', 'data', 'rundown_stories']
        });
        const paths = getPaths(appId);

        // ==========================================
        // 2. CENTRAL STATE OBJECT
        // ==========================================
        const savedRoomName = localStorage.getItem('moira_room_name') || 'Main';
        const savedBulletinId = localStorage.getItem('moira_bulletin_id') || 'bulletin-primary';

        let state = {
            mode: "newsroom", 
            localMode: true,
            connectionState: 'offline', 
            roomDisplayName: savedRoomName,
            currentBulletinId: savedBulletinId,
            sessionId: crypto.randomUUID(), 
            myStaffId: null,
            meta: { ...INITIAL_META },
            storiesMap: {},
            obs: {
                connected: false,
                isTaking: false,
                program: '',   // scene name, e.g. 'VT A'
                preview: '',
                deckA: { state: 'STOPPED', cursor: 0, duration: 0, loadedStoryId: null },
                deckB: { state: 'STOPPED', cursor: 0, duration: 0, loadedStoryId: null },
                clipQueue: [],  // storyIds with mediaFiles, in rundown order
                clipIndex: -1,  // index into clipQueue of the clip currently on program deck
                log: []        // [{ time, type, msg }]
            },
            ui: {
                draggedStoryId: null,
                inlineEditingId: null,
                editingStoryId: null,
                pendingConflict: null,
                lastScrolledStoryId: null,
                isStaffModalOpen: false,
                isSettingsModalOpen: false,
                settingsTab: 'connection',
                // Presenter must be INSIDE ui
                presenter: {
                    mirrorX: false,
                    mirrorY: false,
                    autoScroll: false,
                    scrollSpeed: 40,
                    zenMode: false,
                    fontScale: 1,
                    lineHeight: 1.6,
                    focusMode: 'rundown',
                    pausedByUser: false,
                    presenterMode: 'autocue',  // 'autocue' | 'presenter'
                    expandedStoryId: null
                },
                showPlayout: true
            }
        };

        // Unified Guard Helper
        const canMutate = () => state.localMode || (!!auth && !!auth.currentUser);

        // ==========================================
        // 3. STARTUP & FIREBASE INIT
        // ==========================================
        async function boot() {
            state.myStaffId = localStorage.getItem('moira_my_staff_id');
            if (firebaseConfig) state.connectionState = 'connecting';
            // Start heartbeat — updates lastSeen every 30s while checked in
            setInterval(() => {
                if (state.myStaffId) {
                    updateStaffInCloud(staff => staff.map(s =>
                        s.id === state.myStaffId ? { ...s, lastSeen: Date.now() } : s
                    ));
                }
            }, 30000);
            
            // Load OBS config and attempt connection
            loadObsConfig();
            connectObs();
            
            if (firebaseConfig) {
                try {
                    app = initializeApp(firebaseConfig);
                    auth = getAuth(app);
                    db = getFirestore(app);

                    if (initialAuthToken) await signInWithCustomToken(auth, initialAuthToken);
                    else await signInAnonymously(auth);

                    onAuthStateChanged(auth, user => {
                        if (user) {
                            state.localMode = false;
                            seedCloudIfEmpty().then(() => setupListeners());
                        } else {
                            state.connectionState = 'offline';
                            render();
                        }
                    });
                } catch (e) {
                    state.connectionState = 'error';
                    render();
                }
            } else {
                seedLocalData(); 
            }
            bindGlobalEvents();
        }

       async function switchRoom(newRoomName) {
            const name = newRoomName.trim() || 'Main';
            const sanitizedId = name.toLowerCase() === 'main' ? 'bulletin-primary' : 'bulletin-' + name.toLowerCase().replace(/[^a-z0-9]/g, '-');
            
            if (state.currentBulletinId === sanitizedId) return;

            if (state.ui.editingStoryId) unlockStory(state.ui.editingStoryId);

            state.roomDisplayName = name;
            state.currentBulletinId = sanitizedId;
            state.storiesMap = {};
            state.meta = { ...INITIAL_META };
            state.ui.draggedStoryId = null;
            state.ui.editingStoryId = null;
            state.ui.pendingConflict = null;

            // Clear identity — myStaffId from old room won't exist in new room
            state.myStaffId = null;
            localStorage.removeItem('moira_my_staff_id');

            localStorage.setItem('moira_room_name', name);
            localStorage.setItem('moira_bulletin_id', sanitizedId);

            // ← render() removed from here — seedLocalData/seedCloudIfEmpty will render

            if (canMutate() && !state.localMode) {
                await seedCloudIfEmpty();
                setupListeners();
            } else if (state.localMode) {
                seedLocalData();
            }
        }


        function seedLocalData() {
            if (!state.localMode) return;
            // Fix: ensure room-specific data is loaded correctly
            if (loadLocalState()) {
                render();
                return;
            }

            const localId = crypto.randomUUID();
            state.storiesMap[localId] = {
                bulletinId: state.currentBulletinId,
                slug: "BREAKING NEWS: SYSTEM ONLINE",
                script: `Good evening, welcome to the Moira Newsroom System.\nYou are currently in the [${state.roomDisplayName}] room in Local Mode.\n\n[CAM 1]\nThis is a demonstration script showing an instruction block.`,
                format: "OVO",
                presenterId: "",
                reporterId: "",
                mediaFile: "",
                duration: 15,
                completed: false,
                lockedBySession: null,
                lockedByName: null,
                lockedAt: null,
                rev: 1
            };
            state.meta = { ...INITIAL_META, order: [localId, 'marker-line'] };
            render();
        }

        async function seedCloudIfEmpty() {
            if (!canMutate() || state.localMode) return;
            const bullRef = doc(db, ...paths.bulletins, state.currentBulletinId);
            try {
                await runTransaction(db, async (transaction) => {
                    const docSnap = await transaction.get(bullRef);
                    if (docSnap.exists()) return; 

                    const firstStoryId = crypto.randomUUID();
                    const firstStoryRef = doc(db, ...paths.stories, firstStoryId);
                    transaction.set(bullRef, { ...INITIAL_META, order: [firstStoryId, 'marker-line'] });
                    transaction.set(firstStoryRef, {
                        bulletinId: state.currentBulletinId,
                        slug: "TOP STORY",
                        script: `Good evening. Welcome to the news from ${state.roomDisplayName}...`,
                        format: "OVO",
                        presenterId: "",
                        reporterId: "",
                        mediaFile: "",
                        duration: 30,
                        completed: false,
                        lockedBySession: null,
                        lockedByName: null,
                        lockedAt: null,
                        rev: 1
                    });
                });
            } catch(e) { 
                console.error("Cloud seed failed", e); 
                state.connectionState = 'error';
                render();
            }
        }

        // ==========================================
        // 4. DATA SYNCHRONIZATION
        // ==========================================
        let unsubBulletin = null;
        let unsubStories = null;

        function setupListeners() {
            if (!canMutate() || state.localMode) return;

            if (unsubBulletin) unsubBulletin();
            if (unsubStories) unsubStories();

            unsubBulletin = onSnapshot(doc(db, ...paths.bulletins, state.currentBulletinId), 
                (docSnap) => {
                    state.connectionState = 'connected';
                    if (docSnap.exists()) state.meta = { ...INITIAL_META, ...docSnap.data() };
                    render();
                },
                (err) => { state.connectionState = 'error'; render(); }
            );

            // Scoped listener per current room ID
            const storiesQuery = query(
                collection(db, ...paths.stories),
                where("bulletinId", "==", state.currentBulletinId)
            );

            unsubStories = onSnapshot(storiesQuery, 
                (querySnapshot) => {
                    const newMap = { ...state.storiesMap };
                    querySnapshot.docChanges().forEach((change) => {
                        const data = change.doc.data();
                        if (change.type === "removed") delete newMap[change.doc.id];
                        else newMap[change.doc.id] = data;
                    });
                    state.storiesMap = newMap;
                    render();
                },
                (err) => { state.connectionState = 'error'; render(); }
            );
        }

        // ==========================================
        // 5. CORE ACTIONS (Mutators)
        // ==========================================
        async function lockStory(id) {
            if (!canMutate()) return;
            const userName = getMyName();
            const now = Date.now();
            if (state.localMode) {
                if (state.storiesMap[id]) {
                    state.storiesMap[id].lockedBySession = state.sessionId;
                    state.storiesMap[id].lockedByName = userName;
                    state.storiesMap[id].lockedAt = now;
                }
                render();
                return;
            }
            try {
                const storyRef = doc(db, ...paths.stories, id);
                await runTransaction(db, async (transaction) => {
                    const snap = await transaction.get(storyRef);
                    if (!snap.exists()) return;
                    const data = snap.data();
                    const isStale = data.lockedAt && (now - data.lockedAt > STALE_LOCK_MS);
                    if (!data.lockedBySession || isStale) {
                        transaction.update(storyRef, { lockedBySession: state.sessionId, lockedByName: userName, lockedAt: now });
                    }
                });
            } catch(e) { console.error("Lock failed", e); }
        }

        async function unlockStory(id) {
            if (!canMutate()) return;
            const story = state.storiesMap[id];
            if (!story || story.lockedBySession !== state.sessionId) return;

            if (state.localMode) {
                if (state.storiesMap[id]) {
                    state.storiesMap[id].lockedBySession = null;
                    state.storiesMap[id].lockedByName = null;
                    state.storiesMap[id].lockedAt = null;
                }
                render();
                return;
            }
            try {
                await updateDoc(doc(db, ...paths.stories, id), { lockedBySession: null, lockedByName: null, lockedAt: null });
            } catch(e) { console.error("Unlock failed", e); }
        }

        async function saveStory(id, newData) {
            if (state.localMode) {
                newData.rev = (state.storiesMap[id]?.rev || 0) + 1;
                state.storiesMap[id] = { ...state.storiesMap[id], ...newData };
                state.ui.editingStoryId = null;
                render();
                return;
            }
            if (!canMutate()) return;
            const storyRef = doc(db, ...paths.stories, id);
            try {
                await runTransaction(db, async (transaction) => {
                    const docSnap = await transaction.get(storyRef);
                    if (!docSnap.exists()) throw "Story missing";
                    const serverData = docSnap.data();
                    if (serverData.rev !== newData.rev) {
                        state.ui.pendingConflict = { storyId: id, serverData, localData: newData };
                        throw "Revision conflict";
                    }
                    newData.rev = serverData.rev + 1;
                    transaction.update(storyRef, { ...newData, lockedBySession: null, lockedByName: null, lockedAt: null });
                });
                state.ui.editingStoryId = null;
            } catch(e) {
                if (e === "Revision conflict") render();
                else console.error("Save failed", e);
            }
        }

        async function toggleStoryComplete(id) {
            if (!canMutate()) return;
            const current = !!state.storiesMap[id]?.completed;
            if (state.localMode) {
                state.storiesMap[id].completed = !current;
                render();
                return;
            }
            try {
                await updateDoc(doc(db, ...paths.stories, id), { completed: !current });
            } catch(e) { console.error("Toggle failed", e); }
        }

        async function reorderStory(draggedId, targetId) {
            if (state.localMode) {
                let order = state.meta.order.filter(id => id !== draggedId);
                const targetIdx = order.indexOf(targetId);
                order.splice(targetIdx !== -1 ? targetIdx : order.length, 0, draggedId);
                state.meta.order = order;
                render();
                return;
            }
            if (!canMutate()) return;
            const bullRef = doc(db, ...paths.bulletins, state.currentBulletinId);
            try {
                await runTransaction(db, async (transaction) => {
                    const snap = await transaction.get(bullRef);
                    if (!snap.exists()) return;
                    let order = snap.data().order.filter(id => id !== draggedId);
                    const targetIdx = order.indexOf(targetId);
                    order.splice(targetIdx !== -1 ? targetIdx : order.length, 0, draggedId);
                    transaction.update(bullRef, { order });
                });
            } catch(e) { console.error("Reorder failed", e); }
        }

        async function updateBulletinMeta(updates) {
            if (state.localMode) {
                state.meta = { ...state.meta, ...updates };
                render();
                return;
            }
            if (!canMutate()) return;
            try {
                await updateDoc(doc(db, ...paths.bulletins, state.currentBulletinId), updates);
            } catch(e) { console.error("Bulletin update failed", e); }
        }

      async function updateStudioMode(targetMode) {
            if (!canMutate()) return;

            const order = state.meta.order || [];
            const markerIdx = order.indexOf('marker-line');
            const storyIds = markerIdx > -1 ? order.slice(0, markerIdx) : order;
            const firstStoryId = storyIds[0] || null;

            // Build the active order (no floated stories) for OBS loading
            const activeOrder = storyIds.filter(id => !state.storiesMap[id]?.isFloated);

            let updates = {
                isTXMode: false,
                isRehearsalMode: false,
                isCued: true,                    // always cued
                showStartTime: null,
                txStartedAt: null,
                txTargetDuration: null,
                activeStoryStartedAt: null,
                activeStoryId: firstStoryId      // always default to first story
            };

            if (targetMode === 'tx' || targetMode === 'rehearsal') {
                updates.isTXMode = targetMode === 'tx';
                updates.isRehearsalMode = targetMode === 'rehearsal';
                updates.showStartTime = Date.now();
                updates.txStartedAt = Date.now();
                updates.activeStoryStartedAt = Date.now();
                updates.txTargetDuration = storyIds.reduce(
                    (sum, id) => sum + (state.storiesMap[id]?.duration || 0), 0
                );
            }

            if (state.localMode) {
                state.meta = { ...state.meta, ...updates };
                render();
            } else {
                try {
                    await updateDoc(doc(db, ...paths.bulletins, state.currentBulletinId), updates);
                } catch(e) { console.error('Mode update failed', e); }
            }

            // On TX/Rehearsal start, load first two media clips into the decks
            if (targetMode === 'tx' || targetMode === 'rehearsal') {
                obsInitialLoad(activeOrder);
            }
        }





      async function shiftActiveStory(direction) {
            if (!canMutate()) return;
            const rawOrder = state.meta.order;
            const markerIdx = rawOrder.indexOf('marker-line');
            const activeOrder = (markerIdx > -1 ? rawOrder.slice(0, markerIdx) : rawOrder).filter(id => !state.storiesMap[id]?.isFloated);

            if (activeOrder.length === 0) return;

            let nextId = null;
            if (!state.meta.activeStoryId) {
                nextId = direction > 0 ? activeOrder[0] : null;
            } else {
                const currentIdx = activeOrder.indexOf(state.meta.activeStoryId);
                const nextIdx = currentIdx + direction;
                if (nextIdx >= 0 && nextIdx < activeOrder.length) {
                    nextId = activeOrder[nextIdx];
                } else {
                    nextId = null;
                }
            }

            const updates = {
                activeStoryId: nextId,
                activeStoryStartedAt: nextId ? Date.now() : null
            };

            if (state.localMode) {
                state.meta.activeStoryId = nextId;
                state.meta.activeStoryStartedAt = updates.activeStoryStartedAt;
                render();
            } else {
                try {
                    await updateDoc(doc(db, ...paths.bulletins, state.currentBulletinId), updates);
                } catch(e) { console.error('Shift failed', e); }
            }
        }



        async function addStory() {
            if (!canMutate()) return;

            const newId = crypto.randomUUID();
            const newStory = {
                bulletinId: state.currentBulletinId,
                slug: "NEW STORY",
                script: "",
                format: (state.meta.formats?.[0]) || "READ",
                presenterId: "",
                reporterId: "",
                mediaFile: "",
                duration: 10,
                isFloated: false,
                completed: false,
                lockedBySession: null,
                lockedByName: null,
                lockedAt: null,
                rev: 1
            };

            if (state.localMode) {
                state.storiesMap[newId] = newStory;
                insertStoryIntoOrder(newId);
                render();
                return;
            }

            const storyRef = doc(db, ...paths.stories, newId);
            const bullRef = doc(db, ...paths.bulletins, state.currentBulletinId);

            try {
                await runTransaction(db, async (transaction) => {
                    const bullDoc = await transaction.get(bullRef);
                    if (!bullDoc.exists()) throw "Bulletin missing";
                    
                    let newOrder = [...(bullDoc.data().order || [])];
                    const markerIdx = newOrder.indexOf('marker-line');
                    if (markerIdx > -1) newOrder.splice(markerIdx, 0, newId);
                    else newOrder.push(newId, 'marker-line');

                    transaction.set(storyRef, newStory);
                    transaction.update(bullRef, { order: newOrder });
                });
            } catch(e) { console.error("Add story failed:", e); }
        }

        async function toggleFloat(id) {
            if (!canMutate()) return;
            const current = !!state.storiesMap[id]?.isFloated;
            if (state.localMode) {
                state.storiesMap[id].isFloated = !current;
                render();
                return;
            }
            try {
                await updateDoc(doc(db, ...paths.stories, id), { isFloated: !current });
            } catch(e) { console.error('Float toggle failed', e); }
        }



        async function deleteStory(id) {
            if (!canMutate()) return;
            if (!confirm("Are you sure you want to delete this story?")) return;

            if (state.localMode) {
                delete state.storiesMap[id];
                state.meta.order = state.meta.order.filter(itemId => itemId !== id);
                render();
                return;
            }

            const storyRef = doc(db, ...paths.stories, id);
            const bullRef = doc(db, ...paths.bulletins, state.currentBulletinId);

            try {
                await runTransaction(db, async (transaction) => {
                    const bullDoc = await transaction.get(bullRef);
                    if (!bullDoc.exists()) return;
                    let order = bullDoc.data().order.filter(itemId => itemId !== id);
                    transaction.delete(storyRef);
                    transaction.update(bullRef, { order });
                });
            } catch(e) { console.error("Delete failed:", e); }
        }

        async function updateStaffInCloud(mutatorFn) {
            if (state.localMode) {
                state.meta = { ...state.meta, staff: mutatorFn(state.meta.staff || []) };
                render();
                return;
            }
            if (!canMutate()) return;
            try {
                await runTransaction(db, async (transaction) => {
                    const bullRef = doc(db, ...paths.bulletins, state.currentBulletinId);
                    const docSnap = await transaction.get(bullRef);
                    if (docSnap.exists()) {
                        transaction.update(bullRef, { staff: mutatorFn(docSnap.data().staff || []) });
                    }
                });
            } catch(e) { console.error("Staff transaction failed:", e); }
        }

        // ==========================================
        // 6. HELPER FUNCTIONS
        // ==========================================
        function getMyName() {
            const me = (state.meta.staff || []).find(s => s.id === state.myStaffId);
            return me ? `${me.name} (${me.role})` : 'An Anonymous Producer';
        }

        // Parse "HH:MM:SS" or "HH:MM" into total seconds from midnight
        function parseClockTime(str) {
            if (!str) return null;
            const parts = str.split(':').map(Number);
            if (parts.some(isNaN)) return null;
            if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
            if (parts.length === 2) return parts[0] * 3600 + parts[1] * 60;
            return null;
        }

        // Format total seconds from midnight as "HH:MM:SS"
        function formatClockTime(totalSeconds) {
            const h = Math.floor(totalSeconds / 3600).toString().padStart(2, '0');
            const m = Math.floor((totalSeconds % 3600) / 60).toString().padStart(2, '0');
            const s = (totalSeconds % 60).toString().padStart(2, '0');
            return `${h}:${m}:${s}`;
        }


        function insertStoryIntoOrder(id) {
            const markerIdx = state.meta.order.indexOf('marker-line');
            if (markerIdx > -1) state.meta.order.splice(markerIdx, 0, id);
            else state.meta.order.push(id, 'marker-line');
        }

        function escapeHTML(str) {
            if (!str) return '';
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return str.toString().replace(/[&<>"']/g, c => map[c]);
        }

        function formatDuration(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        // Parse all [CLIP:m:ss] tags from a script string and return total clip seconds.
        // e.g. "[CLIP:0:35]" -> 35,  "[CLIP:1:20]" -> 80,  multiple tags are summed.
        function parseClipTags(script) {
            if (!script) return 0;
            let total = 0;
            const re = /\[CLIP:(\d+):(\d{2})\]/gi;
            let match;
            while ((match = re.exec(script)) !== null) {
                total += parseInt(match[1], 10) * 60 + parseInt(match[2], 10);
            }
            return total;
        }

        function formatPresenterScript(script) {
            if (!script) return '[ NO SCRIPT CONTENT ]';
            const escaped = escapeHTML(script);
            // Convert line breaks to <br> first so layout is preserved
            const lined = escaped.replace(/\n/g, '<br>');
            // Replace tags — each gets its own block line with a break before and after,
            // collapsing any adjacent <br> so we never get double blank lines
            return lined
                .replace(/\[CLIP:(\d+):(\d{2})\]/gi,
                    '<br><span class="bg-amber-500 text-white px-4 py-2 rounded-lg font-black uppercase tracking-widest text-4xl inline-block shadow-sm my-3">$&</span><br>')
                .replace(/\[(?!CLIP:)(.*?)\]/g,
                    '<br><span class="bg-slate-200 text-slate-900 px-4 py-2 rounded-lg font-black uppercase tracking-widest text-4xl inline-block shadow-sm my-3">$&</span><br>')
                // Collapse runs of <br> down to at most two (one blank line)
                .replace(/(<br>\s*){3,}/g, '<br><br>');
        }

        function renderStatusBadge(label, icon, colorClass) {
            return `<span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium ${colorClass} ml-1">
                <i class="fa-solid ${icon}"></i> ${label}
            </span>`;
        }

       function saveLocalState() {
            if (!state.localMode) return;
            try {
                const key = `moira_local_room_${state.currentBulletinId}`;
                const cleanedStoriesMap = {};
                for (const [id, story] of Object.entries(state.storiesMap)) {
                    cleanedStoriesMap[id] = {
                        ...story,
                        lockedBySession: null,
                        lockedByName: null,
                        lockedAt: null
                    };
                }
                localStorage.setItem(key, JSON.stringify({
                    storiesMap: cleanedStoriesMap,
                    meta: state.meta
                }));
            } catch(e) {}
        }


     function loadLocalState() {
            const storageKey = `moira_local_room_${state.currentBulletinId}`;
            try {
                const str = localStorage.getItem(storageKey);
                if (!str) return false;
                const saved = JSON.parse(str);
                if (saved.storiesMap && saved.meta) {
                    state.storiesMap = saved.storiesMap;
                    // Merge saved meta with INITIAL_META to ensure new flags exist
                    state.meta = { ...INITIAL_META, ...saved.meta };
                    
                    // IMPORTANT: If you saved UI state, you must also ensure 
                    // the 'presenter' object exists in the current session
                    return true;
                }
            } catch(e) {}
            return false;
        }

        // ==========================================
        // 7. RENDERING ENGINE
        // ==========================================
        function render() {
             const mainContainer = document.getElementById('main-container');
             const savedScroll = mainContainer ? mainContainer.scrollTop : 0;

            // Only re-render header if not in an active timed session
            // to prevent clock flicker on every render() call
            const inActiveSession = state.meta.isTXMode || state.meta.isRehearsalMode;
            document.getElementById('header-container').innerHTML = renderHeader();

            const isZen = state.mode === 'presenter' && state.ui.presenter.zenMode;
            document.getElementById('header-container').innerHTML = isZen ? '' : renderHeader();

            // Suppress DOM rebuilds while user is actively typing anywhere in the app.
            // Firestore snapshots arriving mid-keystroke would otherwise wipe inputs.
            const activeEl = document.activeElement;
            const userIsTyping = activeEl && (activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA') && activeEl.id !== 'header-room-input';

            if (!state.ui.draggedStoryId && !state.ui.inlineEditingId && !userIsTyping) {
                let mainHtml = '';
                if (state.mode === 'newsroom') mainHtml = renderNewsroom();
                else if (state.mode === 'presenter') mainHtml = renderPresenter();
                else if (state.mode === 'director') mainHtml = renderDirector();
                document.getElementById('main-container').innerHTML = mainHtml;
            }

            if (!userIsTyping) {
                document.getElementById('modal-container').innerHTML = renderModals();
            }

            // TX Timer housekeeping
            if ((state.meta.isTXMode || state.meta.isRehearsalMode) && state.meta.txStartedAt) {
                if (!txTimerInterval) startTXTimer();
            } else if (txTimerInterval) {
                clearInterval(txTimerInterval);
                txTimerInterval = null;
            }
            // Immediately repopulate displays after every render to prevent --:-- flash
            if (state.meta.isTXMode || state.meta.isRehearsalMode) updateClockDisplays();


            const newMainContainer = document.getElementById('main-container');
            if (state.mode === 'presenter' && state.meta.activeStoryId && state.ui.lastScrolledStoryId !== state.meta.activeStoryId) {
                const activeEl = document.getElementById(`presenter-story-${state.meta.activeStoryId}`);
                if (activeEl && newMainContainer) {
                    const containerRect = newMainContainer.getBoundingClientRect();
                    const elRect = activeEl.getBoundingClientRect();
                    newMainContainer.scrollTop += elRect.top - containerRect.top;
                    state.ui.lastScrolledStoryId = state.meta.activeStoryId;
                }
            } else if (!state.ui.draggedStoryId && newMainContainer) {
                newMainContainer.scrollTop = savedScroll;
            }
             saveLocalState();
        }

           function startTXTimer() {
                updateClockDisplays();
                txTimerInterval = setInterval(updateClockDisplays, 1000);
            }

        // ==========================================
        // OBS PLAYOUT ENGINE
        // ==========================================

        function obsLog(msg, type = 'info') {
            const time = new Date().toISOString().split('T')[1].substring(0, 12);
            state.obs.log.unshift({ time, type, msg });
            if (state.obs.log.length > 80) state.obs.log.pop();
            // Patch log DOM directly to avoid full re-render
            const el = document.getElementById('obs-log-container');
            if (el) el.innerHTML = renderObsLog();
        }

        async function connectObs() {
            try {
                if (state.obs.connected) {
                    state.obs.connected = false;
                    try { await obsWs.disconnect(); } catch(e) {}
                }
                await obsWs.connect(`ws://${obsConfig.ip}:${obsConfig.port}`, obsConfig.pass, { rpcVersion: 1 });
                state.obs.connected = true;
                obsLog(`Connected to OBS at ws://${obsConfig.ip}:${obsConfig.port}`, 'success');
                updateObsConnectionBadge();
                await obsSetupEnvironment();
                await obsSyncState();
                startObsTelemetry();
            } catch(err) {
                state.obs.connected = false;
                obsLog(`OBS connection failed: ${err.message}`, 'error');
                updateObsConnectionBadge();
                setTimeout(connectObs, 8000);
            }
        }

        obsWs.on('ConnectionClosed', () => {
            if (state.obs.connected) {
                state.obs.connected = false;
                obsLog('OBS connection closed unexpectedly. Retrying in 8s...', 'error');
                updateObsConnectionBadge();
                setTimeout(connectObs, 8000);
            }
        });

        obsWs.on('CurrentProgramSceneChanged', (ev) => {
            state.obs.program = ev.sceneName;
            updateObsTallies();
        });

        obsWs.on('CurrentPreviewSceneChanged', (ev) => {
            state.obs.preview = ev.sceneName;
            updateObsTallies();
        });

        function updateObsConnectionBadge() {
            const badge = document.getElementById('obs-conn-badge');
            if (!badge) return;
            if (state.obs.connected) {
                badge.className = 'inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-bold bg-emerald-100 text-emerald-800 border border-emerald-200';
                badge.innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> OBS Connected';
            } else {
                badge.className = 'inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-bold bg-red-100 text-red-700 border border-red-200';
                badge.innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse"></span> OBS Offline';
            }
        }

        async function obsSetupEnvironment() {
            try {
                const modeRes = await obsWs.call('GetStudioModeEnabled');
                if (!modeRes.studioModeEnabled) {
                    await obsWs.call('SetStudioModeEnabled', { studioModeEnabled: true });
                    obsLog('Enabled Studio Mode in OBS', 'success');
                }
                const { scenes } = await obsWs.call('GetSceneList');
                const sceneNames = scenes.map(s => s.sceneName);
                for (const name of ['VT A', 'VT B', 'Lower Third']) {
                    if (!sceneNames.includes(name)) {
                        await obsWs.call('CreateScene', { sceneName: name });
                        obsLog(`Created OBS scene: ${name}`, 'success');
                    }
                }
                const { inputs } = await obsWs.call('GetInputList');
                const inputNames = inputs.map(i => i.inputName);
                const safeSettings = { is_local_file: true, close_when_inactive: false, restart_on_activate: false, clear_on_media_end: false };
                for (const [scene, inputName] of [['VT A', 'VT A Player'], ['VT B', 'VT B Player']]) {
                    if (!inputNames.includes(inputName)) {
                        await obsWs.call('CreateInput', { sceneName: scene, inputName, inputKind: 'ffmpeg_source', inputSettings: safeSettings });
                        obsLog(`Created OBS input: ${inputName}`, 'success');
                    } else {
                        await obsWs.call('SetInputSettings', { inputName, inputSettings: { close_when_inactive: false, restart_on_activate: false, clear_on_media_end: false } });
                        const { sceneItems } = await obsWs.call('GetSceneItemList', { sceneName: scene });
                        if (!sceneItems.some(i => i.sourceName === inputName)) {
                            await obsWs.call('CreateSceneItem', { sceneName: scene, sourceName: inputName });
                        }
                    }
                }
                // Nest Lower Third into both VT scenes
                for (const parent of ['VT A', 'VT B']) {
                    const { sceneItems } = await obsWs.call('GetSceneItemList', { sceneName: parent });
                    if (!sceneItems.some(i => i.sourceName === 'Lower Third')) {
                        await obsWs.call('CreateSceneItem', { sceneName: parent, sourceName: 'Lower Third' });
                        obsLog(`Nested Lower Third into ${parent}`, 'success');
                    }
                }
                // Ensure Lower Third has a text source
                if (!inputNames.includes('Lower Third Text')) {
                    try {
                        await obsWs.call('CreateInput', { sceneName: 'Lower Third', inputName: 'Lower Third Text', inputKind: 'text_gdiplus', inputSettings: { text: 'Standby' } });
                    } catch(e) {
                        await obsWs.call('CreateInput', { sceneName: 'Lower Third', inputName: 'Lower Third Text', inputKind: 'text_ft2_source_v2', inputSettings: { text: 'Standby' } });
                    }
                    obsLog('Created Lower Third Text source', 'success');
                }
                // Auto-route scenes
                const prog = await obsWs.call('GetCurrentProgramScene');
                let curProg = prog.sceneName;
                if (curProg !== 'VT A' && curProg !== 'VT B') {
                    await obsWs.call('SetCurrentProgramScene', { sceneName: 'VT A' });
                    curProg = 'VT A';
                }
                const expectedPrev = curProg === 'VT A' ? 'VT B' : 'VT A';
                await obsWs.call('SetCurrentPreviewScene', { sceneName: expectedPrev });
                obsLog('OBS environment validated and routed.', 'success');
            } catch(err) {
                obsLog(`OBS setup error: ${err.message}`, 'error');
            }
        }

        async function obsSyncState() {
            try {
                const prog = await obsWs.call('GetCurrentProgramScene');
                const prev = await obsWs.call('GetCurrentPreviewScene');
                state.obs.program = prog.sceneName;
                state.obs.preview = prev.sceneName;
                updateObsTallies();
            } catch(e) {}
        }

        function updateObsTallies() {
            const deckA = document.getElementById('obs-deck-A');
            const deckB = document.getElementById('obs-deck-B');
            const lblA  = document.getElementById('obs-tally-label-A');
            const lblB  = document.getElementById('obs-tally-label-B');
            if (!deckA || !deckB) return;

            const base = 'bg-white border-2 rounded-xl p-4 flex flex-col gap-3 transition-all duration-300 ';
            deckA.className = base + (state.obs.program === 'VT A' ? 'obs-tally-program border-red-400' : state.obs.preview === 'VT A' ? 'obs-tally-preview border-blue-400' : 'border-slate-200');
            deckB.className = base + (state.obs.program === 'VT B' ? 'obs-tally-program border-red-400' : state.obs.preview === 'VT B' ? 'obs-tally-preview border-blue-400' : 'border-slate-200');

            if (lblA) lblA.innerHTML = state.obs.program === 'VT A' ? '<span class="text-red-600 font-black tracking-widest text-xs">PROGRAM</span>' : state.obs.preview === 'VT A' ? '<span class="text-blue-600 font-bold tracking-widest text-xs">PREVIEW</span>' : '<span class="text-slate-400 text-xs">STANDBY</span>';
            if (lblB) lblB.innerHTML = state.obs.program === 'VT B' ? '<span class="text-red-600 font-black tracking-widest text-xs">PROGRAM</span>' : state.obs.preview === 'VT B' ? '<span class="text-blue-600 font-bold tracking-widest text-xs">PREVIEW</span>' : '<span class="text-slate-400 text-xs">STANDBY</span>';
        }

        function obsFormatTime(ms) {
            ms = Math.max(0, parseInt(ms) || 0);
            if (ms === 0) return '00:00:00';
            const totalSeconds = Math.floor(ms / 1000);
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            const s = totalSeconds % 60;
            return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        function startObsTelemetry() {
            if (obsTelemetryInterval) clearInterval(obsTelemetryInterval);
            obsTelemetryInterval = setInterval(async () => {
                if (!state.obs.connected) return;
                try {
                    for (const [deck, inputName] of [['A', 'VT A Player'], ['B', 'VT B Player']]) {
                        const res = await obsWs.call('GetMediaInputStatus', { inputName });
                        const d = state.obs['deck' + deck];
                        d.cursor   = res.mediaCursor   || 0;
                        d.duration = res.mediaDuration || 0;
                        d.state    = res.mediaState ? res.mediaState.replace('OBS_MEDIA_STATE_', '') : 'UNKNOWN';
                        updateObsDeckDisplay(deck, d);
                    }
                } catch(e) { /* silently drop telemetry errors */ }
            }, 250);
        }

        function updateObsDeckDisplay(deck, d) {
            const timeEl  = document.getElementById('obs-time-'  + deck);
            const stateEl = document.getElementById('obs-state-' + deck);
            const durEl   = document.getElementById('obs-dur-'   + deck);
            if (!timeEl) return;

            const isProgram = (deck === 'A' && state.obs.program === 'VT A') || (deck === 'B' && state.obs.program === 'VT B');
            const baseClasses = 'font-mono text-lg font-bold px-3 py-1 rounded transition-all ';

            if (isProgram && d.duration > 0) {
                const remaining = Math.max(0, d.duration - d.cursor);
                timeEl.innerText = '-' + obsFormatTime(remaining);
                if (remaining > 0 && remaining <= 10000) {
                    timeEl.className = baseClasses + 'bg-red-600 text-white animate-pulse';
                } else if (remaining > 0 && remaining <= 30000) {
                    timeEl.className = baseClasses + 'bg-yellow-100 text-yellow-800 border border-yellow-400';
                } else {
                    timeEl.className = baseClasses + 'bg-red-50 text-red-600';
                }
            } else {
                timeEl.innerText = obsFormatTime(d.cursor);
                timeEl.className = baseClasses + 'bg-slate-100 text-slate-700';
            }
            if (stateEl) stateEl.innerText = d.state;
            if (durEl)   durEl.innerText   = obsFormatTime(d.duration);
        }

        async function obsMediaAction(deck, action) {
            const inputName = deck === 'A' ? 'VT A Player' : 'VT B Player';
            try {
                await obsWs.call('TriggerMediaInputAction', { inputName, mediaAction: action });
            } catch(e) { obsLog(`Media action failed: ${e.message}`, 'error'); }
        }

        async function obsSetCursor(deck, ms) {
            const inputName = deck === 'A' ? 'VT A Player' : 'VT B Player';
            try {
                await obsWs.call('SetMediaInputCursor', { inputName, mediaCursor: ms });
            } catch(e) { obsLog(`Cue failed: ${e.message}`, 'error'); }
        }

        async function obsUpdateL3Text() {
            const el = document.getElementById('obs-l3-text');
            if (!el) return;
            try {
                await obsWs.call('SetInputSettings', { inputName: 'Lower Third Text', inputSettings: { text: el.value } });
                obsLog(`L3 text updated: "${el.value}"`, 'success');
            } catch(e) { obsLog(`L3 text update failed: ${e.message}`, 'error'); }
        }

        async function obsToggleL3(visible) {
            try {
                for (const sceneName of ['VT A', 'VT B']) {
                    const { sceneItems } = await obsWs.call('GetSceneItemList', { sceneName });
                    const l3 = sceneItems.find(i => i.sourceName === 'Lower Third');
                    if (l3) await obsWs.call('SetSceneItemEnabled', { sceneName, sceneItemId: l3.sceneItemId, sceneItemEnabled: visible });
                }
                obsLog(`Lower Third ${visible ? 'SHOWN' : 'HIDDEN'}`, 'info');
            } catch(e) { obsLog(`L3 toggle failed: ${e.message}`, 'error'); }
        }

        async function obsReconcileL3() {
            try {
                const getState = async (sceneName) => {
                    const { sceneItems } = await obsWs.call('GetSceneItemList', { sceneName });
                    const l3 = sceneItems.find(i => i.sourceName === 'Lower Third');
                    return l3 ? l3.sceneItemEnabled : null;
                };
                const [stA, stB] = await Promise.all([getState('VT A'), getState('VT B')]);
                if (stA !== null && stB !== null && stA !== stB) {
                    obsLog('L3 mismatch detected — forcing hidden as fail-safe.', 'warn');
                    await obsToggleL3(false);
                }
            } catch(e) { obsLog('L3 reconciliation error: ' + e.message, 'error'); }
        }

        async function obsExecuteTake() {
            if (!state.obs.connected || state.obs.isTaking) return;
            state.obs.isTaking = true;
            const btn = document.getElementById('obs-btn-take');
            if (btn) btn.disabled = true;
            obsLog('Initiating Verified Take...', 'info');
            try {
                await obsReconcileL3();

                // Capture which deck is outgoing (currently program) BEFORE the transition.
                // After the take it becomes the free deck we'll load the next clip onto.
                const outgoingScene  = state.obs.program; // e.g. 'VT A'
                const outgoingDeck   = outgoingScene === 'VT A' ? 'A' : outgoingScene === 'VT B' ? 'B' : null;

                const isANext        = state.obs.preview === 'VT A';
                const previewPlayer  = isANext ? 'VT A Player' : 'VT B Player';
                const programPlayer  = isANext ? 'VT B Player' : 'VT A Player';

                await obsWs.call('TriggerMediaInputAction', { inputName: previewPlayer, mediaAction: 'OBS_WEBSOCKET_MEDIA_INPUT_ACTION_PLAY' });

                let isPlaying = false;
                for (let i = 0; i < 30; i++) {
                    const { mediaState } = await obsWs.call('GetMediaInputStatus', { inputName: previewPlayer });
                    if (mediaState === 'OBS_MEDIA_STATE_PLAYING') { isPlaying = true; break; }
                    await new Promise(r => setTimeout(r, 100));
                }
                if (!isPlaying) throw new Error(`Timeout: ${previewPlayer} did not reach PLAYING state.`);

                obsLog('Playback verified. Applying 250ms pre-roll buffer...', 'info');
                await new Promise(r => setTimeout(r, 250));

                await obsWs.call('TriggerStudioModeTransition');
                obsLog('Transition fired.', 'success');

                // Capture queue state BEFORE the setTimeout so we use consistent values.
                // Deck assignment is fixed by parity (see obsInitialLoad):
                //   clipIndex 0 was on Deck A, 1 on Deck B, 2 on Deck A, etc.
                // The clip being taken now is clipIndex+1; the deck that will be
                // freed (outgoing) is the one that held clipIndex (even=A, odd=B).
                const queue = state.obs.clipQueue;
                const takenIndex = state.obs.clipIndex + 1;  // index of clip just taken to air
                const freeDeck   = takenIndex % 2 === 0 ? 'B' : 'A'; // outgoing deck after this take

                setTimeout(async () => {
                    try {
                        await obsWs.call('TriggerMediaInputAction', { inputName: programPlayer, mediaAction: 'OBS_WEBSOCKET_MEDIA_INPUT_ACTION_PAUSE' });
                        await obsWs.call('SetMediaInputCursor', { inputName: programPlayer, mediaCursor: 0 });
                        obsLog('Outgoing deck cued to 0.', 'info');
                    } catch(e) {}

                    // Advance queue index and pre-load the clip after next onto the freed deck.
                    // nextIndex = takenIndex + 2 because takenIndex+1 is already staged
                    // on the other deck from the previous load cycle.
                    if (queue && takenIndex < queue.length) {
                        state.obs.clipIndex = takenIndex;
                        const nextIndex = takenIndex + 2;
                        if (nextIndex < queue.length) {
                            obsLog(`Queue [${takenIndex+1}/${queue.length}] taken. Loading clip ${nextIndex+1} onto Deck ${freeDeck}.`, 'info');
                            obsLoadDeck(freeDeck, queue[nextIndex]);
                        } else {
                            obsLog(`Queue [${takenIndex+1}/${queue.length}] taken. Last clip — no further auto-load.`, 'info');
                        }
                    }
                }, 3000);

            } catch(err) {
                obsLog(`Verified Take failed: ${err.message}`, 'error');
            } finally {
                state.obs.isTaking = false;
                if (btn) btn.disabled = false;
            }
        }

        function renderObsLog() {
            if (state.obs.log.length === 0) return '<span class="text-slate-400 italic">No OBS events yet.</span>';
            return state.obs.log.map(e => {
                const col = e.type === 'error' ? 'text-red-500' : e.type === 'success' ? 'text-emerald-600' : e.type === 'warn' ? 'text-amber-600' : 'text-slate-500';
                const prefix = e.type === 'error' ? '[ERR]' : e.type === 'success' ? '[OK]' : e.type === 'warn' ? '[WARN]' : '[INFO]';
                return `<div class="${col}"><span class="text-slate-300 mr-1">${e.time}</span><span class="font-bold mr-1">${prefix}</span>${e.msg}</div>`;
            }).join('');
        }

        function renderObsDeck(deck) {
            const d = state.obs['deck' + deck];
            const isProgram = (deck === 'A' && state.obs.program === 'VT A') || (deck === 'B' && state.obs.program === 'VT B');
            const isPreview = (deck === 'A' && state.obs.preview === 'VT A') || (deck === 'B' && state.obs.preview === 'VT B');
            const tallyLabel = isProgram
                ? '<span class="text-red-600 font-black tracking-widest text-xs">PROGRAM</span>'
                : isPreview
                    ? '<span class="text-blue-600 font-bold tracking-widest text-xs">PREVIEW</span>'
                    : '<span class="text-slate-400 text-xs">STANDBY</span>';
            const borderClass = isProgram ? 'obs-tally-program border-red-400' : isPreview ? 'obs-tally-preview border-blue-400' : 'border-slate-200';
            const timeClass   = 'font-mono text-lg font-bold px-3 py-1 rounded bg-slate-100 text-slate-700 transition-all';

            const loadedStory = d.loadedStoryId ? state.storiesMap[d.loadedStoryId] : null;
            const labelContent = loadedStory
                ? `<span class="font-bold text-slate-800 text-sm truncate">${escapeHTML(loadedStory.slug)}</span>
                   <span class="text-xs text-slate-400 font-mono truncate">${escapeHTML(loadedStory.mediaFile)}</span>`
                : `<span class="text-slate-400 text-xs italic">No clip loaded</span>`;

            return `
                <div id="obs-deck-${deck}" class="bg-white border-2 rounded-xl p-4 flex flex-col gap-3 transition-all duration-300 ${borderClass}">
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-slate-700 bg-slate-100 px-3 py-1 rounded text-sm font-mono tracking-widest">CLIP ${deck}</span>
                        <div id="obs-tally-label-${deck}">${tallyLabel}</div>
                        <div id="obs-time-${deck}" class="${timeClass}">00:00:00</div>
                    </div>
                    <div id="obs-deck-label-${deck}" class="flex flex-col gap-0.5 min-w-0 bg-slate-50 border border-slate-100 rounded px-3 py-2">
                        ${labelContent}
                    </div>

        // Core loader: explicitly target a specific deck letter ('A' or 'B').
        // No scene-state inference — caller decides which deck.
        async function obsLoadDeck(deck, storyId) {
            if (!state.obs.connected) return;
            if (!deck || !storyId) return;
            const story = state.storiesMap[storyId];
            if (!story?.mediaFile) return;

            let base = obsConfig.base.split('\\').join('/');
            if (base && !base.endsWith('/')) base += '/';
            const fullPath = base + story.mediaFile;
            const inputName = deck === 'A' ? 'VT A Player' : 'VT B Player';

            // Update state and deck label immediately so the UI reflects what's loading
            state.obs['deck' + deck].loadedStoryId = storyId;
            updateObsDeckLabel(deck);

            obsLog(`Loading "${story.mediaFile}" → Deck ${deck}`, 'info');
            try {
                await obsWs.call('SetInputSettings', { inputName, inputSettings: { local_file: fullPath } });
                await obsWs.call('TriggerMediaInputAction', { inputName, mediaAction: 'OBS_WEBSOCKET_MEDIA_INPUT_ACTION_PLAY' });

                let duration = 0;
                for (let i = 0; i < 8; i++) {
                    await new Promise(r => setTimeout(r, 250));
                    const status = await obsWs.call('GetMediaInputStatus', { inputName });
                    if (status.mediaDuration > 0) { duration = status.mediaDuration; break; }
                }

                await obsWs.call('TriggerMediaInputAction', { inputName, mediaAction: 'OBS_WEBSOCKET_MEDIA_INPUT_ACTION_PAUSE' });
                await obsWs.call('SetMediaInputCursor', { inputName, mediaCursor: 0 });

                if (duration > 0) {
                    obsLog(`Deck ${deck} ready: "${story.mediaFile}" (${obsFormatTime(duration)})`, 'success');
                } else {
                    obsLog(`Deck ${deck}: duration timeout — check file path.`, 'warn');
                }
            } catch(e) {
                obsLog(`Load failed for Deck ${deck}: ${e.message}`, 'error');
            }
        }

        // Patch the deck's story label in-place without a full re-render
        function updateObsDeckLabel(deck) {
            const labelEl = document.getElementById('obs-deck-label-' + deck);
            if (!labelEl) return;
            const d = state.obs['deck' + deck];
            const story = d.loadedStoryId ? state.storiesMap[d.loadedStoryId] : null;
            if (story) {
                labelEl.innerHTML = `
                    <span class="font-bold text-slate-800 text-sm truncate">${escapeHTML(story.slug)}</span>
                    <span class="text-xs text-slate-400 font-mono truncate">${escapeHTML(story.mediaFile)}</span>`;
            } else {
                labelEl.innerHTML = `<span class="text-slate-400 text-xs italic">No clip loaded</span>`;

        // Called on TX/Rehearsal start.
        //
        // Deck assignment is always fixed:
        //   queue[0] -> Deck A,  queue[1] -> Deck B,  queue[2] -> Deck A,  etc.
        //
        // VT TAKE plays whatever is on the OBS PREVIEW scene, so we route OBS here:
        //   VT A = preview  (Deck A / clip[0] goes to air on first VT TAKE)
        //   VT B = program  (Deck B / clip[1] staged, goes to air on second VT TAKE)
        //
        // After each take obsExecuteTake loads queue[clipIndex+2] onto the outgoing deck.
        // clipIndex tracks the last clip taken to air (-1 = nothing taken yet).
        async function obsInitialLoad(activeOrder) {
            if (!state.obs.connected) return;

            const queue = activeOrder.filter(id => !!state.storiesMap[id]?.mediaFile);
            state.obs.clipQueue = queue;
            state.obs.clipIndex = -1;

            if (queue.length === 0) {
                obsLog('No media clips found in running order.', 'info');
                return;
            }

            // Route OBS: VT A = preview so first VT TAKE plays Deck A (clip[0])
            try {
                await obsWs.call('SetCurrentProgramScene', { sceneName: 'VT B' });
                await obsWs.call('SetCurrentPreviewScene', { sceneName: 'VT A' });
                state.obs.program = 'VT B';
                state.obs.preview = 'VT A';
                updateObsTallies();
                obsLog('OBS routed: VT A = preview, VT B = program.', 'info');
            } catch(e) {
                obsLog(`OBS routing failed: ${e.message}`, 'error');
                return;
            }

            obsLog(`Clip queue: ${queue.length} clip(s). Loading...`, 'info');
            await obsLoadDeck('A', queue[0]);
            if (queue[1]) await obsLoadDeck('B', queue[1]);

            obsLog(`Ready. Deck A: "${state.storiesMap[queue[0]]?.mediaFile}" | Deck B: "${state.storiesMap[queue[1]]?.mediaFile || 'empty'}"`, 'success');
        }

                const cutoff = markerIdx > -1 ? markerIdx : order.length;
                const activeIdx = order.indexOf(state.meta.activeStoryId);

                // Use TX/RX clock times if both set, otherwise sum all story durations
                const txSecs = parseClockTime(state.meta.txClockTime);
                const rxSecs = parseClockTime(state.meta.rxClockTime);
                const liveTxDuration = (txSecs !== null && rxSecs !== null)
                    ? (rxSecs - txSecs) * 1000
                    : order
                        .slice(0, cutoff)
                        .filter(id => !state.storiesMap[id]?.isFloated)
                        .reduce((sum, id) => sum + (state.storiesMap[id]?.duration || 0), 0) * 1000;

                // Time remaining in current story
                let currentStoryRemaining = 0;
                if (state.meta.activeStoryId && state.meta.activeStoryStartedAt) {
                    const currentDuration = (state.storiesMap[state.meta.activeStoryId]?.duration || 0) * 1000;
                    const elapsedOnStory = Date.now() - state.meta.activeStoryStartedAt;
                    currentStoryRemaining = Math.max(0, currentDuration - elapsedOnStory);
                }

                // Remaining stories after active, excluding floated
                const nextIds = order
                    .slice(activeIdx > -1 ? activeIdx + 1 : 0, cutoff)
                    .filter(id => !state.storiesMap[id]?.isFloated);
                const remainingMs = nextIds.reduce((sum, id) => sum + (state.storiesMap[id]?.duration || 0) * 1000, 0);

                const projectedEnd = Date.now() + currentStoryRemaining + remainingMs;
                const scheduledEnd = state.meta.txStartedAt + liveTxDuration;
                const backtimeMs = scheduledEnd - projectedEnd;
                const isLight = backtimeMs >= 0;
                const backtimeSecs = Math.round(Math.abs(backtimeMs) / 1000);

                const AMBER_ZONE = 30;
                let btColour;

                else if (backtimeSecs <= AMBER_ZONE) btColour = 'text-amber-500'; // tight — amber

                storyStartTimes[id] = runningOffset;
                if (!story.isFloated) runningOffset += story.duration || 0;
            });

            const isRundownLocked = state.meta.rundownLocked && state.meta.editorStaffId !== state.myStaffId;
            const isEditor = state.meta.editorStaffId === state.myStaffId;
            const editorName = (state.meta.staff||[]).find(s=>s.id===state.meta.editorStaffId)?.name || 'Editor';

            const rows = (state.meta.order || []).map(id => {
                if (id === 'marker-line') {

                    return `<tr class="bg-red-50 border-y-4 border-red-200 shadow-inner" data-story-id="${id}" draggable="true">

                }
                const story = state.storiesMap[id];
                if (!story) return '';
                if (!isBelowLine && !story.isFloated) totalDuration += story.duration || 0;
                const isActive = state.meta.activeStoryId === id && (state.meta.isTXMode || state.meta.isRehearsalMode);
                const isComplete = story.completed;
                const isLocked = story.lockedBySession && story.lockedBySession !== state.sessionId;

                let rowClasses = 'border-b border-slate-200 transition-colors ';
                if (isBelowLine) rowClasses += 'bg-slate-100 opacity-80 ';
                else if (isActive) rowClasses += state.meta.isTXMode ? 'bg-red-50 border-l-4 border-l-red-500 ' : 'bg-amber-50 border-l-4 border-l-amber-500 ';
                else if (isComplete) rowClasses += 'opacity-60 bg-gray-50 ';
                else if (story.mediaFile) rowClasses += 'bg-yellow-50 hover:bg-yellow-100 ';
                else rowClasses += 'bg-white hover:bg-slate-50 ';
                if (story.isFloated && !isBelowLine) rowClasses += 'opacity-50 ';

                const pres = (state.meta.staff || []).find(s => s.id === story.presenterId)?.name || '';
                const rep = (state.meta.staff || []).find(s => s.id === story.reporterId)?.name || '';

                // Clock time for this story
                let clockCell = '<td class="px-3 py-1.5 text-xs font-mono text-slate-400 w-20">--:--:--</td>';

                return `<tr class="${rowClasses}" data-story-id="${id}" draggable="true">

                    <td class="px-3 py-1.5 font-semibold w-1/4">

                        ${story.mediaFile ? '<i class="fa-solid fa-photo-film text-amber-500 mr-2"></i>' : ''}
                        <span data-action="inline-edit-slug" data-id="${id}" class="inline-block cursor-text hover:bg-slate-100/50 px-1 -mx-1 rounded transition-colors" title="Click to edit slug in place">
                            ${escapeHTML(story.slug)}

                        ${isLocked ? '<i class="fa-solid fa-lock text-red-500 ml-2"></i>' : ''}
                        ${story.isFloated ? `<span class="ml-2 text-[10px] font-bold bg-amber-100 text-amber-700 border border-amber-200 px-1.5 py-0.5 rounded uppercase tracking-wide">Floated</span>` : ''}
                    </td>
                    <td class="px-3 py-1.5 text-sm w-24"><span class="bg-slate-100 border px-2 py-0.5 rounded text-xs font-mono font-bold">${escapeHTML(story.format)}</span></td>
                    <td class="px-3 py-1.5 w-32"><div class="text-xs font-bold text-blue-700">${escapeHTML(pres)}</div><div class="text-xs text-slate-600">${escapeHTML(rep)}</div></td>
                    <td class="px-3 py-1.5 text-sm w-24 font-mono">${story.isFloated ? `<span class="line-through text-slate-400">${formatDuration(story.duration)}</span>` : formatDuration(story.duration)}</td>
                    ${clockCell}
                    <td class="px-3 py-1.5 text-sm italic truncate max-w-xs">${escapeHTML(story.script || 'No script...')}</td>
                    <td class="px-3 py-1.5 text-center w-16">
                        <button data-action="toggle-complete" data-id="${id}" class="text-lg ${isComplete ? 'text-emerald-500' : 'text-slate-300'} transition-colors">
                            <i class="fa-solid fa-circle-check"></i>
                        </button>
                    </td>
                    <td class="px-3 py-1.5 text-center w-16">
                        <button data-action="toggle-float" data-id="${id}" class="text-lg ${story.isFloated ? 'text-amber-500' : 'text-slate-300'} transition-colors" title="${story.isFloated ? 'Un-float story' : 'Float story'}">
                            <i class="fa-solid fa-circle-pause"></i>
                        </button>
                    </td>
                    <td class="px-3 py-1.5 text-right w-20">
                        <button data-action="edit-story" data-id="${id}" class="p-1.5 text-slate-400 hover:text-blue-600"><i class="fa-solid fa-pen text-xs"></i></button>
                        ${!isRundownLocked ? `<button data-action="delete-story" data-id="${id}" class="p-1.5 text-slate-400 hover:text-red-600"><i class="fa-solid fa-trash text-xs"></i></button>` : ''}
                    </td>
                </tr>`;
            }).join('');

            // TX/RX bar
            const txRxBar = `
                <div class="flex items-center gap-6 bg-slate-100 border border-slate-200 text-slate-700 px-6 py-3 rounded-xl mb-4">
                    <span class="text-xs font-black uppercase tracking-widest text-slate-400">Timing</span>
                    <div class="flex items-center gap-2">
                        <label class="text-xs font-bold uppercase tracking-wide text-slate-500">TX</label>
                        <input type="text" id="tx-clock-input" value="${escapeHTML(state.meta.txClockTime || '')}" 
                            placeholder="18:00:00"
                            class="bg-white border border-slate-300 rounded px-3 py-1.5 text-sm font-mono text-slate-800 w-28 outline-none focus:border-blue-400 placeholder-slate-400">
                        <button data-action="save-tx-time" class="bg-white hover:bg-slate-200 border border-slate-300 text-slate-700 px-3 py-1.5 rounded text-xs font-bold transition-colors">Set</button>
                    </div>
                    <div class="flex items-center gap-2">
                        <label class="text-xs font-bold uppercase tracking-wide text-slate-500">RX</label>
                        <input type="text" id="rx-clock-input" value="${escapeHTML(state.meta.rxClockTime || '')}" 
                            placeholder="18:28:30"
                            class="bg-white border border-slate-300 rounded px-3 py-1.5 text-sm font-mono text-slate-800 w-28 outline-none focus:border-blue-400 placeholder-slate-400">
                        <button data-action="save-rx-time" class="bg-white hover:bg-slate-200 border border-slate-300 text-slate-700 px-3 py-1.5 rounded text-xs font-bold transition-colors">Set</button>
                    </div>
                    ${txSecs !== null && rxSecs !== null ? `
                        <div class="ml-4 flex items-center gap-2 border-l border-slate-300 pl-4">
                            <span class="text-xs text-slate-500 uppercase tracking-wide">Programme</span>
                            <span class="font-mono font-bold text-slate-800">${formatDuration(rxSecs - txSecs)}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-xs text-slate-500 uppercase tracking-wide">TRT</span>
                            ${(()=>{
                                const progSecs = rxSecs - txSecs;
                                const diff = totalDuration - progSecs;
                                const absDiff = Math.abs(diff);
                                const colour = diff > 0 ? 'text-red-500' : absDiff <= 30 ? 'text-amber-500' : 'text-emerald-600';
                                const sign = diff > 0 ? '+' : '−';
                                const label = diff === 0 ? formatDuration(totalDuration) : `${formatDuration(totalDuration)} <span class="text-sm font-normal">(${sign}${formatDuration(absDiff)})</span>`;
                                return `<span class="font-mono font-bold ${colour}">${label}</span>`;
                            })()}
                        </div>
                    ` : ''}
                    <div class="ml-auto flex items-center gap-2">
                        ${state.meta.rundownLocked ? `<span class="flex items-center gap-1.5 text-xs font-bold px-2.5 py-1 rounded-full border ${isEditor ? 'bg-amber-50 border-amber-300 text-amber-700' : 'bg-red-50 border-red-200 text-red-600'}"><i class="fa-solid fa-lock text-xs"></i> ${isEditor ? 'You locked this' : `Locked by ${escapeHTML(editorName)}`}</span>` : ''}
                        ${isEditor ? `<button data-action="toggle-rundown-lock" class="flex items-center gap-1.5 text-xs font-bold px-2.5 py-1.5 rounded-lg border transition-colors ${state.meta.rundownLocked ? 'bg-red-100 text-red-700 border-red-200 hover:bg-red-200' : 'bg-white text-slate-500 border-slate-300 hover:border-slate-400 hover:text-slate-700'}"><i class="fa-solid ${state.meta.rundownLocked ? 'fa-lock-open' : 'fa-lock'}"></i> ${state.meta.rundownLocked ? 'Unlock' : 'Lock'}</button>` : ''}
                    </div>
                </div>`;


            return `<div class="max-w-7xl mx-auto p-6 pb-24">
                <div class="flex justify-between items-end mb-4">
                    <div class="flex items-center gap-3">
                        <h2 class="text-2xl font-bold text-slate-800">Rundown</h2>
                    </div>
                    <div class="flex items-center gap-4">
                        ${txSecs === null || rxSecs === null ? `<div class="text-sm font-medium text-slate-500">Total TRT: <span class="text-slate-800 font-mono text-lg bg-slate-200 px-2 py-1 rounded ml-1">${formatDuration(totalDuration)}</span></div>` : ''}
                        <button data-action="add-story" ${isRundownLocked ? 'disabled title="Rundown is locked"' : ''} class="${isRundownLocked ? 'bg-slate-300 text-slate-500 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700 text-white'} px-5 py-2.5 rounded-lg font-medium transition-colors shadow-sm"><i class="fa-solid fa-plus mr-2"></i>Add Story</button>
                        <button data-action="print-scripts" class="bg-slate-600 hover:bg-slate-700 text-white px-5 py-2.5 rounded-lg font-medium transition-colors shadow-sm">
    <i class="fa-solid fa-print mr-2"></i>Print Scripts
</button>

                    </div>
                </div>
                ${txRxBar}
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                    <table class="w-full text-left border-collapse">
