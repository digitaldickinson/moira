<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moira Newsroom System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .drag-over { border-top: 4px solid #3b82f6 !important; }
        /* Presenter Script formatting */
        .script-text { white-space: pre-wrap; line-height: 1.6; }
        /* OBS Playout tally indicators */
        .obs-tally-program { box-shadow: 0 0 14px 2px rgba(220, 38, 38, 0.5); border-color: #dc2626 !important; }
        .obs-tally-preview { box-shadow: 0 0 14px 2px rgba(37, 99, 235, 0.5); border-color: #2563eb !important; }
        /* Safari-compatible scrolling for main container */
        #main-container { -webkit-overflow-scrolling: touch; overflow-y: auto; }
        /* ── PPM METER ── */
        .ppm-row { display: flex; align-items: center; gap: 4px; height: 8px; }
        .ppm-ch-label { font-family: monospace; font-size: 9px; font-weight: 700; color: #94a3b8; width: 10px; text-align: center; flex-shrink: 0; }
        .ppm-bar-wrap { flex: 1; display: flex; flex-direction: row; gap: 1px; height: 100%; }
        .ppm-seg { flex: 1; border-radius: 1px; }
        .ppm-dbval { font-family: monospace; font-size: 9px; color: #94a3b8; width: 52px; text-align: right; flex-shrink: 0; }
        .ppm-dbval.hot  { color: #dc2626; font-weight: 700; }
        .ppm-dbval.warn { color: #d97706; }
        .ppm-scale-row { display: flex; gap: 4px; padding-top: 2px; }
        .ppm-scale-spacer   { width: 14px; flex-shrink: 0; }
        .ppm-scale-spacer-r { width: 52px;  flex-shrink: 0; }
        .ppm-scale-inner { flex: 1; position: relative; height: 12px; }
        .ppm-tick { position: absolute; top: 0; font-size: 8px; font-family: monospace; color: #94a3b8; transform: translateX(-50%); white-space: nowrap; line-height: 1; }

        /* ── REUSABLE UI PATTERNS ── */
        /* Settings form labels */
        .form-label    { font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 0.25rem; }
        .form-label-sm { font-size: 0.625rem; font-weight: 700; color: #64748b; text-transform: uppercase; }
        /* Settings form inputs */
        .form-input    { width: 100%; border: 1px solid #e2e8f0; border-radius: 0.5rem; padding: 0.5rem 0.75rem; font-size: 0.875rem; font-family: monospace; outline: none; }
        .form-input:focus { border-color: #3b82f6; }
        .form-input-sm { width: 100%; border: 1px solid #e2e8f0; border-radius: 0.375rem; padding: 0.5rem 0.75rem; font-size: 0.875rem; font-family: monospace; outline: none; }
        /* Take control bar buttons */
        .take-btn      { flex: 1; padding: 1.25rem; border-radius: 0.75rem; font-weight: 900; font-size: 1.25rem; letter-spacing: 0.025em; box-shadow: 0 10px 15px -3px rgb(0 0 0/0.1); transition: background-color 150ms; text-align: center; }
        /* Primary action button (modal footer, settings) */
        .btn-primary   { padding: 0.625rem 1.5rem; border-radius: 0.5rem; background: #2563eb; color: #fff; font-weight: 500; font-size: 0.875rem; box-shadow: 0 1px 2px rgb(0 0 0/0.05); transition: background-color 150ms; }
        .btn-primary:hover { background: #1d4ed8; }
        /* Card header row used in Studio story cards */
        .card-header   { font-weight: 700; font-size: 1.125rem; padding: 0.75rem 1.5rem; letter-spacing: 0.05em; display: flex; justify-content: space-between; align-items: center; }

        /* ── PRESENTER SELF-FIRE COUNTDOWN FLASH ── */
        @keyframes clip-warn-flash { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
        .clip-warn-flash { animation: clip-warn-flash 0.5s ease-in-out infinite; }

        /* ── INSTANT MESSAGE TOAST ── */
        @keyframes toast-in  { from { opacity:0; transform:translateY(12px) scale(0.97); } to { opacity:1; transform:translateY(0) scale(1); } }
        @keyframes toast-out { from { opacity:1; } to { opacity:0; transform:translateY(-8px); } }
        .moira-toast { animation: toast-in 0.2s ease-out forwards; }
        .moira-toast.leaving { animation: toast-out 0.4s ease-in forwards; }

        /* ── SEGMENT BREAK ROWS ── */
        .segment-row td { padding: 0; }
        .segment-divider { display: flex; align-items: center; gap: 0; background: #eef2ff; color: #3730a3; border-top: 1px solid #c7d2fe; border-bottom: 1px solid #c7d2fe; }
        .segment-label  { font-size: 0.7rem; font-weight: 900; letter-spacing: 0.12em; text-transform: uppercase; padding: 0.4rem 1rem; white-space: nowrap; }
        .segment-dur    { font-size: 0.7rem; font-family: monospace; opacity: 0.6; padding-right: 1rem; }
        .segment-line   { flex: 1; height: 1px; background: #c7d2fe; }

    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col overflow-hidden text-slate-800">

    <!-- Discrete UI Containers -->
    <div id="header-container" class="shrink-0"></div>
    <div id="main-container" class="flex-1 overflow-auto"></div>
    <div id="modal-container" class="relative z-50"></div>

    <!-- OBS WebSocket v5.x (loaded as classic script so global is available inside the module) -->
    <script src="https://cdn.jsdelivr.net/npm/obs-websocket-js@5.0.4/dist/obs-ws.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, collection, query, where, orderBy, onSnapshot, updateDoc, runTransaction, addDoc, serverTimestamp, Timestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // 1. CONSTANTS & CONFIGURATION
        // ==========================================
        const DEFAULT_FORMATS = ["READ", "WRAP", "VOICER", "CLIP", "OOV", "ULAY", "OOV/CLIP", "ULAY/CLIP", "OVO", "FLOAT", "LIVE"];
        const DEFAULT_ROLES = ["Producer", "Reporter", "Presenter"];
        const STALE_LOCK_MS = 1000 * 10; // 10 seconds — heartbeat refreshes every 5s while editor is open
        // PPM constants — EBU Type II ballistics
        const PPM_SEGMENTS       = 24;
        const PPM_DB_MIN         = -36;
        const PPM_DB_MAX         = 0;
        const PPM_DB_RANGE       = 36;
        const PPM_SEG_DB         = PPM_DB_RANGE / PPM_SEGMENTS;  // 1.5 dB per segment
        const PPM_DECAY_PER_TICK = 0.343;   // ~8.57 dB/s at 40ms tick
        const PPM_HOLD_MS        = 1800;
        const PPM_SCALE_TICKS    = [-36, -24, -18, -12, -9, -6, -3, 0];
        const PPM_SEG_COLOURS    = Array.from({length:PPM_SEGMENTS},(_,i)=>i>=22?'#dc2626':i>=18?'#d97706':'#16a34a');
        const PPM_HOLD_COLOURS   = Array.from({length:PPM_SEGMENTS},(_,i)=>i>=22?'#fca5a5':i>=18?'#fcd34d':'#86efac');
        const PPM_SEG_UNLIT      = '#e2e8f0';

        const setSinkIdSupported = typeof HTMLAudioElement.prototype.setSinkId === 'function';

        const INITIAL_META = {
            order: [], staff: [], formats: DEFAULT_FORMATS, roles: DEFAULT_ROLES,
            showStartTime: null, activeStoryId: null,
            isTXMode: false, isRehearsalMode: false,
            rundownLocked: false, editorStaffId: null,
            txStartedAt: null, txTargetDuration: null,
            activeStoryStartedAt: null,
            isCued: false,
            txClockTime: '', 
            rxClockTime: '',

            // --- POSSIBLE AUTOMATION/PLAYOUT META FOR FUTURE MESSING AROUND  ---
            stagedStoryId: null,    // The ID of the next story that automation should prepare
            cuedChannel: null,      // Tracks if the media is loaded in 'A' or 'B' playout
            automationStatus: 'off', // 'off', 'ready', 'playing', or 'error'
            lastMediaFiredAt: null,  // Timestamp of the last hardware 'Play' command
            mediaRootOverride: '',   // Optional path for local studio media folders
            presenterClipStoryId: null,  // Set when presenter self-fires a clip
            presenterClipCommand: null,  // 'stop' written by director to remote-stop presenter clip
            presenterAlert: null         // { text, sentAt, sentBy } — producer cue to presenter view only
        };

        const TAB_ACTIVE = "bg-blue-600 text-white shadow-sm";
        const TAB_INACTIVE = "text-slate-600 hover:bg-slate-200 hover:text-slate-900";

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'moira-default';
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
        
        let firebaseConfig = null;
        try {
            const savedConfigStr = localStorage.getItem('moira_firebase_config');
            if (savedConfigStr) firebaseConfig = JSON.parse(savedConfigStr);
            else if (typeof window.MOIRA_CONFIG !== 'undefined') firebaseConfig = window.MOIRA_CONFIG;
            else if (typeof __firebase_config !== 'undefined') firebaseConfig = JSON.parse(__firebase_config);
        } catch(e) { console.error("Config error", e); }
        
        let app, auth, db;
        let txTimerInterval = null;
        let lockRefreshInterval = null;  // keeps lockedAt current while editor is open

        function startLockRefresh(id) {
            stopLockRefresh();
            lockRefreshInterval = setInterval(async () => {
                // Only refresh if we still own the lock and the modal is still open
                if (state.ui.editingStoryId !== id) { stopLockRefresh(); return; }
                const story = state.storiesMap[id];
                if (!story || story.lockedBySession !== state.sessionId) { stopLockRefresh(); return; }
                const now = Date.now();
                if (state.storiesMap[id]) state.storiesMap[id].lockedAt = now;
                try { await DB.updateStory(id, { lockedAt: now }); }
                catch(e) { console.warn('Lock refresh failed — lock may go stale:', e.message); }
            }, 5000);
        }

        function stopLockRefresh() {
            if (lockRefreshInterval) { clearInterval(lockRefreshInterval); lockRefreshInterval = null; }
        }

        // Captured once at page load — used to filter the messages listener so we
        // only receive messages sent after this client connected, not historical ones.
        const SESSION_START = new Date();

        // ── WAKE LOCK ──────────────────────────────────────────────────────────
        let wakeLock = null;
        async function acquireWakeLock() {
            if (!('wakeLock' in navigator)) return;
            try {
                wakeLock = await navigator.wakeLock.request('screen');
                wakeLock.addEventListener('release', () => { wakeLock = null; });
            } catch(e) { console.warn('Wake lock failed:', e.message); }
        }
        function releaseWakeLock() {
            if (wakeLock) { wakeLock.release(); wakeLock = null; }
        }
        // visibilitychange — two behaviours:
        // 1. Re-acquire wake lock when tab returns to foreground during TX.
        // 2. Release story edit lock when tab goes to background — the editor is
        //    no longer active and the heartbeat will stop, so releasing immediately
        //    prevents a ghost lock from blocking other users. Note: the user will
        //    need to re-open the story on return if they want to continue editing.
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                if (state.meta.isTXMode) acquireWakeLock();
            } else {
                // Tab hidden — stop heartbeat and release lock if held
                if (state.ui.editingStoryId) {
                    stopLockRefresh();
                    const editingId = state.ui.editingStoryId;
                    state.ui.editingStoryId = null;
                    unlockStory(editingId);
                    render('main', 'modal');
                }
            }
        });

        // ── INDEXEDDB — media folder handle persistence ────────────────────────
        const IDB_NAME = 'moira', IDB_STORE = 'handles', IDB_KEY = 'mediaFolder';
        function idbOpen() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(IDB_NAME, 1);
                req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE);
                req.onsuccess = e => resolve(e.target.result);
                req.onerror   = e => reject(e.target.error);
            });
        }
        async function idbSaveHandle(handle) {
            try {
                const db = await idbOpen();
                const tx = db.transaction(IDB_STORE, 'readwrite');
                tx.objectStore(IDB_STORE).put(handle, IDB_KEY);
                await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
                db.close();
            } catch(e) {
                console.warn('idbSaveHandle failed:', e);
                radioLog('Could not persist media folder — you may need to re-grant access on next load.', 'warn');
            }
        }
        async function idbLoadHandle() {
            try {
                const db = await idbOpen();
                const handle = await new Promise((res, rej) => {
                    const tx = db.transaction(IDB_STORE, 'readonly');
                    const req = tx.objectStore(IDB_STORE).get(IDB_KEY);
                    req.onsuccess = () => res(req.result);
                    req.onerror   = () => rej(req.error);
                });
                db.close();
                return handle || null;
            } catch(e) { return null; }
        }
        async function idbClearHandle() {
            try {
                const db = await idbOpen();
                const tx = db.transaction(IDB_STORE, 'readwrite');
                tx.objectStore(IDB_STORE).delete(IDB_KEY);
                await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
                db.close();
            } catch(e) { console.warn('idbClearHandle failed:', e); }
        }

        // OBS playout engine — see OBS module (IIFE) below
        function loadRadioConfig() {
                state.radio.selectedSinkId = localStorage.getItem('RADIO_SINK_ID') || '';
            }
                // Radio audio engine globals
        let radioAudioCtx = null;
        let radioRafId = null;
        let syncPlayoutTimeout = null; // debounce handle for syncPlayoutToActive

        function getRadioCtx() {
            if (!radioAudioCtx) radioAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (radioAudioCtx.state === 'suspended') radioAudioCtx.resume();
            return radioAudioCtx;
        }

        function makeRadioDeckState(id) {
            return {
                id, audio: null, sourceNode: null, splitter: null,
                analyserL: null, analyserR: null, gainNode: null,
                state: 'idle', duration: 0, filename: '', slug: '',
                objectUrl: null, meterInterval: null, loadedStoryId: null,
                ppm: {
                    L: { level: PPM_DB_MIN, hold: PPM_DB_MIN, holdAt: 0 },
                    R: { level: PPM_DB_MIN, hold: PPM_DB_MIN, holdAt: 0 }
                }
            };
        }

        const getPaths = (id) => ({
            bulletins: ['artifacts', id, 'public', 'data', 'bulletins'],
            stories: ['artifacts', id, 'public', 'data', 'rundown_stories'],
            messages: ['artifacts', id, 'public', 'data', 'bulletins']  // sub-collection: append bulletinId + 'messages'
        });
        const paths = getPaths(appId);

        // ==========================================
        // 2. CENTRAL STATE OBJECT
        // ==========================================
        const savedRoomName = localStorage.getItem('moira_room_name') || 'Main';
        const savedBulletinId = localStorage.getItem('moira_bulletin_id') || 'bulletin-primary';
        // Migration: old boolean showPlayout → new string playoutBackend
        const _oldShow = localStorage.getItem('moira_show_playout');
        if (_oldShow !== null) {
            if (_oldShow === 'true' && !localStorage.getItem('moira_playout_backend')) {
                localStorage.setItem('moira_playout_backend', 'obs');
            }
            localStorage.removeItem('moira_show_playout');
        }
        const savedPlayoutBackend = localStorage.getItem('moira_playout_backend') || 'radio';

        let state = {
            mode: "newsroom", 
            localMode: true,
            connectionState: 'offline', 
            roomDisplayName: savedRoomName,
            currentBulletinId: savedBulletinId,
            sessionId: crypto.randomUUID(), 
            myStaffId: null,
            meta: { ...INITIAL_META },
            storiesMap: {},
            obs: {
                connected: false,
                isTaking: false,
                program: '',   // scene name, e.g. 'VT A'
                preview: '',
                deckA: { state: 'STOPPED', cursor: 0, duration: 0, loadedStoryId: null },
                deckB: { state: 'STOPPED', cursor: 0, duration: 0, loadedStoryId: null },
                clipQueue: [],  // storyIds with mediaFiles, in rundown order
                clipIndex: -1,  // index into clipQueue of the clip currently on program deck
                log: []        // [{ time, type, msg }]
            },
             radio: {
                deckA: makeRadioDeckState('A'),
                deckB: makeRadioDeckState('B'),
                clipQueue: [], clipIndex: -1,
                selectedSinkId: '',
                devices: [],
                directoryHandle: null,
                takeTimeout: null,  // stored so rapid Takes don't overlap
                log: []
            },
            ui: {
                draggedStoryId: null,
                inlineEditingId: null,
                editingStoryId: null,
                pendingConflict: null,
                lastScrolledStoryId: null,
                pendingScrollToStoryId: null,
                isStaffModalOpen: false,
                isSettingsModalOpen: false,
                settingsTab: 'connection',
                // Presenter must be INSIDE ui
                presenter: {
                    mirrorX: false,
                    mirrorY: false,
                    autoScroll: false,
                    scrollSpeed: 40,
                    zenMode: false,
                    fontScale: 1,
                    lineHeight: 1.6,
                    focusMode: 'rundown',
                    pausedByUser: false,
                    presenterMode: 'presenter',  // 'autocue' | 'presenter'
                    expandedStoryId: null,
                    selfFireEnabled: localStorage.getItem('moira_presenter_self_fire') === 'true',
                    clipAudio: null,  // transient Audio element for presenter self-fire
                    clipCountdownInterval: null,  // interval handle for button countdown display
                    cardsFontLarge: false,  // presenter cards script font size toggle
                },
                playoutBackend: savedPlayoutBackend,  // 'none' | 'radio' | 'obs'
                trash: [],           // [{id, story, orderIndex, deletedAt}]
                storySnapshots: {},  // {storyId: previousStoryData} — set before each save
                mediaFolderPendingHandle: null, // stored handle awaiting one-click re-grant
                alertPanelOpen: false          // controls alert compose popover in newsroom
            }
        };

        // Unified Guard Helper
        const canMutate = () => state.localMode || (!!auth && !!auth.currentUser);
        const isPlaybackMaster = () =>
            !state.localMode &&
            state.meta.isTXMode &&
            !!state.radio.directoryHandle;

        // ==========================================
        // 3. STARTUP & FIREBASE INIT
        // ==========================================
        // ── INSTANT MESSAGE TOAST ──────────────────────────────────────────────
        // Injects a self-removing toast into a fixed container at the top-right.
        // Safe to call from any view — purely DOM-level, no render() needed.
        // ── ERROR NOTIFICATION ────────────────────────────────────────────────
        // Persistent (non-auto-dismissing) error banner. Stays visible until the
        // operator dismisses it or the problem is resolved. Sits below the toast
        // container so toasts and errors don't compete visually.
        // Platform-agnostic: all adapters and engines call this with plain strings.
        let _errorContainer = null;
        function showError(message, actionLabel = null, actionFn = null) {
            if (!_errorContainer) {
                _errorContainer = document.createElement('div');
                _errorContainer.id = 'moira-error-container';
                _errorContainer.style.cssText = 'position:fixed;bottom:1rem;right:1rem;z-index:9998;display:flex;flex-direction:column;gap:0.5rem;pointer-events:none;max-width:26rem;';
                document.body.appendChild(_errorContainer);
            }

            const el = document.createElement('div');
            el.style.cssText = 'background:#1e293b;border:1px solid #ef4444;border-left:4px solid #ef4444;border-radius:0.75rem;padding:0.75rem 1rem;box-shadow:0 8px 32px rgba(0,0,0,0.5);pointer-events:auto;display:flex;flex-direction:column;gap:0.4rem;';
            el.innerHTML = `
                <div style="display:flex;align-items:center;justify-content:space-between;gap:0.5rem;">
                    <span style="font-size:0.6rem;font-weight:900;color:#ef4444;text-transform:uppercase;letter-spacing:0.1em;">&#9888; Error</span>
                    <button style="font-size:0.7rem;color:#64748b;background:none;border:none;cursor:pointer;padding:0;" onclick="this.closest('div[style]').remove()">&#10005; Dismiss</button>
                </div>
                <div style="font-size:0.82rem;font-weight:600;color:#f1f5f9;line-height:1.45;">${escapeHTML(message)}</div>
                ${actionLabel && actionFn ? `<button style="margin-top:0.2rem;font-size:0.75rem;font-weight:700;color:#93c5fd;background:none;border:none;cursor:pointer;text-align:left;padding:0;text-decoration:underline;" id="moira-err-action">${escapeHTML(actionLabel)}</button>` : ''}`;

            if (actionLabel && actionFn) {
                el.querySelector('#moira-err-action').addEventListener('click', () => { el.remove(); actionFn(); });
            }

            _errorContainer.appendChild(el);

            // Auto-dismiss after 20s — long enough to read and act, not permanent
            setTimeout(() => { if (el.parentNode) el.remove(); }, 20000);
        }

        let _toastContainer = null;
        function showToast(senderName, text) {
            if (!_toastContainer) {
                _toastContainer = document.createElement('div');
                _toastContainer.id = 'moira-toast-container';
                _toastContainer.style.cssText = 'position:fixed;top:1rem;right:1rem;z-index:9999;display:flex;flex-direction:column;gap:0.5rem;pointer-events:none;max-width:22rem;';
                document.body.appendChild(_toastContainer);
            }

            const toast = document.createElement('div');
            toast.className = 'moira-toast';
            toast.style.cssText = 'background:#1e293b;border:1px solid #f59e0b;border-left:4px solid #f59e0b;border-radius:0.75rem;padding:0.75rem 1rem;box-shadow:0 8px 32px rgba(0,0,0,0.4);pointer-events:auto;';
            toast.innerHTML = `
                <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.25rem;">
                    <span style="font-size:0.6rem;font-weight:900;color:#f59e0b;text-transform:uppercase;letter-spacing:0.1em;">&#128226; Producer</span>
                    <span style="font-size:0.6rem;color:#64748b;font-family:monospace;">${escapeHTML(senderName)}</span>
                </div>
                <div style="font-size:0.875rem;font-weight:700;color:#f1f5f9;line-height:1.4;">${escapeHTML(text)}</div>`;

            _toastContainer.appendChild(toast);

            // Auto-dismiss after 8s with fade-out
            const dismiss = () => {
                toast.classList.add('leaving');
                toast.addEventListener('animationend', () => toast.remove(), { once: true });
            };
            const timer = setTimeout(dismiss, 8000);
            // Allow early tap-to-dismiss
            toast.addEventListener('click', () => { clearTimeout(timer); dismiss(); });
        }

        /**
         * Retrieves the persisted FileSystemDirectoryHandle from IndexedDB and
         * restores media folder access silently (if permission is already granted)
         * or sets the pending-handle state (if a one-click re-grant is needed).
         * No-ops on browsers without File System Access API support.
         */
        async function restoreMediaFolder() {
            if (!window.showDirectoryPicker) return;
            try {
                const handle = await idbLoadHandle();
                if (!handle) return;
                const perm = await handle.queryPermission({ mode: 'read' });
                if (perm === 'granted') {
                    state.radio.directoryHandle = handle;
                    radioLog(`Media folder restored: "${handle.name}"`, 'success');
                } else if (perm === 'prompt') {
                    // Surface a one-click re-grant button rather than forcing the full picker
                    state.ui.mediaFolderPendingHandle = handle;
                }
                // 'denied' — fall through, let user re-grant manually
            } catch(e) { radioLog(`Could not restore media folder handle — it may have been moved or deleted. Choose the folder again in Settings.`, 'warn'); }
        }

       /**
         * Application entry point. Restores persisted staff identity, starts the
         * 30s heartbeat that keeps lastSeen current, initialises the configured
         * playout backend (OBS or radio), then either connects to Firebase (cloud
         * mode) or falls back to local seed data. Always ends by binding the
         * global DOM event listeners.
         */
       async function boot() {
            state.myStaffId = localStorage.getItem('moira_my_staff_id');
            if (firebaseConfig) state.connectionState = 'connecting';
            // Start heartbeat — updates lastSeen every 30s while checked in and tab is visible
            setInterval(() => {
                if (state.myStaffId && document.visibilityState === 'visible') {
                    updateStaffInCloud(staff => staff.map(s =>
                        s.id === state.myStaffId ? { ...s, lastSeen: Date.now() } : s
                    ));
                }
            }, 30000);
            
            // Load OBS config and attempt connection only if playout is enabled
            if (state.ui.playoutBackend === 'obs') {
                OBS.loadConfig();
                OBS.connect();
            } else if (state.ui.playoutBackend === 'radio') {
                loadRadioConfig();
                populateRadioDevices();
            }

            // Restore media folder handle from IndexedDB. Awaited so the handle
            // is available before the first render and before TX start auto-load.
            await restoreMediaFolder();
            
            if (firebaseConfig) {
                try {
                    app = initializeApp(firebaseConfig);
                    auth = getAuth(app);
                    db = getFirestore(app);

                    if (initialAuthToken) await signInWithCustomToken(auth, initialAuthToken);
                    else await signInAnonymously(auth);

                    onAuthStateChanged(auth, user => {
                        if (user) {
                            state.localMode = false;
                            DB = DB_FIREBASE;
                            seedCloudIfEmpty().then(() => setupListeners());
                        } else {
                            state.connectionState = 'offline';
                            render('header');
                            showError('Signed out of Firebase — running in read-only mode. Reload to reconnect.', 'Reload', () => location.reload());
                        }
                    });
                } catch (e) {
                    state.connectionState = 'error';
                    render('header');
                    const msg = e.code === 'auth/invalid-api-key'
                        ? 'Invalid Firebase API key — check your config in Settings.'
                        : e.code === 'auth/network-request-failed'
                            ? 'Could not reach Firebase — check your internet connection.'
                            : `Firebase auth failed: ${e.message}`;
                    showError(msg, 'Open Settings', () => { state.ui.isSettingsModalOpen = true; state.ui.settingsTab = 'connection'; render('modal'); });
                }
            } else {
                seedLocalData(); 
            }
            bindGlobalEvents();
        }

       /**
         * Switches the active bulletin to a different named room. Tears down the
         * existing Firebase listeners, resets stories and meta state, stores the
         * new room name in localStorage, then re-seeds or re-connects for the
         * new room. Triggers a full re-render on completion.
         * @param {string} newRoomName - Display name of the target room.
         */
       async function switchRoom(newRoomName) {
            const name = newRoomName.trim() || 'Main';
            const sanitizedId = name.toLowerCase() === 'main' ? 'bulletin-primary' : 'bulletin-' + name.toLowerCase().replace(/[^a-z0-9]/g, '-');
            
            if (state.currentBulletinId === sanitizedId) return;

            if (state.ui.editingStoryId) unlockStory(state.ui.editingStoryId);

            state.roomDisplayName = name;
            state.currentBulletinId = sanitizedId;
            state.storiesMap = {};
            state.meta = { ...INITIAL_META };
            state.ui.draggedStoryId = null;
            state.ui.editingStoryId = null;
            state.ui.pendingConflict = null;

            // Clear identity — myStaffId from old room won't exist in new room
            state.myStaffId = null;
            localStorage.removeItem('moira_my_staff_id');

            localStorage.setItem('moira_room_name', name);
            localStorage.setItem('moira_bulletin_id', sanitizedId);

            // ← render() removed from here — seedLocalData/seedCloudIfEmpty will render

            if (canMutate() && !state.localMode) {
                await seedCloudIfEmpty();
                setupListeners();
            } else if (state.localMode) {
                seedLocalData();
            }
        }


        function seedLocalData() {
            if (!state.localMode) return;
            // Fix: ensure room-specific data is loaded correctly
            if (loadLocalState()) {
                render('header', 'main');
                return;
            }

            const localId = crypto.randomUUID();
            state.storiesMap[localId] = {
                bulletinId: state.currentBulletinId,
                slug: "BREAKING NEWS: SYSTEM ONLINE",
                script: `Good evening, welcome to the Moira Newsroom System.\nYou are currently in the [${state.roomDisplayName}] room in Local Mode.\n\n[CAM 1]\nThis is a demonstration script showing an instruction block.`,
                format: "OVO",
                presenterId: "",
                reporterId: "",
                mediaFile: "",
                duration: 15,
                completed: false,
                lockedBySession: null,
                lockedByName: null,
                lockedAt: null,
                rev: 1
            };
            state.meta = { ...INITIAL_META, order: [localId, 'marker-line'] };
            render('header', 'main');
        }

        async function seedCloudIfEmpty() {
            if (state.localMode) return;
            try { await DB.seed(); }
            catch(e) {
                showError('Could not initialise newsroom — ' + DB.errorMessage(e), 'Open Settings', () => { state.ui.isSettingsModalOpen = true; render('modal'); });
                state.connectionState = 'error';
                render('header');
            }
        }

        // ==========================================
        // 4. DATA SYNCHRONIZATION
        // ==========================================


        /**
         * Attaches Firestore real-time listeners for the current bulletin document
         * and its stories collection. Both listeners call render() on every update.
         * Old listeners are unsubscribed before new ones are attached, making this
         * safe to call again after a room switch.
         */
        // Single unsub handle returned by DB.subscribe — tears down all three listeners at once
        let unsubAll = null;

        function setupListeners() {
            if (!canMutate() || state.localMode) return;
            if (unsubAll) { unsubAll(); unsubAll = null; }

            unsubAll = DB.subscribe(
                // onBulletin
                (data, err) => {
                    if (err) { state.connectionState = 'error'; render('header'); showError('Lost connection to database — changes are not saving. Reconnecting…'); return; }
                    state.connectionState = 'connected';
                    if (data) {
                        const incoming = { ...INITIAL_META, ...data };
                        const prevClipId = state.meta.presenterClipStoryId;

                        // Remote stop command — honour if we're the master currently playing
                        if (incoming.presenterClipCommand === 'stop' && isPlaybackMaster() && state.ui.presenter.playingClipStoryId) {
                            _stopPresenterCountdown();
                            if (state.ui.presenter.clipAudio) {
                                state.ui.presenter.clipAudio.pause();
                                if (state.ui.presenter.clipAudio.objectUrl)
                                    URL.revokeObjectURL(state.ui.presenter.clipAudio.objectUrl);
                                state.ui.presenter.clipAudio = null;
                            }
                            state.ui.presenter.playingClipStoryId = null;
                            updatePresenterClip(null, null);
                        }

                        state.meta = incoming;

                        // Remote fire: a new clip request has arrived and we are the master
                        // Guard: skip if we're already playing this story (prevents double-fire
                        //        when master's own write echoes back through the snapshot)
                        if (
                            isPlaybackMaster() &&
                            incoming.presenterClipStoryId &&
                            incoming.presenterClipStoryId !== prevClipId &&
                            incoming.presenterClipStoryId !== state.ui.presenter.playingClipStoryId
                        ) {
                            _executePresenterClipPlayback(incoming.presenterClipStoryId);
                        }
                    }
                    render('header', 'main');
                },
                // onStories
                (changes, err) => {
                    if (err) { state.connectionState = 'error'; render('header'); showError('Story sync lost — check your connection.'); return; }
                    const newMap = { ...state.storiesMap };
                    changes.forEach(({ type, id, data }) => {
                        if (type === 'removed') delete newMap[id];
                        else newMap[id] = data;
                    });
                    state.storiesMap = newMap;
                    render('main');
                },
                // onMessages
                (messages) => {
                    messages.forEach(d => showToast(d.senderName || 'Unknown', d.text || ''));
                }
            );
        }

        // ==========================================
        // 4b. DB ADAPTER
        // ==========================================
        /**
         * Platform-agnostic data layer. All mutators call DB.* instead of the
         * Firebase SDK directly. To port to a new backend (e.g. PocketBase),
         * replace this object with an implementation of the same interface.
         *
         * Local mode: DB is set to DB_NULL (all methods no-op) in boot().
         * Cloud mode: DB is set to DB_FIREBASE after auth succeeds.
         *
         * Convention: mutators update state optimistically first, then call DB.*
         * which persists to the backend. The adapter never touches state directly.
         */

        // ── NULL ADAPTER — used in local / offline mode ────────────────────────
        const DB_NULL = {
            seed:                async ()           => {},
            subscribe:                 ()           => () => {},
            updateBulletin:      async ()           => {},
            updateBulletinOrder: async ()           => {},
            updateStaff:         async ()           => {},
            updateStory:         async ()           => {},
            createStory:         async ()           => {},
            deleteStory:         async ()           => {},
            restoreStory:        async ()           => {},
            saveStory:           async ()           => 'ok',
            lockStory:           async ()           => {},
            saveSlug:            async ()           => {},
            takeLock:            async ()           => {},
            sendMessage:         async ()           => {},
            // Translates a raw error into a user-safe string.
            // Local mode never produces DB errors — passthrough only.
            errorMessage:              (e)          => e?.message || 'Unknown error',
        };

        // ── FIREBASE ADAPTER ───────────────────────────────────────────────────
        const DB_FIREBASE = {

            // Seed the bulletin with a starter story if it doesn't exist yet
            seed: async () => {
                const bullRef = doc(db, ...paths.bulletins, state.currentBulletinId);
                await runTransaction(db, async (transaction) => {
                    const docSnap = await transaction.get(bullRef);
                    if (docSnap.exists()) return;
                    const firstStoryId = crypto.randomUUID();
                    const firstStoryRef = doc(db, ...paths.stories, firstStoryId);
                    transaction.set(bullRef, { ...INITIAL_META, order: [firstStoryId, 'marker-line'] });
                    transaction.set(firstStoryRef, {
                        bulletinId: state.currentBulletinId,
                        slug: 'TOP STORY',
                        script: `Good evening. Welcome to the news from ${state.roomDisplayName}...`,
                        format: 'OVO', presenterId: '', reporterId: '', mediaFile: '',
                        duration: 30, completed: false,
                        lockedBySession: null, lockedByName: null, lockedAt: null, rev: 1
                    });
                });
            },

            // Attach all three real-time listeners. Returns a single teardown fn.
            subscribe: (onBulletin, onStories, onMessages) => {
                const unsubB = onSnapshot(
                    doc(db, ...paths.bulletins, state.currentBulletinId),
                    (snap) => onBulletin(snap.exists() ? snap.data() : null),
                    (err) => onBulletin(null, err)
                );
                const storiesQuery = query(
                    collection(db, ...paths.stories),
                    where('bulletinId', '==', state.currentBulletinId)
                );
                const unsubS = onSnapshot(
                    storiesQuery,
                    (snap) => onStories(snap.docChanges().map(c => ({ type: c.type, id: c.doc.id, data: c.doc.data() }))),
                    (err) => onStories([], err)
                );
                const messagesRef = collection(db, ...paths.bulletins, state.currentBulletinId, 'messages');
                const messagesQuery = query(
                    messagesRef,
                    where('timestamp', '>', Timestamp.fromDate(SESSION_START)),
                    orderBy('timestamp', 'asc')
                );
                const unsubM = onSnapshot(
                    messagesQuery,
                    (snap) => onMessages(snap.docChanges().filter(c => c.type === 'added').map(c => c.doc.data())),
                    (err) => console.warn('Messages listener error:', err)
                );
                return () => { unsubB(); unsubS(); unsubM(); };
            },

            // Merge partial update into the bulletin document
            updateBulletin: async (updates) => {
                await updateDoc(doc(db, ...paths.bulletins, state.currentBulletinId), updates);
            },

            // Atomic read-modify-write on bulletin order.
            // mutateFn receives the current order array and returns the new one.
            updateBulletinOrder: async (mutateFn) => {
                const bullRef = doc(db, ...paths.bulletins, state.currentBulletinId);
                await runTransaction(db, async (t) => {
                    const snap = await t.get(bullRef);
                    if (!snap.exists()) return;
                    t.update(bullRef, { order: mutateFn(snap.data().order || []) });
                });
            },

            // Atomic read-modify-write on the staff array.
            // mutateFn receives the current staff array and returns the new one.
            updateStaff: async (mutateFn) => {
                const bullRef = doc(db, ...paths.bulletins, state.currentBulletinId);
                await runTransaction(db, async (t) => {
                    const snap = await t.get(bullRef);
                    if (snap.exists()) t.update(bullRef, { staff: mutateFn(snap.data().staff || []) });
                });
            },

            // Simple partial update on a story document
            updateStory: async (id, data) => {
                await updateDoc(doc(db, ...paths.stories, id), data);
            },

            // Atomic: set story document + splice id into bulletin order before marker-line
            createStory: async (id, storyData) => {
                const storyRef = doc(db, ...paths.stories, id);
                const bullRef  = doc(db, ...paths.bulletins, state.currentBulletinId);
                await runTransaction(db, async (t) => {
                    const bullSnap = await t.get(bullRef);
                    if (!bullSnap.exists()) throw new Error('Bulletin missing');
                    const order = [...(bullSnap.data().order || [])];
                    const markerIdx = order.indexOf('marker-line');
                    if (markerIdx > -1) order.splice(markerIdx, 0, id);
                    else order.push(id, 'marker-line');
                    t.set(storyRef, storyData);
                    t.update(bullRef, { order });
                });
            },

            // Atomic: delete story document + remove id from bulletin order
            deleteStory: async (id) => {
                const storyRef = doc(db, ...paths.stories, id);
                const bullRef  = doc(db, ...paths.bulletins, state.currentBulletinId);
                await runTransaction(db, async (t) => {
                    const bullSnap = await t.get(bullRef);
                    if (!bullSnap.exists()) return;
                    const order = bullSnap.data().order.filter(i => i !== id);
                    t.delete(storyRef);
                    t.update(bullRef, { order });
                });
            },

            // Atomic: re-create story document + splice back into bulletin order at insertAt
            restoreStory: async (id, storyData, insertAt) => {
                const storyRef = doc(db, ...paths.stories, id);
                const bullRef  = doc(db, ...paths.bulletins, state.currentBulletinId);
                await runTransaction(db, async (t) => {
                    const bullSnap = await t.get(bullRef);
                    if (!bullSnap.exists()) throw new Error('Bulletin missing');
                    const order = [...(bullSnap.data().order || [])];
                    order.splice(Math.min(insertAt, order.length), 0, id);
                    t.set(storyRef, storyData);
                    t.update(bullRef, { order });
                });
            },

            // Atomic save with optimistic-concurrency rev check.
            // Returns 'conflict' if server rev has advanced, 'ok' on success.
            saveStory: async (id, data) => {
                const storyRef = doc(db, ...paths.stories, id);
                try {
                    await runTransaction(db, async (t) => {
                        const snap = await t.get(storyRef);
                        if (!snap.exists()) throw new Error('Story missing');
                        const serverData = snap.data();
                        if (serverData.rev !== data.rev) {
                            state.ui.pendingConflict = { storyId: id, serverData, localData: data };
                            throw new Error('Revision conflict');
                        }
                        data.rev = serverData.rev + 1;
                        t.update(storyRef, { ...data, lockedBySession: null, lockedByName: null, lockedAt: null });
                    });
                    return 'ok';
                } catch(e) {
                    if (e.message === 'Revision conflict') return 'conflict';
                    throw e;
                }
            },

            // Atomic stale-safe lock acquisition
            lockStory: async (id, sessionId, userName, now) => {
                const storyRef = doc(db, ...paths.stories, id);
                await runTransaction(db, async (t) => {
                    const snap = await t.get(storyRef);
                    if (!snap.exists()) return;
                    const data = snap.data();
                    const isStale = data.lockedAt && (now - data.lockedAt > STALE_LOCK_MS);
                    if (!data.lockedBySession || isStale) {
                        t.update(storyRef, { lockedBySession: sessionId, lockedByName: userName, lockedAt: now });
                    }
                });
            },

            // Atomic: save slug + release lock in one transaction
            saveSlug: async (id, slug, sessionId) => {
                const storyRef = doc(db, ...paths.stories, id);
                await runTransaction(db, async (t) => {
                    const snap = await t.get(storyRef);
                    if (!snap.exists()) throw new Error('Story missing');
                    const data = snap.data();
                    if (data.lockedBySession && data.lockedBySession !== sessionId) throw new Error('Lock mismatch');
                    t.update(storyRef, { slug, rev: data.rev + 1, lockedBySession: null, lockedByName: null, lockedAt: null });
                });
            },

            // Atomic: force-acquire lock (used in take-over-edit)
            takeLock: async (id, sessionId, userName, now) => {
                const storyRef = doc(db, ...paths.stories, id);
                await runTransaction(db, async (t) => {
                    const snap = await t.get(storyRef);
                    if (!snap.exists()) throw new Error('Story missing');
                    const data = snap.data();
                    const isStale = data.lockedAt && (now - data.lockedAt > STALE_LOCK_MS);
                    if (!data.lockedBySession || isStale || data.lockedBySession === sessionId) {
                        t.update(storyRef, { lockedBySession: sessionId, lockedByName: userName, lockedAt: now });
                    } else {
                        throw new Error('Lock held by another session');
                    }
                });
            },

            // Write a volatile message to the bulletin's messages sub-collection
            sendMessage: async (senderName, text) => {
                const messagesRef = collection(db, ...paths.bulletins, state.currentBulletinId, 'messages');
                await addDoc(messagesRef, { senderName, text, timestamp: serverTimestamp() });
            },

            // Translates a raw Firestore error into a user-safe string.
            // Pi ports implement this for their own backend (PocketBase, etc.).
            errorMessage: (e) => {
                if (!e) return 'Unknown database error';
                const code = e.code || '';
                if (code === 'permission-denied')   return 'Permission denied — check your Firestore security rules';
                if (code === 'unavailable')          return 'Database unavailable — check your internet connection';
                if (code === 'not-found')            return 'Document not found — it may have been deleted by another user';
                if (code === 'already-exists')       return 'Document already exists — refresh and try again';
                if (code === 'resource-exhausted')   return 'Firestore quota exceeded — contact your administrator';
                if (code === 'unauthenticated')      return 'Not authenticated — try reloading the page';
                if (code === 'cancelled')            return 'Operation cancelled — try again';
                if (code === 'deadline-exceeded')    return 'Database timeout — check your connection and try again';
                return e.message || 'Database write failed';
            },
        };

        // Active adapter — swapped in boot() based on mode
        let DB = DB_NULL;

        // ==========================================
        // 5. CORE ACTIONS (Mutators)
        // ==========================================
        /**
         * Acquires an optimistic edit lock on a story for the current session.
         * In cloud mode uses a Firestore transaction so only the first writer wins.
         * Stale locks (older than STALE_LOCK_MS) are silently overwritten.
         * @param {string} id - Story document ID.
         */
        async function lockStory(id) {
            if (!canMutate()) return;
            const userName = getMyName();
            const now = Date.now();
            const existing = state.storiesMap[id];
            // Only apply the optimistic update if the story is not already freshly
            // locked by another session. If it is, leave local state intact — the
            // snapshot already has the correct lock data and the DB transaction will
            // correctly reject our attempt. Overwriting would hide the lock banner.
            const heldByOther = existing?.lockedBySession &&
                existing.lockedBySession !== state.sessionId &&
                existing.lockedAt && (now - existing.lockedAt <= STALE_LOCK_MS);

            if (!heldByOther && existing) {
                state.storiesMap[id].lockedBySession = state.sessionId;
                state.storiesMap[id].lockedByName = userName;
                state.storiesMap[id].lockedAt = now;
            }
            render('main', 'modal');
            try { await DB.lockStory(id, state.sessionId, userName, now); }
            catch(e) { console.error('Lock failed', e); /* non-fatal — lock is optimistic */ }
        }

        /**
         * Releases the edit lock on a story, but only if held by this session.
         * No-ops if the story is locked by a different session.
         * @param {string} id - Story document ID.
         */
        async function unlockStory(id) {
            if (!canMutate()) return;
            const story = state.storiesMap[id];
            if (!story || story.lockedBySession !== state.sessionId) return;
            if (state.storiesMap[id]) {
                state.storiesMap[id].lockedBySession = null;
                state.storiesMap[id].lockedByName = null;
                state.storiesMap[id].lockedAt = null;
            }
            render('main', 'modal');
            try { await DB.updateStory(id, { lockedBySession: null, lockedByName: null, lockedAt: null }); }
            catch(e) { console.error('Unlock failed', e); /* non-fatal — stale lock clears automatically */ }
        }

        /**
         * Persists story field changes and releases the edit lock. Snapshots the
         * pre-save version into storySnapshots to enable one-step revert.
         * In cloud mode uses an optimistic-concurrency Firestore transaction:
         * if the server rev has advanced since the editor opened the story,
         * sets pendingConflict so the user can resolve manually.
         * @param {string} id      - Story document ID.
         * @param {object} newData - Fields to merge, must include current rev.
         */
        async function saveStory(id, newData) {
            if (!canMutate()) return;
            if (state.storiesMap[id]) state.ui.storySnapshots[id] = { ...state.storiesMap[id] };
            // Preserve the original rev for the conflict check in the adapter,
            // then bump locally for the optimistic state update.
            const originalRev = newData.rev;
            newData.rev = (state.storiesMap[id]?.rev || 0) + 1;
            state.storiesMap[id] = { ...state.storiesMap[id], ...newData };
            state.ui.editingStoryId = null;
            render('main', 'modal');
            try {
                // Pass original rev so adapter can compare against server rev correctly
                const result = await DB.saveStory(id, { ...newData, rev: originalRev });
                if (result === 'conflict') render('modal');
            } catch(e) { showError('Story not saved — ' + DB.errorMessage(e), 'Retry', () => saveStory(id, newData)); }
        }

        async function toggleStoryComplete(id) {
            if (!canMutate()) return;
            const current = state.storiesMap[id]?.completed;
            const nextState = (!current || current === false || current === null)
                ? 'needs-checking'
                : current === 'needs-checking' ? 'checked-ok'
                : current === 'checked-ok' ? 'checked-needs-work'
                : null;
            state.storiesMap[id].completed = nextState;
            render('main');
            try { await DB.updateStory(id, { completed: nextState }); }
            catch(e) { console.error('Toggle failed', e); /* non-fatal */ }
        }

        async function reorderStory(draggedId, targetId) {
            if (!canMutate()) return;
            // Optimistic update
            let order = state.meta.order.filter(id => id !== draggedId);
            const targetIdx = order.indexOf(targetId);
            order.splice(targetIdx !== -1 ? targetIdx : order.length, 0, draggedId);
            state.meta.order = order;
            render('main');
            try {
                await DB.updateBulletinOrder(current => {
                    let o = current.filter(id => id !== draggedId);
                    const idx = o.indexOf(targetId);
                    o.splice(idx !== -1 ? idx : o.length, 0, draggedId);
                    return o;
                });
            } catch(e) { showError('Reorder failed — ' + DB.errorMessage(e)); }
        }

        /**
         * Writes a partial update to the bulletin metadata document (or local
         * state in offline mode). Used for clock times, lock state, formats,
         * roles, and any other top-level meta fields.
         * @param {object} updates - Key/value pairs to merge into bulletin meta.
         */
        // ── Purpose-specific bulletin mutators ───────────────────────────────────
        // Each knows exactly which sections it dirties, eliminating the bare render()
        // in the old generic updateBulletinMeta. All call DB.updateBulletin() so the
        // Pi adapter gets the same benefit automatically.

        // Presenter clip commands — dirties main (director/presenter clip badge only)
        async function updatePresenterClip(storyId, command) {
            if (!canMutate()) return;
            const updates = { presenterClipStoryId: storyId, presenterClipCommand: command };
            state.meta.presenterClipStoryId = storyId;
            state.meta.presenterClipCommand = command;
            render('main');
            try { await DB.updateBulletin(updates); }
            catch(e) { /* non-fatal — clip state clears naturally */ }
        }

        // Presenter alert — dirties header (alert dot) + main (banner + alert panel)
        async function updatePresenterAlert(alert) {
            if (!canMutate()) return;
            state.meta.presenterAlert = alert;
            render('header', 'main');
            try { await DB.updateBulletin({ presenterAlert: alert }); }
            catch(e) { showError('Alert failed to sync — ' + DB.errorMessage(e)); }
        }

        // TX/RX clock times — dirties main (timing bar only)
        async function updateClockTime(field, value) {
            if (!canMutate()) return;
            state.meta[field] = value;
            render('main');
            try { await DB.updateBulletin({ [field]: value }); }
            catch(e) { showError('Clock time update failed — ' + DB.errorMessage(e)); }
        }

        // Formats and roles — dirties modal (settings form) + main (format dropdowns)
        async function updateFormatsAndRoles(formats, roles) {
            if (!canMutate()) return;
            state.meta.formats = formats;
            state.meta.roles   = roles;
            render('main', 'modal');
            try { await DB.updateBulletin({ formats, roles }); }
            catch(e) { showError('Settings not saved — ' + DB.errorMessage(e)); }
        }

        // Reset runorder active pointer — dirties main only
        async function updateActivePointer(updates) {
            if (!canMutate()) return;
            state.meta = { ...state.meta, ...updates };
            render('main');
            try { await DB.updateBulletin(updates); }
            catch(e) { showError('Runorder reset failed — ' + DB.errorMessage(e)); }
        }

        // Generic fallback — kept for the beforeunload best-effort fire-and-forget
        // path and any edge case not covered by the specific mutators above.
        // Do NOT add new call sites — use a specific mutator instead.
        async function updateBulletinMeta(updates) {
            if (!canMutate()) return;

      /**
         * Transitions the show between off-air (standby) and live TX.
         * On TX start: records show/TX timestamps, sets active story to first in
         * the rundown, computes target duration for backtime. On standby: clears
         * all timing fields. Also primes the playout backend so decks are loaded
         * before the operator hits Start TX.
         * @param {'tx'|'standby'} targetMode
         */
      async function updateStudioMode(targetMode) {
            if (!canMutate()) return;

            const order = state.meta.order || [];
            const markerIdx = order.indexOf('marker-line');
            const storyIds = markerIdx > -1 ? order.slice(0, markerIdx) : order;
            const firstStoryId = storyIds.find(id => !state.storiesMap[id]?.isFloated && state.storiesMap[id]?.type !== 'segment') || null;
            const activeOrder = storyIds.filter(id => !state.storiesMap[id]?.isFloated && state.storiesMap[id]?.type !== 'segment');

            let updates = {
                isTXMode: false,
                isRehearsalMode: false,
                isCued: true,
                showStartTime: null,
                txStartedAt: null,
                txTargetDuration: null,
                activeStoryStartedAt: null,
                activeStoryId: firstStoryId
            };

            if (targetMode === 'tx') {
                updates.isTXMode = true;
                updates.showStartTime = Date.now();
                updates.txStartedAt = Date.now();
                updates.activeStoryStartedAt = Date.now();
                updates.txTargetDuration = storyIds.reduce(
                    (sum, id) => sum + (state.storiesMap[id]?.duration || 0), 0
                );
            }

            state.meta = { ...state.meta, ...updates };
            render('main');
            try { await DB.updateBulletin(updates); }
            catch(e) { showError('TX mode change failed — ' + DB.errorMessage(e)); }

            // Prime playout on TX start and on standby (entering Studio view)
            if (targetMode === 'tx' || targetMode === 'standby') {
                if (state.ui.playoutBackend === 'obs')        OBS.initialLoad(activeOrder);
                else if (state.ui.playoutBackend === 'radio') radioInitialLoad(activeOrder);
            }

            // Wake lock — keep screen on during TX, release when off air
            if (targetMode === 'tx') acquireWakeLock();
            else releaseWakeLock();
        }

      /**
         * Moves the active story pointer one step forward (+1) or back (-1)
         * through the non-floated rundown. Writes the new activeStoryId to
         * Firebase (or local state), signals the presenter view to jump to the
         * new story, and calls syncPlayoutToActive so the playout decks stay
         * in step.
         * @param {1|-1} direction
         */
      async function shiftActiveStory(direction) {
            if (!canMutate()) return;
            const rawOrder = state.meta.order;
            const markerIdx = rawOrder.indexOf('marker-line');
            // Exclude floated stories and segment breaks from navigation
            const activeOrder = (markerIdx > -1 ? rawOrder.slice(0, markerIdx) : rawOrder)
                .filter(id => !state.storiesMap[id]?.isFloated && state.storiesMap[id]?.type !== 'segment');

            if (activeOrder.length === 0) return;

            let nextId = null;
            if (!state.meta.activeStoryId) {
                nextId = direction > 0 ? activeOrder[0] : null;
            } else {
                const currentIdx = activeOrder.indexOf(state.meta.activeStoryId);
                const nextIdx = currentIdx + direction;
                if (nextIdx >= 0 && nextIdx < activeOrder.length) {
                    nextId = activeOrder[nextIdx];
                } else {
                    nextId = null;
                }
            }

            const updates = {
                activeStoryId: nextId,
                activeStoryStartedAt: nextId ? Date.now() : null
            };

            state.meta.activeStoryId = nextId;
            state.meta.activeStoryStartedAt = updates.activeStoryStartedAt;
            render('main');
            try { await DB.updateBulletin(updates); }
            catch(e) { showError('Story advance failed — ' + DB.errorMessage(e)); }

            // Sync playout decks to the new active story position
            await syncPlayoutToActive(nextId);
        }

        // Parse "HH:MM:SS" or "HH:MM" into total seconds from midnight
        function parseClockTime(str) {
            if (!str) return null;
            const parts = str.split(':').map(Number);
            if (parts.some(isNaN)) return null;
            if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
            if (parts.length === 2) return parts[0] * 3600 + parts[1] * 60;
            return null;
        }

        // Format total seconds from midnight as "HH:MM:SS"
        function formatClockTime(totalSeconds) {
            const h = Math.floor(totalSeconds / 3600).toString().padStart(2, '0');
            const m = Math.floor((totalSeconds % 3600) / 60).toString().padStart(2, '0');
            const s = (totalSeconds % 60).toString().padStart(2, '0');
            return `${h}:${m}:${s}`;
        }


        function insertStoryIntoOrder(id) {

        function escapeHTML(str) {
            if (!str) return '';
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return str.toString().replace(/[&<>"']/g, c => map[c]);
        }

        function formatDuration(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        // Exposed on window so it can be called from oninput HTML attributes
        window._moiraUpdateScriptStats = function(ta) {
            const raw = ta.value;

            // Clip seconds from [CLIP:m:ss] tags
            const clipMatches = raw.match(/\[CLIP:(\d+):(\d{2})\]/gi) || [];
            const clipSecs = clipMatches.reduce((sum, x) => {
                const p = x.match(/\[CLIP:(\d+):(\d{2})\]/i);
                return sum + (parseInt(p[1], 10) * 60 + parseInt(p[2], 10));
            }, 0);

            // Word count and estimated read time — strip all [tags]
            const stripped = raw.replace(/\[[^\]]*\]/g, ' ').replace(/\s+/g, ' ').trim();
            const words = stripped.length > 0 ? stripped.split(' ').filter(Boolean).length : 0;
            const readSecs = Math.round(words / 2.8); // ~168 wpm — typical newsreader pace
            const totalSecs = readSecs + clipSecs;

            // Update script stats label (word count + read estimate)
            const st = document.getElementById('edit-script-stats');
            if (st) {
                st.textContent = words > 0
                    ? words + ' words \u00b7 ~' + String(Math.floor(readSecs / 60)).padStart(2, '0') + ':' + String(readSecs % 60).padStart(2, '0') + ' read'
                    : '';
            }

            // Auto-populate duration field with estimated total (read + clip).
            // Only updates if the script is non-empty — preserves manual entry for
            // stories with no script (e.g. READ with hand-set timing).
            const durEl = document.getElementById('edit-duration');
            if (durEl && words > 0) {
                durEl.value = String(Math.floor(totalSecs / 60)).padStart(2, '0') + ':' + String(totalSecs % 60).padStart(2, '0');
            }

            // Update breakdown hint beneath the duration field
            const hint = document.getElementById('edit-dur-breakdown');
            if (hint) {
                if (words > 0 && clipSecs > 0) {
                    hint.textContent = '~' + String(Math.floor(readSecs/60)).padStart(2,'0') + ':' + String(readSecs%60).padStart(2,'0')
                        + ' read + ' + String(Math.floor(clipSecs/60)).padStart(2,'0') + ':' + String(clipSecs%60).padStart(2,'0') + ' clip';
                    hint.className = 'text-xs font-mono text-amber-600 mt-1';
                } else if (words > 0) {
                    hint.textContent = 'Estimated from script';
                    hint.className = 'text-xs font-mono text-slate-400 mt-1';
                } else {
                    hint.textContent = '';
                }
            }
        };

        // Parse all [CLIP:m:ss] tags from a script string and return total clip seconds.
        function parseClipTags(script) {
            if (!script) return 0;
            let total = 0;
            const re = /\[CLIP:(\d+):(\d{2})\]/gi;
            let match;
            while ((match = re.exec(script)) !== null) {
                total += parseInt(match[1], 10) * 60 + parseInt(match[2], 10);
            }
            return total;
        }

        function formatPresenterScript(script) {
            if (!script) return '[ NO SCRIPT CONTENT ]';
            const escaped = escapeHTML(script);
            const lined = escaped.replace(/\n/g, '<br>');
            return lined
                .replace(/\[CLIP:(\d+):(\d{2})\]/gi,
                    '<br><span style="font-size:0.75em" class="bg-amber-500 text-white px-4 py-2 rounded-lg font-black uppercase tracking-widest inline-block shadow-sm my-3">$&</span><br>')
                .replace(/\[(?!CLIP:)(.*?)\]/g,
                    '<br><span style="font-size:0.75em" class="bg-slate-200 text-slate-900 px-4 py-2 rounded-lg font-black uppercase tracking-widest inline-block shadow-sm my-3">$&</span><br>')
                .replace(/(<br>\s*){3,}/g, '<br><br>');
        }


        /**
         * Fires a clip from the presenter view using a transient Audio element.
         * Uses the same output device as the radio decks. If a clip is already
         * playing, stops it first. Entirely independent of the deck system.
         * @param {string} storyId - The story whose mediaFile should play.
         */
        // Stops the presenter countdown interval and clears flash state.
        function _stopPresenterCountdown() {
            if (state.ui.presenter.clipCountdownInterval) {
                clearInterval(state.ui.presenter.clipCountdownInterval);
                state.ui.presenter.clipCountdownInterval = null;
            }
        }

        // Starts a 250ms interval that counts down the clip timer on the fire button
        // and flashes the button when <=5s remain. Updates DOM directly — no render().
        function _startPresenterCountdown(audio, storyId) {
            _stopPresenterCountdown();
            state.ui.presenter.clipCountdownInterval = setInterval(() => {
                const btn      = document.getElementById(`presenter-clip-btn-${storyId}`);
                const timerEl  = document.getElementById(`presenter-clip-timer-${storyId}`);
                if (!btn || !timerEl || !audio) { _stopPresenterCountdown(); return; }

                const remaining = Math.max(0, (audio.duration || 0) - (audio.currentTime || 0));
                const m = Math.floor(remaining / 60).toString().padStart(2, '0');
                const s = Math.floor(remaining % 60).toString().padStart(2, '0');
                timerEl.textContent = `${m}:${s}`;

                if (remaining <= 5 && remaining > 0) {
                    btn.classList.add('clip-warn-flash');
                } else {
                    btn.classList.remove('clip-warn-flash');
                }
            }, 250);
        }

        async function _executePresenterClipPlayback(storyId) {
            const story = state.storiesMap[storyId];
            if (!story?.mediaFile) return;

            // Stop any clip already playing before starting a new one
            if (state.ui.presenter.clipAudio) {
                _stopPresenterCountdown();
                state.ui.presenter.clipAudio.pause();
                if (state.ui.presenter.clipAudio.objectUrl)
                    URL.revokeObjectURL(state.ui.presenter.clipAudio.objectUrl);
                state.ui.presenter.clipAudio = null;
            }

            const file = await radioGetFileFromHandle(story.mediaFile);
            if (!file) return;

            const objectUrl = URL.createObjectURL(file);
            const audio = new Audio();
            audio.src = objectUrl;
            audio.objectUrl = objectUrl;

            if (state.radio.selectedSinkId && audio.setSinkId) {
                try { await audio.setSinkId(state.radio.selectedSinkId); }
                catch(e) { radioLog(`Audio output device unavailable: ${e.message}`, 'error'); }
            }

            audio.addEventListener('ended', () => {
                _stopPresenterCountdown();
                URL.revokeObjectURL(objectUrl);
                state.ui.presenter.clipAudio = null;
                state.ui.presenter.playingClipStoryId = null;
                updatePresenterClip(null, null);
                render('main');
            });

            state.ui.presenter.clipAudio = audio;
            state.ui.presenter.playingClipStoryId = storyId;
            render('main');

            await audio.play().catch(e => {
                radioLog(`Presenter clip error: ${e.message}`, 'error');
                showError(
                    e.name === 'NotAllowedError'
                        ? 'Clip blocked by browser — tap or click anywhere on the page first, then try again.'
                        : `Clip playback failed: ${e.message}`
                );
                _stopPresenterCountdown();
                state.ui.presenter.clipAudio = null;
                state.ui.presenter.playingClipStoryId = null;
                updatePresenterClip(null, null);
            });

            if (state.ui.presenter.clipAudio) {
                _startPresenterCountdown(audio, storyId);
                updatePresenterClip(storyId, null);
            }
        }

        async function presenterFireClip(storyId) {
            const story = state.storiesMap[storyId];
            if (!story?.mediaFile) return;

            // Stop any currently playing presenter clip (local teardown only)
            if (state.ui.presenter.clipAudio) {
                _stopPresenterCountdown();
                state.ui.presenter.clipAudio.pause();
                if (state.ui.presenter.clipAudio.objectUrl)
                    URL.revokeObjectURL(state.ui.presenter.clipAudio.objectUrl);
                state.ui.presenter.clipAudio = null;
            }

            // Tapping the currently-playing story = stop request.
            // Use Firestore state as fallback so non-master clients (which have no local
            // playback state) can still detect "I'm tapping what's currently playing".
            const effectivePlayingId = state.ui.presenter.playingClipStoryId || state.meta.presenterClipStoryId;
            if (effectivePlayingId === storyId) {
                state.ui.presenter.playingClipStoryId = null;
                // Route stop through the command field so master hears it even if this isn't master
                updatePresenterClip(null, 'stop');
                render('main');
                return;
            }

            // Local mode — always play here (single machine, no Firestore)
            if (state.localMode) {
                if (!state.radio.directoryHandle) {
                    showError(
                        'Cannot fire clip — no media folder is set. Grant folder access in Settings.',
                        'Open Settings',
                        () => { state.ui.isSettingsModalOpen = true; state.ui.settingsTab = 'playout'; render('modal'); }
                    );
                    return;
                }
                await _executePresenterClipPlayback(storyId);
                return;
            }

            // Cloud mode, not in TX — rehearsal/testing: play locally if folder is available.
            // Each machine hears its own clips; no remote handshake needed outside of a live show.
            if (!state.meta.isTXMode) {
                if (!state.radio.directoryHandle) {
                    showError(
                        'Cannot fire clip — no media folder is set. Grant folder access in Settings.',
                        'Open Settings',
                        () => { state.ui.isSettingsModalOpen = true; state.ui.settingsTab = 'playout'; render('modal'); }
                    );
                    return;
                }
                await _executePresenterClipPlayback(storyId);
                return;
            }

            // Cloud mode, TX live — remote handshake: write to Firestore, master executes
            updatePresenterClip(storyId, null);

            // If this machine IS the master, also execute locally without waiting for echo
            if (isPlaybackMaster()) {
                await _executePresenterClipPlayback(storyId);
            }
        }
