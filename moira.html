        // ==========================================
        // 7. RENDERING ENGINE
        // ==========================================
        /**
         * Main render loop. Re-renders header, main content, and modals from
         * current state. Skips re-rendering the main area while the user is
         * dragging, inline-editing, or typing. Skips re-rendering the modal
         * while the edit modal is open (prevents content being wiped by
         * background Firebase snapshots). Manages the TX timer interval and
         * the takeover countdown. Restores scroll position after each render.
         * Called after every state mutation.
         */
        // ── RENDER ENGINE ─────────────────────────────────────────────────────────
        // render() is RAF-debounced and section-aware. Multiple calls within a
        // single frame coalesce into one DOM update covering all dirty sections.
        //
        // Usage:
        //   render()                 — mark all sections dirty (default, safe)
        //   render('main')           — only rebuild main content
        //   render('modal')          — only rebuild modal
        //   render('header','main')  — rebuild two sections
        //
        // Valid sections: 'header', 'main', 'modal'
        // All existing render() call sites work unchanged — Phase 2 will
        // progressively narrow them to specific sections.

        const _pendingRender = { header: false, main: false, modal: false };
        let _renderRafId = null;

        function render(...sections) {
            if (sections.length === 0) {
                _pendingRender.header = true;
                _pendingRender.main   = true;
                _pendingRender.modal  = true;
            } else {
                sections.forEach(s => { if (s in _pendingRender) _pendingRender[s] = true; });
            }
            if (_renderRafId) cancelAnimationFrame(_renderRafId);
            _renderRafId = requestAnimationFrame(() => {
                _renderRafId = null;
                // Snapshot and clear flags before executing so any render() calls
                // triggered during the update are queued for the next frame.
                const dirty = { ..._pendingRender };
                _pendingRender.header = false;
                _pendingRender.main   = false;
                _pendingRender.modal  = false;
                _renderNow(dirty);
            });
        }

        function _renderNow(dirty = { header: true, main: true, modal: true }) {
            const mainContainer = document.getElementById('main-container');
            const savedScroll = mainContainer ? mainContainer.scrollTop : 0;

            const activeEl = document.activeElement;
            const userIsTyping = activeEl && (activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA') && activeEl.id !== 'header-room-input';

            if (dirty.header) {
                const isZen = state.mode === 'presenter' && state.ui.presenter.zenMode;
                document.getElementById('header-container').innerHTML = isZen ? '' : renderHeader();
            }

            if (dirty.main && !state.ui.draggedStoryId && !state.ui.inlineEditingId && !userIsTyping) {
                let mainHtml = '';
                if (state.mode === 'newsroom') mainHtml = renderNewsroom();
                else if (state.mode === 'presenter') mainHtml = renderPresenter();
                else if (state.mode === 'director') mainHtml = renderDirector();
                document.getElementById('main-container').innerHTML = mainHtml;
            }

            if (dirty.modal && !userIsTyping) {
                document.getElementById('modal-container').innerHTML = renderModals();
            }

            // ── Side effects — always run regardless of dirty flags ────────────
            // TX Timer housekeeping
            if (state.meta.isTXMode && state.meta.txStartedAt) {
                if (!txTimerInterval) startTXTimer();
            } else if (txTimerInterval) {
                clearInterval(txTimerInterval);
                txTimerInterval = null;
            }
            if (state.meta.isTXMode) updateClockDisplays();

            if (dirty.main) {
                const newMainContainer = document.getElementById('main-container');
                if (state.ui.pendingScrollToStoryId) {
                    // Scroll newly added story into view
                    const newRow = document.querySelector(`[data-story-id="${state.ui.pendingScrollToStoryId}"]`);
                    if (newRow) newRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    state.ui.pendingScrollToStoryId = null;
                } else if (state.mode === 'presenter' && state.meta.activeStoryId && state.ui.lastScrolledStoryId !== state.meta.activeStoryId) {
                    const presEl = document.getElementById(`presenter-story-${state.meta.activeStoryId}`);
                    if (presEl && newMainContainer) {
                        const containerRect = newMainContainer.getBoundingClientRect();
                        const elRect = presEl.getBoundingClientRect();
                        newMainContainer.scrollTop += elRect.top - containerRect.top;
                        state.ui.lastScrolledStoryId = state.meta.activeStoryId;
                    }
                } else if (!state.ui.draggedStoryId && newMainContainer) {
                    newMainContainer.scrollTop = savedScroll;
                }
            }

            saveLocalState();

            // Takeover countdown — only relevant when modal is visible
            if (dirty.modal) {
                if (state.ui.editingStoryId && !state.ui.pendingConflict) {
                    const s = state.storiesMap[state.ui.editingStoryId];
                    if (s?.lockedBySession && s.lockedBySession !== state.sessionId && s.lockedAt) {
                        startTakeoverCountdown(s.lockedAt);
                    } else {
                        if (takeoverCountdownInterval) { clearInterval(takeoverCountdownInterval); takeoverCountdownInterval = null; }
                    }
                } else {
                    if (takeoverCountdownInterval) { clearInterval(takeoverCountdownInterval); takeoverCountdownInterval = null; }
                }
            }
        }

           function startTXTimer() {
                updateClockDisplays();
                txTimerInterval = setInterval(updateClockDisplays, 1000);
            }

        let takeoverCountdownInterval = null;
        function startTakeoverCountdown(lockedAt) {
            if (takeoverCountdownInterval) return; // already ticking
            takeoverCountdownInterval = setInterval(() => {
                const btn = document.getElementById('takeover-btn');
                if (!btn) { clearInterval(takeoverCountdownInterval); takeoverCountdownInterval = null; return; }
                const lockAge = Date.now() - lockedAt;
                const isStale = lockAge >= STALE_LOCK_MS;
                if (isStale) {
                    btn.disabled = false;
                    btn.textContent = 'Take Over';
                    btn.className = 'text-xs bg-amber-600 hover:bg-amber-700 text-white border border-amber-700 px-3 py-1.5 rounded shadow-sm font-bold transition-colors';
                    clearInterval(takeoverCountdownInterval);
                    takeoverCountdownInterval = null;
                } else {
                    btn.textContent = `Wait ${Math.ceil((STALE_LOCK_MS - lockAge) / 1000)}s\u2026`;
                }
            }, 500);
        }
        // ==========================================
        // RADIO PLAYOUT ENGINE
        // ==========================================

        function radioLog(msg, type = 'info') {
            const time = new Date().toISOString().split('T')[1].substring(0, 12);
            state.radio.log.unshift({ time, type, msg });
            if (state.radio.log.length > 80) state.radio.log.pop();
            const el = document.getElementById('radio-log-container');
            if (el) el.innerHTML = renderRadioLog();
        }

        function renderRadioLog() {
            if (state.radio.log.length === 0) return '<span class="text-slate-400 italic">No radio events yet.</span>';
            return state.radio.log.map(e => {
                const col = e.type === 'error' ? 'text-red-500' : e.type === 'success' ? 'text-emerald-600' : e.type === 'warn' ? 'text-amber-600' : 'text-slate-500';
                const prefix = e.type === 'error' ? '[ERR]' : e.type === 'success' ? '[OK]' : e.type === 'warn' ? '[WARN]' : '[INFO]';
                return `<div class="${col}"><span class="text-slate-300 mr-1">${e.time}</span><span class="font-bold mr-1">${prefix}</span>${escapeHTML(e.msg)}</div>`;
            }).join('');
        }

     async function populateRadioDevices() {
            if (!setSinkIdSupported || !navigator.mediaDevices) {
                state.radio.devices = [];
                render('modal');
                return;
            }
            // On file:// origins mediaDevices.enumerateDevices may throw or return
            // empty unlabelled results — catch silently and fall back to system default
            try {
                const devs = await navigator.mediaDevices.enumerateDevices();
                // Filter out entries with no label — file:// returns phantom entries
                const outputs = devs.filter(d => d.kind === 'audiooutput' && d.deviceId);
                state.radio.devices = outputs;
            } catch(e) {
                state.radio.devices = [];
            }
            render('modal');
        }

        // PPM ballistics — peak detection on time-domain data
        function peakDbFromTimeDomain(data) {
            let peak = 0;
            for (let i = 0; i < data.length; i++) {
                const s = Math.abs(data[i] - 128) / 128;
                if (s > peak) peak = s;
            }
            return peak === 0 ? -Infinity : 20 * Math.log10(peak);
        }

        function tickRadioChannel(deck, ch, newDb) {
            const s = deck.ppm[ch];
            const now = Date.now();

            // Instantaneous attack, EBU Type II decay
            if (newDb >= s.level) { s.level = newDb; }
            else { s.level = Math.max(PPM_DB_MIN, s.level - PPM_DECAY_PER_TICK); }

            // Peak hold
            if (newDb >= s.hold) { s.hold = newDb; s.holdAt = now; }
            else if (now - s.holdAt > PPM_HOLD_MS) {
                s.hold = Math.max(PPM_DB_MIN, s.hold - PPM_DECAY_PER_TICK);
            }

            const clampedDb = Math.max(PPM_DB_MIN, Math.min(PPM_DB_MAX, s.level));
            const litCount  = Math.max(0, Math.floor((clampedDb - PPM_DB_MIN) / PPM_SEG_DB));
            const holdDb    = Math.max(PPM_DB_MIN, Math.min(PPM_DB_MAX, s.hold));
            const holdIdx   = Math.max(0, Math.min(PPM_SEGMENTS - 1,
                Math.floor((holdDb - PPM_DB_MIN) / PPM_SEG_DB)));

            for (let i = 0; i < PPM_SEGMENTS; i++) {
                const seg = document.getElementById(`ppm-seg-${deck.id}-${ch}-${i}`);
                if (!seg) return;
                seg.style.background = i < litCount
                    ? PPM_SEG_COLOURS[i]
                    : (i === holdIdx && holdDb > PPM_DB_MIN + PPM_SEG_DB)
                    ? PPM_HOLD_COLOURS[i]
                    : PPM_SEG_UNLIT;
            }

            const valEl = document.getElementById(`ppm-val-${deck.id}-${ch}`);
            if (valEl) {
                if (s.level <= PPM_DB_MIN + 1) {
                    valEl.textContent = '—';
                    valEl.className = 'ppm-dbval';
                } else {
                    const r = Math.round(s.level);
                    valEl.textContent = (r > 0 ? '+' : '') + r + ' dBFS';
                    valEl.className = 'ppm-dbval' + (s.level >= -3 ? ' hot' : s.level >= -9 ? ' warn' : '');
                }
            }
        }

        function startRadioMeter(deck) {
            if (deck.meterInterval) clearInterval(deck.meterInterval);
            if (!deck.analyserL || !deck.analyserR) return;
            const dataL = new Uint8Array(deck.analyserL.fftSize);
            const dataR = new Uint8Array(deck.analyserR.fftSize);
            deck.meterInterval = setInterval(() => {
                deck.analyserL.getByteTimeDomainData(dataL);
                deck.analyserR.getByteTimeDomainData(dataR);
                tickRadioChannel(deck, 'L', peakDbFromTimeDomain(dataL));
                tickRadioChannel(deck, 'R', peakDbFromTimeDomain(dataR));
            }, 40);
        }

        function stopRadioMeter(deck) {
            if (deck.meterInterval) { clearInterval(deck.meterInterval); deck.meterInterval = null; }
            for (const ch of ['L', 'R']) {
                deck.ppm[ch].level = PPM_DB_MIN;
                deck.ppm[ch].hold  = PPM_DB_MIN;
                deck.ppm[ch].holdAt = 0;
                tickRadioChannel(deck, ch, -Infinity);
            }
        }

        function fmtRadioTC(s) {
            if (!isFinite(s) || s < 0) s = 0;
            return String(Math.floor(s / 60)).padStart(2, '0') + ':' +
                String(Math.floor(s % 60)).padStart(2, '0') + '.' +
                Math.floor((s % 1) * 10);
        }

        function startRadioDisplayLoop() {
            if (radioRafId) return;
            (function loop() {
                for (const dk of ['deckA', 'deckB']) {
                    const d = state.radio[dk];
                    if (!d.audio) continue;
                    const cur = d.audio.currentTime;
                    const tcEl = document.getElementById(`radio-tc-${d.id}`);
                    const pbEl = document.getElementById(`radio-prog-${d.id}`);
                    if (tcEl) tcEl.textContent = fmtRadioTC(cur);
                    if (pbEl) pbEl.style.width = d.duration > 0
                        ? (cur / d.duration * 100).toFixed(1) + '%' : '0%';
                }
                const anyActive = ['deckA', 'deckB'].some(dk => state.radio[dk].audio);
                if (!anyActive) { radioRafId = null; return; }
                radioRafId = requestAnimationFrame(loop);
            })();
        }

        /**
         * Loads an audio File onto a radio deck and wires it into the Web Audio
         * graph for metering. Tears down any previous audio on the deck first
         * (pausing, disconnecting nodes, revoking the object URL).
         *
         * Audio graph:
         *   MediaElementSource → GainNode → destination  (audible output)
         *   MediaElementSource → ChannelSplitter → AnalyserL/R  (metering tap, silent)
         *
         * After metadata loads the deck is cued to position 0 (state = 'cued').
         * On natural end the deck transitions to 'ended' so stale audio cannot
         * be mistakenly re-taken.
         * @param {'deckA'|'deckB'} deckKey
         * @param {File}            file     - Audio file to load.
         * @param {string|null}     storyId  - Running-order story this file belongs to.
         */
        async function radioLoadFile(deckKey, file, storyId = null) {
            const deck = state.radio[deckKey];
            radioLog(`Loading "${file.name}" → Deck ${deck.id}…`, 'info');

            // Teardown existing
            if (deck.audio) {
                deck.audio.pause();
                for (const n of [deck.sourceNode, deck.splitter, deck.analyserL, deck.analyserR, deck.gainNode]) {
                    if (n) try { n.disconnect(); } catch(e) {}
                }
            }
            if (deck.objectUrl) { URL.revokeObjectURL(deck.objectUrl); deck.objectUrl = null; }
            stopRadioMeter(deck);
            deck.audio = null; deck.sourceNode = null; deck.splitter = null;
            deck.analyserL = null; deck.analyserR = null; deck.gainNode = null;

            deck.state = 'loading';
            deck.filename = file.name;
            deck.slug = file.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ').toUpperCase();
            deck.loadedStoryId = storyId;
            render('main');

            deck.objectUrl = URL.createObjectURL(file);
            const audio = new Audio();
            audio.src = deck.objectUrl;
            audio.preload = 'auto';
            deck.audio = audio;

            if (state.radio.selectedSinkId && audio.setSinkId) {
                try { await audio.setSinkId(state.radio.selectedSinkId); }
                catch(e) {
                    radioLog(`Audio output device unavailable — falling back to default: ${e.message}`, 'warn');
                    showError('Selected audio output device is unavailable. Playing on default output instead.', 'Change Output', () => { state.ui.isSettingsModalOpen = true; state.ui.settingsTab = 'playout'; render('modal'); });
                }
            }

            // Audio graph: source → gain → destination (audible output)
            //              source → splitter → analyserL/R (metering tap only, no output)
            const ctx      = getRadioCtx();
            const src      = ctx.createMediaElementSource(audio);
            const splitter = ctx.createChannelSplitter(2);
            const aL       = ctx.createAnalyser();
            const aR       = ctx.createAnalyser();
            const gain     = ctx.createGain();
            aL.fftSize = 2048; aR.fftSize = 2048;
            src.connect(gain);
            gain.connect(ctx.destination);
            src.connect(splitter);
            splitter.connect(aL, 0);
            splitter.connect(aR, 1);

            deck.sourceNode = src; deck.splitter = splitter;
            deck.analyserL = aL;   deck.analyserR = aR;
            deck.gainNode = gain;

            await new Promise((resolve, reject) => {
                audio.addEventListener('loadedmetadata', resolve, { once: true });
                audio.addEventListener('error', () => reject(new Error(audio.error?.message || 'Load error')), { once: true });
                setTimeout(() => reject(new Error('Timeout')), 10000);
            }).catch(e => {
                radioLog(`Deck ${deck.id} load error: ${e.message}`, 'error');
                showError(`Deck ${deck.id} failed to load "${deck.filename || 'file'}" — ${e.message}. Check the file format and media folder.`);
            });

            deck.duration = audio.duration || 0;
            audio.currentTime = 0;
            deck.state = 'cued';

            audio.addEventListener('ended', () => {
                stopRadioMeter(deck);
                deck.state = 'ended';
                radioLog(`Deck ${deck.id} ended.`, 'info');
                render('main');
            });

            radioLog(`Deck ${deck.id} cued: "${deck.slug}" (${formatDuration(deck.duration)})`, 'success');
            startRadioDisplayLoop();
            render('main');
        }

        function radioPlay(deckKey) {
            const deck = state.radio[deckKey];
            if (!deck.audio || (deck.state !== 'cued' && deck.state !== 'paused')) return;
            getRadioCtx();
            deck.audio.play()
                .then(() => {
                    deck.state = 'playing';
                    startRadioMeter(deck);
                    radioLog(`Deck ${deck.id} — PLAYING`, 'success');
                    render('main');
                })
                .catch(e => {
                    radioLog(`Deck ${deck.id} play error: ${e.message}`, 'error');
                    showError(`Deck ${deck.id} could not play — ${e.name === 'NotAllowedError' ? 'browser blocked autoplay. Click anywhere on the page first.' : e.message}`);
                });
        }

        function radioPause(deckKey) {
            const deck = state.radio[deckKey];
            if (!deck.audio || deck.state !== 'playing') return;
            deck.audio.pause();
            stopRadioMeter(deck);
            deck.state = 'paused';
            radioLog(`Deck ${deck.id} — PAUSED`, 'warn');
            render('main');
        }

        function radioStop(deckKey) {
            const deck = state.radio[deckKey];
            if (!deck.audio) return;
            deck.audio.pause();
            deck.audio.currentTime = 0;
            stopRadioMeter(deck);
            deck.state = 'cued';
            radioLog(`Deck ${deck.id} — STOPPED & re-cued`, 'warn');
            render('main');
        }

        function radioCue(deckKey) {
            const deck = state.radio[deckKey];
            if (!deck.audio) return;
            deck.audio.pause();
            deck.audio.currentTime = 0;
            stopRadioMeter(deck);
            deck.state = 'cued';
            radioLog(`Deck ${deck.id} — cued to 0`, 'info');
            render('main');
        }

        function radioScrub(deckId, e) {
            const deckKey = deckId === 'A' ? 'deckA' : 'deckB';
            const deck = state.radio[deckKey];
            if (!deck.audio || deck.duration === 0) return;
            const bg = document.getElementById(`radio-prog-bg-${deckId}`);
            if (!bg) return;
            const rect = bg.getBoundingClientRect();
            deck.audio.currentTime = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width)) * deck.duration;
        }

        /**
         * Fires a radio take: plays the deck whose loadedStoryId matches the
         * current activeStoryId (the deck shown on the On Air card). Falls back
         * to any takeable deck for manual loads not linked to a story.
         * After firing: advances clipIndex, then in a 300ms timeout stops the
         * outgoing deck and auto-loads the upcoming clip onto it (if a media
         * folder handle is available) or labels it for manual load.
         */
        async function radioExecuteTake() {
            // Cancel any pending post-take deck swap from a previous rapid Take
            if (state.radio.takeTimeout) {
                clearTimeout(state.radio.takeTimeout);
                state.radio.takeTimeout = null;
            }

            const deckA = state.radio.deckA;
            const deckB = state.radio.deckB;

            // Select the deck whose loadedStoryId matches the active story.
            // Avoids always picking A when B has the right clip loaded.
            const activeStoryId = state.meta.activeStoryId;
            const isTakeable = d => (d.state === 'cued' || d.state === 'paused') && d.audio;

            let cuedDeck = null;
            if (activeStoryId) {
                if      (deckA.loadedStoryId === activeStoryId && isTakeable(deckA)) cuedDeck = deckA;
                else if (deckB.loadedStoryId === activeStoryId && isTakeable(deckB)) cuedDeck = deckB;
            }
            // Fallback: any takeable deck (manual loads with no story link)
            if (!cuedDeck) {
                if      (isTakeable(deckA)) cuedDeck = deckA;
                else if (isTakeable(deckB)) cuedDeck = deckB;
            }

            const playingDeck = deckA.state === 'playing' ? deckA
                              : deckB.state === 'playing' ? deckB
                              : null;

            if (!cuedDeck) {
                radioLog('No cued deck available for take.', 'warn');
                return;
            }

            getRadioCtx();
            try {
                await cuedDeck.audio.play();
                cuedDeck.state = 'playing';
                startRadioMeter(cuedDeck);
                radioLog(`Deck ${cuedDeck.id} — ON AIR`, 'success');
            } catch(e) {
                radioLog(`Take failed: ${e.message}`, 'error');
                showError(`Take failed — ${e.message}`);
                return;
            }

            // Advance queue index to match what just played
            const playedQueueIdx = state.radio.clipQueue.indexOf(cuedDeck.loadedStoryId);
            if (playedQueueIdx > -1) state.radio.clipIndex = playedQueueIdx;
            render('main');

            // Release outgoing deck and load the upcoming clip onto it.
            // Stored so a rapid second Take can cancel this before it fires.
            if (playingDeck) {
                state.radio.takeTimeout = setTimeout(async () => {
                    state.radio.takeTimeout = null;
                    if (playingDeck.audio) {
                        playingDeck.audio.pause();
                        playingDeck.audio.currentTime = 0;
                    }
                    stopRadioMeter(playingDeck);

                    const upcomingIdx = state.radio.clipIndex + 1;
                    const queue       = state.radio.clipQueue;

                    if (upcomingIdx < queue.length) {
                        const upcomingStory = state.storiesMap[queue[upcomingIdx]];
                        if (upcomingStory) {
                            if (state.radio.directoryHandle) {
                                const deckKey = playingDeck.id === 'A' ? 'deckA' : 'deckB';
                                const file = await radioGetFileFromHandle(upcomingStory.mediaFile);
                                if (file) {
                                    await radioLoadFile(deckKey, file, queue[upcomingIdx]);
                                    radioLog(`Deck ${playingDeck.id} auto-loaded: "${upcomingStory.mediaFile}"`, 'success');
                                    return;
                                }
                            }
                            playingDeck.state         = 'idle';
                            playingDeck.slug          = upcomingStory.slug;
                            playingDeck.filename      = upcomingStory.mediaFile;
                            playingDeck.loadedStoryId = queue[upcomingIdx];
                            radioLog(`Deck ${playingDeck.id} ready for manual load: "${upcomingStory.mediaFile}"`, 'info');
                        }
                    } else {
                        playingDeck.state         = 'idle';
                        playingDeck.slug          = '';
                        playingDeck.filename      = '';
                        playingDeck.loadedStoryId = null;
                        radioLog(`Deck ${playingDeck.id} cleared — end of clip queue.`, 'info');
                    }
                    render('main');
                }, 300);
            }
        }

        // Attempt to get a File object from the granted directory handle by filename.
        // Returns the File if found, null if no handle granted or file not found.
        async function radioGetFileFromHandle(filename) {
            if (!state.radio.directoryHandle) return null;
            try {
                const fileHandle = await state.radio.directoryHandle.getFileHandle(filename);
                return await fileHandle.getFile();
            } catch(e) {
                radioLog(`Could not find "${filename}" in media folder.`, 'error');
                // Surface as a visible error so operator can act — they may need to
                // rename a file, check the folder, or re-grant access.
                showError(
                    `"${filename}" not found in media folder. Check the filename matches exactly or re-grant folder access.`,
                    'Choose Folder',
                    () => { state.ui.isSettingsModalOpen = true; state.ui.settingsTab = 'playout'; render('modal'); }
                );
                return null;
            }
        }

        /**
         * Builds the clip queue from the active running order and loads the
         * first two clips onto Deck A and Deck B. Auto-loads from the granted
         * File System Access API directory handle if available; otherwise labels
         * the decks so the operator knows which files to load manually.
         * @param {string[]} activeOrder - Ordered story IDs (floated excluded).
         */
        async function radioInitialLoad(activeOrder) {
            const queue = activeOrder.filter(id => !!state.storiesMap[id]?.mediaFile);
            state.radio.clipQueue = queue;
            state.radio.clipIndex = -1;

            if (queue.length === 0) { radioLog('No media clips in running order.', 'info'); return; }

            radioLog(`Clip queue: ${queue.length} clip(s). ${state.radio.directoryHandle ? 'Auto-loading from media folder...' : 'Load files onto decks manually.'}`, 'info');
            // Try auto-load from directory handle for first two clips
            const deckPairs = [
                { storyId: queue[0], deckKey: 'deckA' },
                { storyId: queue[1], deckKey: 'deckB' }
            ];

            for (const { storyId, deckKey } of deckPairs) {
                if (!storyId) continue;
                const story = state.storiesMap[storyId];
                if (!story) continue;

                if (state.radio.directoryHandle) {
                    const file = await radioGetFileFromHandle(story.mediaFile);
                    if (file) {
                        await radioLoadFile(deckKey, file, storyId);
                        continue;
                    }
                }
                // Fallback: label the deck so operator knows what to load
                const deck = state.radio[deckKey];
                if (!deck.audio) {
                    deck.slug = story.slug;
                    deck.filename = story.mediaFile;
                    deck.loadedStoryId = storyId;
                }
            }
            render('main');
        }

        // Syncs playout decks to match a new active story position.
        // Called after Previous / Next / Reset so decks stay in step with the rundown.
        // Debounced entry point for syncPlayoutToActive.
        // All callers use this so rapid button presses or Firebase snapshot
        // bursts collapse into a single load operation.
        /**
         * Debounced entry point for deck sync. Collapses rapid calls (e.g. fast
         * Take Next presses or Firebase snapshot bursts) into a single 150ms-
         * delayed execution so decks are not reloaded multiple times in quick
         * succession. All call sites use this wrapper, not _syncPlayoutToActive.
         * @param {string|null} newActiveStoryId
         */
        function syncPlayoutToActive(newActiveStoryId) {
            clearTimeout(syncPlayoutTimeout);
            syncPlayoutTimeout = setTimeout(() => _syncPlayoutToActive(newActiveStoryId), 150);
        }

        /**
         * Reloads playout decks to match a new active story position.
         * Checks whether each deck already has the correct clip loaded and cued —
         * if so, skips reloading it (preserves existing assignments). Never
         * interrupts a deck that is currently playing.
         * For radio: Deck assignment is flexible — B can hold the active clip if
         * it was already there, avoiding unnecessary reloads after a take.
         * For OBS: always assigns A=active, B=next.
         * @param {string|null} newActiveStoryId - Story now at front, or null for top of show.
         */
        async function _syncPlayoutToActive(newActiveStoryId) {
            if (state.ui.playoutBackend === 'none') return;

            const rawOrder = state.meta.order || [];
            const markerIdx = rawOrder.indexOf('marker-line');
            const activeOrder = (markerIdx > -1 ? rawOrder.slice(0, markerIdx) : rawOrder)
                .filter(id => !state.storiesMap[id]?.isFloated);

            const queue = activeOrder.filter(id => !!state.storiesMap[id]?.mediaFile);
            if (queue.length === 0) return;

            if (state.ui.playoutBackend === 'radio') {
                state.radio.clipQueue = queue;

                const activeClipIdx = newActiveStoryId ? queue.indexOf(newActiveStoryId) : 0;
                const nextClipIdx   = activeClipIdx > -1 ? activeClipIdx + 1 : 1;
                const activeStoryId = queue[activeClipIdx > -1 ? activeClipIdx : 0] || null;
                const nextStoryId   = queue[nextClipIdx] || null;

                state.radio.clipIndex = Math.max(activeClipIdx - 1, -1);

                const deckA = state.radio.deckA;
                const deckB = state.radio.deckB;

                // alreadyReady — deck has the correct story and is in a usable state.
                // allowPlaying: for the active slot, a playing deck counts as "ready" so
                // we don't mistakenly try to reload it or misfire the fast-path early exit.
                const alreadyReady = (deck, storyId, allowPlaying = false) =>
                    storyId &&
                    deck.loadedStoryId === storyId &&
                    (deck.state === 'cued' || deck.state === 'paused' ||
                        (allowPlaying && deck.state === 'playing')) &&
                    deck.audio;

                // Active slot: playing is acceptable (on-air deck should never be touched)
                const aHasActive = alreadyReady(deckA, activeStoryId, true);
                const bHasActive = alreadyReady(deckB, activeStoryId, true);
                const aHasNext   = alreadyReady(deckA, nextStoryId);
                const bHasNext   = alreadyReady(deckB, nextStoryId);

                if ((aHasActive || bHasActive) && (aHasNext || bHasNext || !nextStoryId)) {
                    // Both needed clips are already on decks — nothing to do
                    radioLog(`Deck sync — clips already loaded, skipping reload.`, 'info');
                    render('main');
                    return;
                }

                const loadOrLabel = async (deckKey, storyId) => {
                    if (!storyId) return;
                    const deck = state.radio[deckKey];
                    if (alreadyReady(deck, storyId, true)) return; // already correct, skip
                    if (deck.state === 'playing') return;          // never interrupt on-air deck
                    // Stop and clear before reloading
                    if (deck.audio) { deck.audio.pause(); deck.audio.currentTime = 0; }

        // ==========================================
        // OBS PLAYOUT ENGINE
        // Self-contained IIFE module. All OBS WebSocket state, config, and logic

        const OBS = (() => {

            let _isConnecting      = false; // prevents concurrent connection attempts

            // ── Logging ────────────────────────────────────────────────────────
            function _log(msg, type = 'info') {
                const time = new Date().toISOString().split('T')[1].substring(0, 12);
                state.obs.log.unshift({ time, type, msg });
                if (state.obs.log.length > 80) state.obs.log.pop();
                const el = document.getElementById('obs-log-container');
                if (el) el.innerHTML = _renderLog();
            }

            // ── Config ─────────────────────────────────────────────────────────
            function _loadConfig() {
                _cfg.ip   = localStorage.getItem('OBS_IP')          || '127.0.0.1';
                _cfg.port = localStorage.getItem('OBS_PORT')         || '4455';
                _cfg.pass = localStorage.getItem('OBS_PASSWORD')     || '';
                _cfg.base = localStorage.getItem('OBS_BASE_FOLDER')  || '';
            }

            function _saveConfig() {
                localStorage.setItem('OBS_IP',          document.getElementById('obs-set-ip')?.value   || _cfg.ip);
                localStorage.setItem('OBS_PORT',        document.getElementById('obs-set-port')?.value || _cfg.port);
                localStorage.setItem('OBS_PASSWORD',    document.getElementById('obs-set-pass')?.value || _cfg.pass);
                localStorage.setItem('OBS_BASE_FOLDER', document.getElementById('obs-set-base')?.value || _cfg.base);

            // ── Utilities ──────────────────────────────────────────────────────
            function _formatTime(ms) {
                ms = Math.max(0, parseInt(ms) || 0);
                if (ms === 0) return '00:00:00';
                const totalSeconds = Math.floor(ms / 1000);
                const h = Math.floor(totalSeconds / 3600);
                const m = Math.floor((totalSeconds % 3600) / 60);
                const s = totalSeconds % 60;
                return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }

            // ── Tally & display updates (direct DOM — bypass render cycle) ─────
            function _updateTallies() {
                const deckA = document.getElementById('obs-deck-A');
                const deckB = document.getElementById('obs-deck-B');
                const lblA  = document.getElementById('obs-tally-label-A');
                const lblB  = document.getElementById('obs-tally-label-B');
                if (!deckA || !deckB) return;

                const base = 'bg-white border-2 rounded-xl p-4 flex flex-col gap-3 transition-all duration-300 ';
                deckA.className = base + (state.obs.program === 'VT A' ? 'obs-tally-program border-red-400' : state.obs.preview === 'VT A' ? 'obs-tally-preview border-blue-400' : 'border-slate-200');
                deckB.className = base + (state.obs.program === 'VT B' ? 'obs-tally-program border-red-400' : state.obs.preview === 'VT B' ? 'obs-tally-preview border-blue-400' : 'border-slate-200');

                if (lblA) lblA.innerHTML = state.obs.program === 'VT A' ? '<span class="text-red-600 font-black tracking-widest text-xs">PROGRAM</span>' : state.obs.preview === 'VT A' ? '<span class="text-blue-600 font-bold tracking-widest text-xs">PREVIEW</span>' : '<span class="text-slate-400 text-xs">STANDBY</span>';
                if (lblB) lblB.innerHTML = state.obs.program === 'VT B' ? '<span class="text-red-600 font-black tracking-widest text-xs">PROGRAM</span>' : state.obs.preview === 'VT B' ? '<span class="text-blue-600 font-bold tracking-widest text-xs">PREVIEW</span>' : '<span class="text-slate-400 text-xs">STANDBY</span>';
            }

            function _updateDeckDisplay(deck, d) {
                const timeEl  = document.getElementById('obs-time-'  + deck);
                const stateEl = document.getElementById('obs-state-' + deck);
                const durEl   = document.getElementById('obs-dur-'   + deck);
                if (!timeEl) return;

                const isProgram = (deck === 'A' && state.obs.program === 'VT A') || (deck === 'B' && state.obs.program === 'VT B');
                const baseClasses = 'font-mono text-lg font-bold px-3 py-1 rounded transition-all ';

                if (isProgram && d.duration > 0) {
                    const remaining = Math.max(0, d.duration - d.cursor);
                    timeEl.innerText = '-' + _formatTime(remaining);
                    if (remaining > 0 && remaining <= 10000) {
                        timeEl.className = baseClasses + 'bg-red-600 text-white animate-pulse';
                    } else if (remaining > 0 && remaining <= 30000) {
                        timeEl.className = baseClasses + 'bg-yellow-100 text-yellow-800 border border-yellow-400';
                    } else {
                        timeEl.className = baseClasses + 'bg-red-50 text-red-600';
                    }
                } else {
                    timeEl.innerText = _formatTime(d.cursor);

                        <span class="text-xs text-slate-400 font-mono truncate">${escapeHTML(story.mediaFile)}</span>`;

            }

            function _updateConnectionBadge() {
                const badge = document.getElementById('obs-conn-badge');
                if (!badge) return;
                if (state.obs.connected) {
                    badge.className = 'inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-bold bg-emerald-100 text-emerald-800 border border-emerald-200';
                    badge.innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> OBS Connected';
                } else {
                    badge.className = 'inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-bold bg-red-100 text-red-700 border border-red-200';

                }

            // ── Telemetry (250ms polling for cursor/duration/state) ────────────
            function _startTelemetry() {
                if (_telemetryInterval) clearInterval(_telemetryInterval);

                    if (!state.obs.connected) return;
                    try {
                        for (const [deck, inputName] of [['A', 'VT A Player'], ['B', 'VT B Player']]) {
                            const res = await _ws.call('GetMediaInputStatus', { inputName });
                            const d = state.obs['deck' + deck];

                            d.duration = res.mediaDuration || 0;

                if (_telemetryInterval) { clearInterval(_telemetryInterval); _telemetryInterval = null; }
            }

            // ── Periodic sync (every 30s) — catches tally drift after reconnect ─
            async function _syncState() {

                    const prog = await _ws.call('GetCurrentProgramScene');
                    const prev = await _ws.call('GetCurrentPreviewScene');
                    state.obs.program = prog.sceneName;
                    state.obs.preview = prev.sceneName;

            function _startSyncInterval() {
                if (_syncInterval) clearInterval(_syncInterval);

            // ── Environment setup ──────────────────────────────────────────────
            async function _setupEnvironment() {
                try {
                    const modeRes = await _ws.call('GetStudioModeEnabled');
                    if (!modeRes.studioModeEnabled) {
                        await _ws.call('SetStudioModeEnabled', { studioModeEnabled: true });
                        _log('Enabled Studio Mode in OBS', 'success');
                    }
                    const { scenes } = await _ws.call('GetSceneList');
                    const sceneNames = scenes.map(s => s.sceneName);
                    for (const name of ['VT A', 'VT B', 'Lower Third']) {
                        if (!sceneNames.includes(name)) {

                    }
                    const { inputs } = await _ws.call('GetInputList');
                    const inputNames = inputs.map(i => i.inputName);
                    const safeSettings = { is_local_file: true, close_when_inactive: false, restart_on_activate: false, clear_on_media_end: false };
                    for (const [scene, inputName] of [['VT A', 'VT A Player'], ['VT B', 'VT B Player']]) {
                        if (!inputNames.includes(inputName)) {
                            await _ws.call('CreateInput', { sceneName: scene, inputName, inputKind: 'ffmpeg_source', inputSettings: safeSettings });
                            _log(`Created OBS input: ${inputName}`, 'success');
                        } else {
                            await _ws.call('SetInputSettings', { inputName, inputSettings: { close_when_inactive: false, restart_on_activate: false, clear_on_media_end: false } });
                            const { sceneItems } = await _ws.call('GetSceneItemList', { sceneName: scene });
                            if (!sceneItems.some(i => i.sourceName === inputName)) {
                                await _ws.call('CreateSceneItem', { sceneName: scene, sourceName: inputName });
                            }
                        }
                    }
                    for (const parent of ['VT A', 'VT B']) {
                        const { sceneItems } = await _ws.call('GetSceneItemList', { sceneName: parent });
                        if (!sceneItems.some(i => i.sourceName === 'Lower Third')) {
                            await _ws.call('CreateSceneItem', { sceneName: parent, sourceName: 'Lower Third' });
                            _log(`Nested Lower Third into ${parent}`, 'success');
                        }
                    }
                    if (!inputNames.includes('Lower Third Text')) {
                        try {
                            await _ws.call('CreateInput', { sceneName: 'Lower Third', inputName: 'Lower Third Text', inputKind: 'text_gdiplus', inputSettings: { text: 'Standby' } });
                        } catch(e) {
                            await _ws.call('CreateInput', { sceneName: 'Lower Third', inputName: 'Lower Third Text', inputKind: 'text_ft2_source_v2', inputSettings: { text: 'Standby' } });
                        }
                        _log('Created Lower Third Text source', 'success');
                    }
                    const prog = await _ws.call('GetCurrentProgramScene');
                    let curProg = prog.sceneName;
                    if (curProg !== 'VT A' && curProg !== 'VT B') {
                        await _ws.call('SetCurrentProgramScene', { sceneName: 'VT A' });
                        curProg = 'VT A';
                    }
                    const expectedPrev = curProg === 'VT A' ? 'VT B' : 'VT A';
                    await _ws.call('SetCurrentPreviewScene', { sceneName: expectedPrev });
                    _log('OBS environment validated and routed.', 'success');
                } catch(err) {

                }
            }

            // ── Lower third controls ───────────────────────────────────────────
            async function _updateL3Text() {

                if (!el) return;

                    await _ws.call('SetInputSettings', { inputName: 'Lower Third Text', inputSettings: { text: el.value } });

                } catch(e) { _log(`L3 text update failed: ${e.message}`, 'error'); }

            async function _toggleL3(visible) {
                try {
                    for (const sceneName of ['VT A', 'VT B']) {
                        const { sceneItems } = await _ws.call('GetSceneItemList', { sceneName });
                        const l3 = sceneItems.find(i => i.sourceName === 'Lower Third');
                        if (l3) await _ws.call('SetSceneItemEnabled', { sceneName, sceneItemId: l3.sceneItemId, sceneItemEnabled: visible });
                    }
                    _log(`Lower Third ${visible ? 'SHOWN' : 'HIDDEN'}`, 'info');
                } catch(e) { _log(`L3 toggle failed: ${e.message}`, 'error'); }
            }

            async function _reconcileL3() {
                try {
                    const getState = async (sceneName) => {
                        const { sceneItems } = await _ws.call('GetSceneItemList', { sceneName });
                        const l3 = sceneItems.find(i => i.sourceName === 'Lower Third');
                        return l3 ? l3.sceneItemEnabled : null;
                    };
                    const [stA, stB] = await Promise.all([getState('VT A'), getState('VT B')]);
                    if (stA !== null && stB !== null && stA !== stB) {
                        _log('L3 mismatch detected — forcing hidden as fail-safe.', 'warn');
                        await _toggleL3(false);
                    }
                } catch(e) { _log('L3 reconciliation error: ' + e.message, 'error'); }
            }

            // ── Transport ──────────────────────────────────────────────────────
            async function _mediaAction(deck, action) {
                const inputName = deck === 'A' ? 'VT A Player' : 'VT B Player';
                try {
                    await _ws.call('TriggerMediaInputAction', { inputName, mediaAction: action });
                } catch(e) { _log(`Media action failed: ${e.message}`, 'error'); }
            }

            async function _setCursor(deck, ms) {
                const inputName = deck === 'A' ? 'VT A Player' : 'VT B Player';
                try {
                    await _ws.call('SetMediaInputCursor', { inputName, mediaCursor: ms });
                } catch(e) { _log(`Cue failed: ${e.message}`, 'error'); }
            }

            // ── Load deck (Fire and Reconcile) ─────────────────────────────
            async function _loadDeck(deck, storyId) {
                if (!state.obs.connected || !storyId) return;
                const story = state.storiesMap[storyId];
                if (!story?.mediaFile) return;

                let base = _cfg.base.split('\\').join('/');
                if (base && !base.endsWith('/')) base += '/';
                const fullPath  = base + story.mediaFile;
                const inputName = deck === 'A' ? 'VT A Player' : 'VT B Player';

                state.obs['deck' + deck].loadedStoryId = storyId;
                _updateDeckLabel(deck);
                _log(`Loading "${story.mediaFile}" → Deck ${deck}`, 'info');

                try {
                    await _ws.call('SetInputSettings', { inputName, inputSettings: { local_file: fullPath } });
                    // Fire play then give OBS 500ms to parse file headers before pausing and cueing.
                    // The 250ms telemetry poll picks up duration once it becomes available.
                    await _ws.call('TriggerMediaInputAction', { inputName, mediaAction: 'OBS_WEBSOCKET_MEDIA_INPUT_ACTION_PLAY' });
                    setTimeout(async () => {
                        try {
                            await _ws.call('TriggerMediaInputAction', { inputName, mediaAction: 'OBS_WEBSOCKET_MEDIA_INPUT_ACTION_PAUSE' });
                            await _ws.call('SetMediaInputCursor', { inputName, mediaCursor: 0 });
                            _log(`Deck ${deck} cued: "${story.slug}"`, 'success');
                        } catch(e) { _log(`Deck ${deck} cue failed: ${e.message}`, 'error'); }
                    }, 500);
                } catch(e) {
                    _log(`Load failed for Deck ${deck}: ${e.message}`, 'error');
                }
            }


            // ── Execute take (Fire and Reconcile) ─────────────────────────
            async function _executeTake() {
                if (!state.obs.connected || _isTransitioning || state.obs.isTaking) return;

                state.obs.isTaking = true;
                const btn = document.getElementById('obs-btn-take');
                if (btn) btn.disabled = true;

                const isANext       = state.obs.preview === 'VT A';
                const previewPlayer = isANext ? 'VT A Player' : 'VT B Player';
                const programPlayer = isANext ? 'VT B Player' : 'VT A Player';

                try {
                    await _reconcileL3();
                    // Fire play and transition simultaneously — no pre-roll wait.
                    // Decks are pre-cued by _loadDeck so the clip is ready to go.
                    _ws.call('TriggerMediaInputAction', { inputName: previewPlayer, mediaAction: 'OBS_WEBSOCKET_MEDIA_INPUT_ACTION_PLAY' });
                    await _ws.call('TriggerStudioModeTransition');
                    _log('Take fired.', 'success');

                    // Background reconciliation — cue outgoing deck, advance queue
                    setTimeout(async () => {
                        try {
                            await _ws.call('TriggerMediaInputAction', { inputName: programPlayer, mediaAction: 'OBS_WEBSOCKET_MEDIA_INPUT_ACTION_PAUSE' });
                            await _ws.call('SetMediaInputCursor', { inputName: programPlayer, mediaCursor: 0 });

                            const queue      = state.obs.clipQueue;
                            const takenIndex = state.obs.clipIndex + 1;
                            if (queue && takenIndex < queue.length) {
                                state.obs.clipIndex = takenIndex;
                                const nextIndex = takenIndex + 2;
                                // Free deck is the one that was just outgoing (now in preview)
                                // — always programPlayer's deck, never the deck that just went on air.
                                const freeDeck  = programPlayer === 'VT A Player' ? 'A' : 'B';
                                if (nextIndex < queue.length) {
                                    _log(`Queue [${takenIndex+1}/${queue.length}] taken. Loading clip ${nextIndex+1} onto Deck ${freeDeck}.`, 'info');
                                    _loadDeck(freeDeck, queue[nextIndex]);
                                } else {
                                    _log(`Queue [${takenIndex+1}/${queue.length}] taken. Last clip — no further auto-load.`, 'info');
                                }
                            }
                        } catch(e) {}
                    }, 1000);

                } catch(err) {
                    _log(`Take failed: ${err.message}`, 'error');
                } finally {
                    state.obs.isTaking = false;
                    if (btn) btn.disabled = false;
                }
            }


            // ── Initial load on TX start ───────────────────────────────────────
            async function _initialLoad(activeOrder) {
                if (!state.obs.connected) return;

                const queue = activeOrder.filter(id => !!state.storiesMap[id]?.mediaFile);
                state.obs.clipQueue = queue;
                state.obs.clipIndex = -1;

                if (queue.length === 0) {
                    _log('No media clips found in running order.', 'info');
                    return;
                }

                // Explicitly route scenes — VT B to program (holding), VT A to preview (first clip).
                // This overrides whatever OBS had when last used and guarantees Deck A fires first.
                try {
                    await _ws.call('SetCurrentProgramScene', { sceneName: 'VT B' });
                    await _ws.call('SetCurrentPreviewScene', { sceneName: 'VT A' });
                    state.obs.program = 'VT B';
                    state.obs.preview = 'VT A';
                    _updateTallies();
                } catch(e) {
                    _log(`OBS routing failed: ${e.message}`, 'error');
                    return;
                }

                _log(`Clip queue: ${queue.length} clip(s). Deck A primed for start.`, 'info');
                await _loadDeck('A', queue[0]);
                if (queue[1]) await _loadDeck('B', queue[1]);
                _log(`Ready. Deck A: "${state.storiesMap[queue[0]]?.mediaFile}" | Deck B: "${state.storiesMap[queue[1]]?.mediaFile || 'empty'}"`, 'success');
            }

            // ── Render helpers (called from renderObsPlayout) ──────────────────
            function _renderLog() {
                if (state.obs.log.length === 0) return '<span class="text-slate-400 italic">No OBS events yet.</span>';
                return state.obs.log.map(e => {
                    const col    = e.type === 'error' ? 'text-red-500' : e.type === 'success' ? 'text-emerald-600' : e.type === 'warn' ? 'text-amber-600' : 'text-slate-500';
                    const prefix = e.type === 'error' ? '[ERR]'        : e.type === 'success' ? '[OK]'            : e.type === 'warn' ? '[WARN]'        : '[INFO]';
                    return `<div class="${col}"><span class="text-slate-300 mr-1">${e.time}</span><span class="font-bold mr-1">${prefix}</span>${e.msg}</div>`;
                }).join('');
            }

            function _renderDeck(deck) {
                const d = state.obs['deck' + deck];
                const isProgram = (deck === 'A' && state.obs.program === 'VT A') || (deck === 'B' && state.obs.program === 'VT B');
                const isPreview = (deck === 'A' && state.obs.preview === 'VT A') || (deck === 'B' && state.obs.preview === 'VT B');
                const tallyLabel = isProgram
                    ? '<span class="text-red-600 font-black tracking-widest text-xs">PROGRAM</span>'
                    : isPreview
                        ? '<span class="text-blue-600 font-bold tracking-widest text-xs">PREVIEW</span>'
                        : '<span class="text-slate-400 text-xs">STANDBY</span>';
                const borderClass = isProgram ? 'obs-tally-program border-red-400' : isPreview ? 'obs-tally-preview border-blue-400' : 'border-slate-200';
                const timeClass   = 'font-mono text-lg font-bold px-3 py-1 rounded bg-slate-100 text-slate-700 transition-all';

                const loadedStory = d.loadedStoryId ? state.storiesMap[d.loadedStoryId] : null;
                const labelContent = loadedStory
                    ? `<span class="font-bold text-slate-800 text-sm truncate">${escapeHTML(loadedStory.slug)}</span>
                       <span class="text-xs text-slate-400 font-mono truncate">${escapeHTML(loadedStory.mediaFile)}</span>`
                    : `<span class="text-slate-400 text-xs italic">No clip loaded</span>`;

                return `
                <div id="obs-deck-${deck}" class="bg-white border-2 rounded-xl p-4 flex flex-col gap-3 transition-all duration-300 ${borderClass}">
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-slate-700 bg-slate-100 px-3 py-1 rounded text-sm font-mono tracking-widest">CLIP ${deck}</span>
                        <div id="obs-tally-label-${deck}">${tallyLabel}</div>
                        <div id="obs-time-${deck}" class="${timeClass}">00:00:00</div>
                    </div>
                    <div id="obs-deck-label-${deck}" class="flex flex-col gap-0.5 min-w-0 bg-slate-50 border border-slate-100 rounded px-3 py-2">
                        ${labelContent}
                    </div>
                    <div class="flex justify-center gap-2">
                        <button data-obs-action="play"  data-deck="${deck}" class="p-2 rounded border transition-colors bg-green-500 border-green-600 hover:bg-green-400 text-white" title="Play">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"/></svg>
                        </button>
                        <button data-obs-action="pause" data-deck="${deck}" class="p-2 rounded border transition-colors bg-amber-400 border-amber-500 hover:bg-amber-300 text-white" title="Pause">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
                        </button>
                        <button data-obs-action="stop"  data-deck="${deck}" class="p-2 rounded border transition-colors bg-red-500 border-red-600 hover:bg-red-400 text-white" title="Stop">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8 7a1 1 0 00-1 1v4a1 1 0 001 1h4a1 1 0 001-1V8a1 1 0 00-1-1H8z" clip-rule="evenodd"/></svg>
                        </button>
                        <button data-obs-action="cue"   data-deck="${deck}" class="p-2 rounded border transition-colors bg-blue-500 border-blue-600 hover:bg-blue-400 text-white" title="Cue to 0">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/></svg>
                        </button>
                    </div>
                    <div class="bg-slate-50 border border-slate-100 rounded px-3 py-1.5 text-xs font-mono text-slate-500 flex justify-between">
                        <span>State: <span id="obs-state-${deck}" class="text-slate-800 font-bold">${d.state}</span></span>
                        <span>Dur: <span id="obs-dur-${deck}" class="text-slate-800">${_formatTime(d.duration)}</span></span>
                    </div>
                </div>`;
            }

            // ── Public interface ───────────────────────────────────────────────
            async function connect() {
                // Cancel any pending retry — ensures only one retry loop is ever running
                if (_retryTimeout) { clearTimeout(_retryTimeout); _retryTimeout = null; }
                // Prevent concurrent connection attempts
                if (_isConnecting) return;
                _isConnecting = true;
                try {
                    if (state.obs.connected) {
                        state.obs.connected = false;
                        _stopTelemetry();
                        _stopSyncInterval();
                        try { await _ws.disconnect(); } catch(e) {}
                    }
                    await _ws.connect(`ws://${_cfg.ip}:${_cfg.port}`, _cfg.pass, { rpcVersion: 1 });
                    _isConnecting = false;
                    state.obs.connected = true;
                    _log(`Connected to OBS at ws://${_cfg.ip}:${_cfg.port}`, 'success');
                    _updateConnectionBadge();
                    await _setupEnvironment();
                    // Force VT A into preview so Deck A is always the first clip
                    // regardless of what OBS had in preview when it last closed.
                    try { await _ws.call('SetCurrentPreviewScene', { sceneName: 'VT A' }); } catch(e) {}
                    await _syncState();
                    _startTelemetry();
                    _startSyncInterval();
                } catch(err) {
                    _isConnecting = false;
                    state.obs.connected = false;
                    _log(`OBS connection failed: ${err.message}`, 'error');
                    _updateConnectionBadge();
                    // Single retry path — ConnectionClosed handler does not schedule its own retry
                    _retryTimeout = setTimeout(() => { _retryTimeout = null; connect(); }, 8000);
                }
            }

            async function disconnect() {
                if (_retryTimeout) { clearTimeout(_retryTimeout); _retryTimeout = null; }
                _isConnecting = false;
                _stopTelemetry();
                _stopSyncInterval();
                state.obs.connected = false;
                try { await _ws.disconnect(); } catch(e) {}
                _updateConnectionBadge();
            }

            return {
                // Lifecycle
                connect,
                disconnect,
                loadConfig:  _loadConfig,
                saveConfig:  _saveConfig,

                // Playout
                initialLoad: _initialLoad,
                loadDeck:    _loadDeck,
                executeTake: _executeTake,

                // Transport
                mediaAction: _mediaAction,
                setCursor:   _setCursor,

                // Lower third
                updateL3Text: _updateL3Text,
                toggleL3:     _toggleL3,
                reconcileL3:  _reconcileL3,

                // Render helpers (called from renderObsPlayout)
                renderLog:  _renderLog,
                renderDeck: _renderDeck,
                formatTime: _formatTime,

                // Direct DOM updaters (called from outside render cycle)
                updateConnectionBadge: _updateConnectionBadge,
                updateTallies:         _updateTallies,
                updateDeckDisplay:     _updateDeckDisplay,

                // Expose log function for _syncPlayoutToActive
                log: _log,

                // Read-only config access for settings modal rendering
                getConfig: () => ({ ..._cfg }),
            };
        })();

        // ==========================================
        // END OBS PLAYOUT ENGINE
        // ==========================================


       /**
         * Renders the Studio / Director view. Structure:
         * - Dark TX status bar (Off Air / TX Live) with timer, backtime, and
         *   Start TX / End TX button. Playout connection badge in off-air state.
         * - On Air and Preview Next story cards with clip state/deck badges.
         * - Playout deck panels (radio PPM decks or OBS decks, per backend).
         * - Take control bar: Previous, Reset, Take Next, Take Clip.
         * @returns {string} HTML string.
         */
       function renderDirector() {
            const rawOrder = state.meta.order || [];
            const markerIdx = rawOrder.indexOf('marker-line');
            const order = (markerIdx > -1 ? rawOrder.slice(0, markerIdx) : rawOrder)
                .filter(id => !state.storiesMap[id]?.isFloated);

            const activeIdx = order.indexOf(state.meta.activeStoryId);
            const curId = activeIdx > -1 ? state.meta.activeStoryId : order[0] || null;
            const cur = curId ? state.storiesMap[curId] : null;

            // Find segments immediately after the active story, then the next real story beyond them
            const afterIdx = activeIdx > -1 ? activeIdx + 1 : (order.length > 1 ? 1 : order.length);
            const segmentsBetween = [];
            let nxtRealIdx = afterIdx;
            while (nxtRealIdx < order.length && state.storiesMap[order[nxtRealIdx]]?.type === 'segment') {
                segmentsBetween.push(state.storiesMap[order[nxtRealIdx]]);
                nxtRealIdx++;
            }
            const nxtId = nxtRealIdx < order.length ? order[nxtRealIdx] : null;
            const nxt = nxtId ? state.storiesMap[nxtId] : null;

            const isLive = state.meta.isTXMode;

            // Map storyId → deck info for clip badges.
            // If two decks share a storyId (same filename), prefer the one in a better state.
            const deckStatePriority = s => s === 'playing' ? 3 : s === 'cued' || s === 'paused' ? 2 : s === 'ended' ? 1 : 0;
            const deckMap = {};
            if (state.ui.playoutBackend === 'radio') {
                for (const [key, deck] of [['deckA', state.radio.deckA], ['deckB', state.radio.deckB]]) {
                    if (!deck.loadedStoryId) continue;
                    const existing = deckMap[deck.loadedStoryId];
                    if (!existing || deckStatePriority(deck.state) > deckStatePriority(existing.deckState)) {
                        deckMap[deck.loadedStoryId] = { deck: key === 'deckA' ? 'A' : 'B', deckState: deck.state };
                    }
                }
            } else if (state.ui.playoutBackend === 'obs') {
                if (state.obs.deckA.loadedStoryId) deckMap[state.obs.deckA.loadedStoryId] = { deck: 'A', deckState: state.obs.deckA.state };
                if (state.obs.deckB.loadedStoryId) deckMap[state.obs.deckB.loadedStoryId] = { deck: 'B', deckState: state.obs.deckB.state };
            }

            const clipTitleBadge = (story, storyId) => {
                if (!story?.mediaFile || state.ui.playoutBackend === 'none') return '';
                const info = deckMap[storyId];
                if (!info) {
                    return `<span class="flex items-center gap-1 ml-2">
                        <span class="text-[10px] font-bold bg-white/20 text-white/70 px-1.5 py-0.5 rounded uppercase tracking-wide">No Clip</span>
                    </span>`;
                }
                const ds = (info.deckState || '').toLowerCase().replace('obs_media_state_', '');
                const isPlaying = ds === 'playing';
                const isCued    = ds === 'cued' || ds === 'paused';
                const stateLbl  = isPlaying ? 'Playing' : isCued ? 'Cued' : ds;
                const stateBg   = isPlaying ? 'bg-white text-red-600' : isCued ? 'bg-white/30 text-white' : 'bg-white/20 text-white/70';
                const dot       = isPlaying ? '<span class="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse inline-block mr-1"></span>' : '';
                return `<span class="flex items-center gap-1 ml-2">
                    <span class="text-[10px] font-bold ${stateBg} px-1.5 py-0.5 rounded uppercase tracking-wide">${dot}${stateLbl}</span>
                    <span class="text-[10px] font-black bg-white/20 text-white px-1.5 py-0.5 rounded uppercase tracking-wide">${info.deck}</span>
                </span>`;
            };

            const onAirBorder = isLive ? 'border-red-300' : 'border-slate-200';
            const onAirHdrBg  = isLive ? 'bg-red-600'    : 'bg-slate-700';

            return `
                <div class="flex flex-col" style="min-height:100%">

                    <!-- TX STATUS BAR — lives inside Studio view, not the global header -->
                    <div class="${isLive ? 'bg-red-900' : 'bg-slate-800'} transition-colors duration-300 shrink-0">
                        <div class="max-w-6xl mx-auto px-6 py-3 flex items-center justify-between gap-6">
                            <div class="flex items-center gap-4">
                                ${isLive ? `
                                <div class="flex items-center gap-3">
                                    <span class="w-3 h-3 rounded-full bg-red-400 animate-pulse"></span>
                                    <span class="text-white font-black tracking-widest text-sm uppercase">TX Live</span>
                                    <span id="tx-timer-display" class="font-mono text-red-300 font-bold text-lg ml-1">00:00</span>
                                    <div class="w-px h-5 bg-white/20 mx-2"></div>
                                    <span class="text-white/50 text-xs uppercase tracking-wide">Backtime</span>
                                    <span id="backtime-display" class="font-mono font-bold text-lg text-slate-300 ml-1">--:--</span>
                                </div>` : `
                                <div class="flex items-center gap-3">
                                    <span class="text-slate-400 text-sm font-medium tracking-wide">OFF AIR</span>
                                    ${state.ui.playoutBackend === 'obs' ? `
                                    <span id="obs-conn-badge" class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-bold ${state.obs.connected ? 'bg-emerald-900/40 text-emerald-300 border border-emerald-700' : 'bg-red-900/40 text-red-300 border border-red-700'}">
                                        <span class="w-1.5 h-1.5 rounded-full ${state.obs.connected ? 'bg-emerald-400' : 'bg-red-400 animate-pulse'}"></span>
                                        ${state.obs.connected ? 'OBS Connected' : 'OBS Offline'}
                                    </span>` : ''}
                                    ${state.ui.playoutBackend === 'radio' ? `
                                    <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-bold ${state.radio.directoryHandle ? 'bg-emerald-900/40 text-emerald-300 border border-emerald-700' : 'bg-amber-900/40 text-amber-300 border border-amber-700'}">
                                        <span class="w-1.5 h-1.5 rounded-full ${state.radio.directoryHandle ? 'bg-emerald-400' : 'bg-amber-400'}"></span>
                                        ${state.radio.directoryHandle ? `Media: ${escapeHTML(state.radio.directoryHandle.name)}` : 'No Media Folder'}
                                    </span>` : ''}
                                </div>`}
                                ${isPlaybackMaster() ? `
                                <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-bold bg-emerald-900/40 text-emerald-300 border border-emerald-700">
                                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span>
                                    AUDIO MASTER
                                </span>` : ''}
                            </div>
                            <button data-action="studio-tx-toggle"
                                class="px-6 py-2 rounded-lg font-black text-sm tracking-widest transition-all shadow-lg ${isLive ? 'bg-slate-700 hover:bg-slate-600 text-white border-2 border-slate-500' : 'bg-red-600 hover:bg-red-500 text-white border-2 border-red-400'}">
                                ${isLive ? 'End TX' : 'Start TX'}
                            </button>
                        </div>
                    </div>

                    <!-- Studio body -->
                    <div class="max-w-6xl mx-auto p-6 pb-12 flex flex-col gap-6 w-full">

                        <!-- Story cards: ON AIR + optional SEGMENT chip(s) + PREVIEW NEXT -->
                        <div class="flex gap-3 items-stretch">
                            <!-- ON AIR card -->
                            <div class="flex-1 bg-white border-2 rounded-2xl flex flex-col overflow-hidden shadow-sm ${onAirBorder}">
                                <div class="${onAirHdrBg} text-white font-bold text-lg px-6 py-3 tracking-widest flex justify-between items-center">
                                    <span class="flex items-center">ON AIR${clipTitleBadge(cur, curId)}</span>
                                    ${cur ? `<span class="font-mono bg-black/20 px-2 py-0.5 rounded text-sm">${formatDuration(cur.duration)}</span>` : ''}
                                </div>
                                <div class="p-6 flex-1 text-center flex flex-col justify-center min-h-[100px]">
                                    ${cur ? `<h3 class="text-3xl font-black text-slate-800 uppercase">${escapeHTML(cur.slug)}</h3><p class="text-slate-400 italic mt-2 text-sm truncate">${escapeHTML(cur.script?.split('\n')[0] || '')}</p>` : '<span class="text-slate-400">No Active Story</span>'}
                                </div>
                                ${(() => {
                                    const presId = state.meta.presenterClipStoryId;
                                    if (!presId) return '';
                                    const presStory = state.storiesMap[presId];
                                    const presSlug = presStory ? escapeHTML(presStory.slug) : escapeHTML(presId);
                                    return `<div class="border-t border-amber-200 bg-amber-50 px-4 py-2 flex items-center justify-between gap-3">
                                        <div class="flex items-center gap-2">
                                            <span class="w-2 h-2 rounded-full bg-amber-500 animate-pulse inline-block"></span>
                                            <span class="text-xs font-black text-amber-800 uppercase tracking-widest">Presenter Clip</span>
                                            <span class="text-xs font-bold text-amber-700 truncate max-w-[160px]">${presSlug}</span>
                                        </div>
                                        <button data-action="director-stop-presenter-clip"
                                            class="text-xs font-black px-3 py-1 rounded-lg bg-red-600 hover:bg-red-500 text-white tracking-widest uppercase transition-colors shadow-sm">

          function updateClockDisplays() {
                const el = document.getElementById('tx-timer-display');
                if (el && state.meta.showStartTime) {
                    const diff = Math.max(0, Math.floor((Date.now() - state.meta.showStartTime) / 1000));
                    const m = Math.floor(diff / 60).toString().padStart(2, '0');
                    const s = (diff % 60).toString().padStart(2, '0');
                    el.innerText = `${m}:${s}`;
                }

                const bt = document.getElementById('backtime-display');
                if (!bt || !state.meta.txStartedAt) return;

                const order = state.meta.order || [];
                const markerIdx = order.indexOf('marker-line');
                const cutoff = markerIdx > -1 ? markerIdx : order.length;
                const activeIdx = order.indexOf(state.meta.activeStoryId);

                const txSecs = parseClockTime(state.meta.txClockTime);
                const rxSecs = parseClockTime(state.meta.rxClockTime);
                const liveTxDuration = (txSecs !== null && rxSecs !== null)
                    ? (rxSecs - txSecs) * 1000
                    : order
                        .slice(0, cutoff)
                        .filter(id => !state.storiesMap[id]?.isFloated)
                        .reduce((sum, id) => sum + (state.storiesMap[id]?.duration || 0), 0) * 1000;

                let currentStoryRemaining = 0;
                if (state.meta.activeStoryId && state.meta.activeStoryStartedAt) {
                    const currentDuration = (state.storiesMap[state.meta.activeStoryId]?.duration || 0) * 1000;
                    const elapsedOnStory = Date.now() - state.meta.activeStoryStartedAt;
                    currentStoryRemaining = Math.max(0, currentDuration - elapsedOnStory);
                }

                const nextIds = order
                    .slice(activeIdx > -1 ? activeIdx + 1 : 0, cutoff)
                    .filter(id => !state.storiesMap[id]?.isFloated);
                const remainingMs = nextIds.reduce((sum, id) => sum + (state.storiesMap[id]?.duration || 0) * 1000, 0);

                const projectedEnd = Date.now() + currentStoryRemaining + remainingMs;
                const scheduledEnd = state.meta.txStartedAt + liveTxDuration;
                const backtimeMs = scheduledEnd - projectedEnd;
                const isLight = backtimeMs >= 0;
                const backtimeSecs = Math.round(Math.abs(backtimeMs) / 1000);

                const AMBER_ZONE = 30;
                let btColour;
                if (!isLight) btColour = 'text-red-500';
                else if (backtimeSecs <= AMBER_ZONE) btColour = 'text-amber-500';
                else btColour = 'text-emerald-500';
                bt.className = `font-mono text-lg font-bold ${btColour}`;
                bt.innerText = `${isLight ? '−' : '+'}${formatDuration(backtimeSecs)}`;
            }

            let lastTimestamp = 0;
            function autoscrollLoop(timestamp) {
                if (!lastTimestamp) lastTimestamp = timestamp;
                const deltaTime = (timestamp - lastTimestamp) / 1000;

                if (state.mode === 'presenter' && state.ui.presenter.autoScroll && !state.ui.presenter.pausedByUser && container) {
                    container.scrollBy(0, state.ui.presenter.scrollSpeed * deltaTime);
                }
                requestAnimationFrame(autoscrollLoop);
            }
            requestAnimationFrame(autoscrollLoop);

                        ${!isRundownLocked ? `<button data-action="delete-story" data-id="${id}" class="p-1.5 text-slate-400 hover:text-red-600"><i class="fa-solid fa-trash text-xs"></i></button>` : ''}
                    </td>

            const txRxBar = `

                    ${txSecs !== null && rxSecs !== null ? `

                    <div class="ml-auto flex items-center gap-2">
                        ${state.meta.rundownLocked ? `<span class="flex items-center gap-1.5 text-xs font-bold px-2.5 py-1 rounded-full border ${isEditor ? 'bg-amber-50 border-amber-300 text-amber-700' : 'bg-red-50 border-red-200 text-red-600'}"><i class="fa-solid fa-lock text-xs"></i> ${isEditor ? 'You locked this' : `Locked by ${escapeHTML(editorName)}`}</span>` : ''}
                        ${isEditor ? `<button data-action="toggle-rundown-lock" class="flex items-center gap-1.5 text-xs font-bold px-2.5 py-1.5 rounded-lg border transition-colors ${state.meta.rundownLocked ? 'bg-red-100 text-red-700 border-red-200 hover:bg-red-200' : 'bg-white text-slate-500 border-slate-300 hover:border-slate-400 hover:text-slate-700'}"><i class="fa-solid ${state.meta.rundownLocked ? 'fa-lock-open' : 'fa-lock'}"></i> ${state.meta.rundownLocked ? 'Unlock' : 'Lock'}</button>` : ''}

                                    </div>

            return `<div class="max-w-7xl mx-auto p-6 pb-24">

                    <div class="flex items-center gap-3">

                    </div>
                    <div class="flex flex-wrap gap-2 items-center">
                        ${state.meta.isTXMode ? `
